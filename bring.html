<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bring</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f5f0;
  --text: #3a3a3a;
  --text-muted: #8a8a8a;
  --primary: #6b9080;
  --primary-hover: #5a7d6e;
  --accent: #cce3de;
  --warm: #dda77b;
  --gentle: #eae4e9;
  --escape-bg: transparent;
  --escape-text: #7a7a7a;
  --card-bg: #fff;
  --btn-text: #fff;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --cat-email: #89b4fa;
  --cat-legal: #f38ba8;
  --cat-household: #a6e3a1;
  --cat-health: #f9e2af;
  --cat-creative: #cba6f7;
  --cat-admin: #94e2d5;
  --cat-financial: #fab387;
  --cat-personal: #eae4e9;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1a2e;
    --text: #e0e0e0;
    --text-muted: #999;
    --primary: #7db39a;
    --primary-hover: #6a9f87;
    --accent: #2a3a35;
    --warm: #c4956e;
    --gentle: #2a2535;
    --card-bg: #252540;
    --btn-text: #1a1a2e;
    --shadow: 0 1px 3px rgba(0,0,0,0.3);
    --cat-email: #5580c2;
    --cat-legal: #c06a82;
    --cat-household: #6aad6e;
    --cat-health: #c4a850;
    --cat-creative: #9a7ac4;
    --cat-admin: #5aad9e;
    --cat-financial: #c48a5e;
    --cat-personal: #3a3550;
  }
}

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; }
}

body {
  font-family: var(--font);
  font-size: 1.125rem;
  line-height: 1.6;
  color: var(--text);
  background: var(--bg);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

#app {
  max-width: 480px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 1.25rem;
}

h1 {
  font-size: 1.6rem;
  font-weight: 600;
  line-height: 1.3;
  color: var(--text);
}

h2 {
  font-size: 1.3rem;
  font-weight: 500;
  line-height: 1.4;
}

.hero-text {
  font-size: 1.5rem;
  font-weight: 400;
  line-height: 1.5;
  text-align: center;
}

.sub-text {
  color: var(--text-muted);
  font-size: 0.95rem;
}

.center { text-align: center; }

.btn {
  display: block;
  width: 100%;
  min-height: 56px;
  padding: 0.9rem 1.5rem;
  border: none;
  border-radius: 12px;
  font-family: var(--font);
  font-size: 1.05rem;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  line-height: 1.4;
}

.btn:active { transform: scale(0.98); }
.btn:focus-visible { outline: 3px solid var(--warm); outline-offset: 2px; }

.btn-primary {
  background: var(--primary);
  color: var(--btn-text);
  font-weight: 500;
}
.btn-primary:hover { background: var(--primary-hover); }

.btn-state {
  background: var(--card-bg);
  color: var(--text);
  box-shadow: var(--shadow);
  border: 1px solid var(--accent);
  text-align: left;
  font-weight: 400;
}
.btn-state:hover { background: var(--accent); }

.btn-escape {
  background: transparent;
  color: var(--text-muted);
  font-size: 0.95rem;
  min-height: 44px;
}
.btn-escape:hover { color: var(--text); }

.btn-warm {
  background: var(--warm);
  color: #fff;
  font-weight: 500;
}

.btn-group { display: flex; flex-direction: column; gap: 0.75rem; }

.spacer { height: 1rem; }
.spacer-lg { height: 2rem; }

.progress-text {
  color: var(--text-muted);
  font-size: 0.85rem;
  text-align: center;
}

.micro-msg {
  color: var(--primary);
  font-size: 0.9rem;
  text-align: center;
  font-style: italic;
  min-height: 1.4em;
}

.input-field {
  width: 100%;
  padding: 1rem;
  border: 2px solid var(--accent);
  border-radius: 12px;
  font-family: var(--font);
  font-size: 1.1rem;
  background: var(--card-bg);
  color: var(--text);
  resize: vertical;
  min-height: 80px;
}
.input-field:focus { outline: none; border-color: var(--primary); }

.input-small {
  width: 100%;
  padding: 0.75rem 1rem;
  border: 2px solid var(--accent);
  border-radius: 10px;
  font-family: var(--font);
  font-size: 1rem;
  background: var(--card-bg);
  color: var(--text);
}
.input-small:focus { outline: none; border-color: var(--primary); }

.gentle-box {
  background: var(--gentle);
  border-radius: 12px;
  padding: 1.5rem;
  text-align: center;
  line-height: 1.6;
}

.timer-widget {
  position: fixed;
  bottom: 1rem;
  right: 1rem;
  background: var(--card-bg);
  color: var(--text-muted);
  font-size: 0.8rem;
  padding: 0.5rem 0.75rem;
  border-radius: 8px;
  box-shadow: var(--shadow);
  z-index: 100;
}

/* ─── BRING-SPECIFIC ─── */

.emotion-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.6rem;
}

.emotion-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0.8rem 0.5rem;
  background: var(--card-bg);
  border: 2px solid var(--accent);
  border-radius: 12px;
  cursor: pointer;
  font-family: var(--font);
  font-size: 0.95rem;
  color: var(--text);
  transition: border-color 0.15s, background 0.15s;
}
.emotion-btn:hover { background: var(--accent); }
.emotion-btn.selected { border-color: var(--primary); background: var(--accent); }
.emotion-label { font-weight: 500; margin-top: 0.3rem; }
.emotion-icon { font-size: 1.6rem; }

.chip-list {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  min-height: 2rem;
}

.chip {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.35rem 0.8rem;
  border-radius: 20px;
  font-size: 0.9rem;
  font-family: var(--font);
  background: var(--accent);
  color: var(--text);
  border: none;
  cursor: pointer;
  transition: opacity 0.15s;
}
.chip:hover { opacity: 0.8; }
.chip-remove {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 1.1rem;
  padding: 0;
  line-height: 1;
  font-family: var(--font);
}

.chip-cat {
  padding-left: 0.6rem;
  border-left: 3px solid var(--primary);
}
.chip-cat[data-cat="email"] { border-left-color: var(--cat-email); }
.chip-cat[data-cat="legal"] { border-left-color: var(--cat-legal); }
.chip-cat[data-cat="household"] { border-left-color: var(--cat-household); }
.chip-cat[data-cat="health"] { border-left-color: var(--cat-health); }
.chip-cat[data-cat="creative"] { border-left-color: var(--cat-creative); }
.chip-cat[data-cat="admin"] { border-left-color: var(--cat-admin); }
.chip-cat[data-cat="financial"] { border-left-color: var(--cat-financial); }
.chip-cat[data-cat="personal"] { border-left-color: var(--cat-personal); }

.cat-badge {
  display: inline-block;
  padding: 0.3rem 0.7rem;
  border-radius: 8px;
  font-size: 0.85rem;
  font-family: var(--font);
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color 0.15s, transform 0.1s;
  color: var(--text);
}
.cat-badge:hover { transform: scale(1.05); }
.cat-badge.selected { border-color: var(--text); }
.cat-badge[data-cat="email"] { background: var(--cat-email); }
.cat-badge[data-cat="legal"] { background: var(--cat-legal); }
.cat-badge[data-cat="household"] { background: var(--cat-household); }
.cat-badge[data-cat="health"] { background: var(--cat-health); }
.cat-badge[data-cat="creative"] { background: var(--cat-creative); }
.cat-badge[data-cat="admin"] { background: var(--cat-admin); }
.cat-badge[data-cat="financial"] { background: var(--cat-financial); }
.cat-badge[data-cat="personal"] { background: var(--cat-personal); }

.cat-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  justify-content: center;
}

.section-card {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 1rem 1.25rem;
  box-shadow: var(--shadow);
}
.section-card h3 {
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text-muted);
  margin-bottom: 0.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.section-card .edit-link {
  font-size: 0.8rem;
  color: var(--primary);
  cursor: pointer;
  background: none;
  border: none;
  font-family: var(--font);
}
.section-card .edit-link:hover { text-decoration: underline; }

.braindump-ref {
  background: var(--card-bg);
  border-radius: 10px;
  padding: 0.75rem 1rem;
  font-size: 0.85rem;
  color: var(--text-muted);
  max-height: 100px;
  overflow-y: auto;
  white-space: pre-wrap;
  line-height: 1.5;
}

.insight-bar-container {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin: 0.25rem 0;
}
.insight-bar-label {
  font-size: 0.85rem;
  min-width: 80px;
  text-align: right;
  color: var(--text-muted);
}
.insight-bar {
  height: 20px;
  border-radius: 4px;
  background: var(--primary);
  transition: width 0.3s;
}
.insight-bar-val {
  font-size: 0.8rem;
  color: var(--text-muted);
  min-width: 20px;
}

.add-row {
  display: flex;
  gap: 0.5rem;
}
.add-row .input-small { flex: 1; }
.add-btn {
  padding: 0.75rem 1rem;
  background: var(--primary);
  color: var(--btn-text);
  border: none;
  border-radius: 10px;
  font-family: var(--font);
  font-size: 1rem;
  cursor: pointer;
  font-weight: 500;
}
.add-btn:hover { background: var(--primary-hover); }

.brand {
  font-size: 0.75rem;
  color: var(--text-muted);
  text-align: center;
  opacity: 0.5;
  margin-top: 2rem;
}

@media (max-width: 380px) {
  #app { padding: 1.5rem 1rem; }
  .hero-text { font-size: 1.3rem; }
  h1 { font-size: 1.4rem; }
  .emotion-grid { grid-template-columns: 1fr 1fr; gap: 0.4rem; }
}
</style>
</head>
<body>
<div id="app"></div>
<div class="timer-widget" id="timer" style="display:none">0:00</div>

<script>
// ─── STATE ───
const S = {
  view: 'WELCOME',
  session: {
    id: null,
    ts: null,
    source: 'bring',
    emotional: { state: null, note: '' },
    braindump: '',
    items: [],
    blockers: [],
    outcome: null,
    duration_s: 0,
  },
  startTime: null,
  catIndex: 0,
  returnTo: null,
};

// ─── MESSAGES ───
const VALIDATION = [
  "This is hard. You are not making it up.",
  "Your brain works differently, not wrongly.",
  "Executive dysfunction is real. You are not lazy.",
  "The fact that you opened this is a step.",
  "Struggling with this does not mean you are failing.",
  "A lot of people feel exactly this way right now.",
];

const PROGRESS = [
  "One step is still a step.",
  "You do not have to do everything. Just this.",
  "Partial credit counts here. Always.",
  "You moved forward. That matters.",
  "You are doing this.",
  "Look at you go.",
];

const PERMISSION = [
  "You can stop anytime. No judgment.",
  "Stopping is not failing.",
  "You did enough.",
  "Rest is productive. Your brain needs it.",
  "You showed up. That already counts.",
];

const REFRAMING = [
  "Done is better than perfect.",
  "Good enough is a real and valid goal.",
  "A messy attempt beats a perfect plan you never start.",
  "You do not need to understand everything before you begin.",
  "Partial progress is still progress.",
];

const COMPLETION = [
  "You showed up. That is the hard part.",
  "You gathered your thoughts. That is real work.",
  "Naming what matters is the first step to getting it done.",
  "You just turned chaos into a list. That is powerful.",
  "Your day has shape now. You did that.",
];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ─── CATEGORIES ───
const CATEGORIES = ['email','legal','household','health','creative','admin','financial','personal'];

const CAT_KEYWORDS = {
  email: ['email','mail','inbox','reply','respond','message','send','forward','gmail'],
  legal: ['solicitor','court','contact order','barrister','legal','judge','hearing','cafcass','pcc','statement','bundle','c79','c100','c1a','section 7','position statement'],
  household: ['washing','laundry','dishes','clean','tidy','cook','food','shopping','bin','school','maia','kids','daughter','son','clothes','bed','room'],
  health: ['doctor','gp','meds','medication','dentist','appointment','therapy','exercise','walk','shower','sleep','water'],
  creative: ['design','draw','write','build','code','project','make','create','music','video','photo'],
  admin: ['form','paperwork','document','apply','application','register','submit','sign','upload','organise','phone call','call'],
  financial: ['invoice','bill','pay','bank','money','budget','universal credit','rent','account','tax','hmrc'],
  personal: ['journal','think','plan','rest','friend','family','self','break','relax','breathe'],
};

function guessCategory(text) {
  const lower = text.toLowerCase();
  for (const [cat, kws] of Object.entries(CAT_KEYWORDS)) {
    if (kws.some(k => lower.includes(k))) return cat;
  }
  return null;
}

// ─── PERSISTENCE ───
function saveCurrent() {
  try { localStorage.setItem('bring_current', JSON.stringify(S)); } catch(e) {}
}

function loadCurrent() {
  try {
    const raw = localStorage.getItem('bring_current');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function clearCurrent() {
  try { localStorage.removeItem('bring_current'); } catch(e) {}
}

function loadSessions() {
  try {
    const raw = localStorage.getItem('bring_sessions');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return [];
}

function saveSession(session) {
  const sessions = loadSessions();
  sessions.push(session);
  try { localStorage.setItem('bring_sessions', JSON.stringify(sessions)); } catch(e) {}
  clearCurrent();
}

function lastSessionTime() {
  const sessions = loadSessions();
  if (sessions.length === 0) return null;
  return new Date(sessions[sessions.length - 1].ts);
}

function timeAgo(date) {
  const diff = Date.now() - date.getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + ' min' + (mins === 1 ? '' : 's') + ' ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + ' hour' + (hrs === 1 ? '' : 's') + ' ago';
  const days = Math.floor(hrs / 24);
  return days + ' day' + (days === 1 ? '' : 's') + ' ago';
}

// ─── TIMER ───
let timerInterval = null;
function startTimer() {
  S.startTime = Date.now();
  const tw = document.getElementById('timer');
  tw.style.display = 'block';
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - S.startTime) / 1000);
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    tw.textContent = m + ':' + (s < 10 ? '0' : '') + s;
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  document.getElementById('timer').style.display = 'none';
  if (S.startTime) {
    return Math.floor((Date.now() - S.startTime) / 1000);
  }
  return 0;
}

// ─── RENDER ENGINE ───
const $ = id => document.getElementById(id);
const app = () => $('app');

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'className') e.className = v;
      else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
      else e.setAttribute(k, v);
    }
  }
  for (const c of children) {
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else if (c) e.appendChild(c);
  }
  return e;
}

function render() {
  const a = app();
  a.innerHTML = '';
  const views = {
    WELCOME: vWelcome,
    FEELING: vFeeling,
    BRAINDUMP: vBraindump,
    MUSTS: vMusts,
    WANTS: vWants,
    CATEGORIZE: vCategorize,
    BLOCKERS: vBlockers,
    REVIEW: vReview,
    DONE: vDone,
    INSIGHTS: vInsights,
  };
  (views[S.view] || vWelcome)(a);
  saveCurrent();
}

function go(view, updates) {
  Object.assign(S, updates || {});
  S.view = view;
  render();
  window.scrollTo(0, 0);
}

// ─── GREETING ───
function greeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Morning';
  if (h < 17) return 'Afternoon';
  return 'Evening';
}

function formatDate() {
  return new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

// ─── VIEWS ───

function vWelcome(a) {
  a.appendChild(el('div', { className: 'spacer-lg' }));
  a.appendChild(el('p', { className: 'hero-text' }, greeting() + ', Loz.'));
  a.appendChild(el('p', { className: 'hero-text' }, "Let's get you set up."));
  a.appendChild(el('div', { className: 'spacer' }));
  a.appendChild(el('p', { className: 'sub-text center' }, formatDate()));

  const last = lastSessionTime();
  if (last) {
    a.appendChild(el('p', { className: 'sub-text center' }, 'Last check-in: ' + timeAgo(last)));
  }

  a.appendChild(el('div', { className: 'spacer-lg' }));
  a.appendChild(el('div', { className: 'btn-group' },
    el('button', { className: 'btn btn-primary', onClick: () => {
      S.session = { id: 'bring_' + Date.now(), ts: new Date().toISOString(), source: 'bring', emotional: { state: null, note: '' }, braindump: '', items: [], blockers: [], outcome: null, duration_s: 0 };
      startTimer();
      go('FEELING');
    }}, "Let's go"),
    el('button', { className: 'btn btn-escape', onClick: () => {
      S.session = { id: 'bring_' + Date.now(), ts: new Date().toISOString(), source: 'bring', emotional: { state: null, note: '' }, braindump: '', items: [], blockers: [], outcome: null, duration_s: 0 };
      startTimer();
      go('BRAINDUMP');
    }}, "Skip to quick capture"),
  ));
}

// ─── FEELING ───
function vFeeling(a) {
  const emotions = [
    { key: 'calm', icon: '\u2728', label: 'Calm' },
    { key: 'tired', icon: '\ud83d\ude34', label: 'Tired' },
    { key: 'anxious', icon: '\ud83d\ude30', label: 'Anxious' },
    { key: 'overwhelmed', icon: '\ud83c\udf0a', label: 'Overwhelmed' },
    { key: 'frozen', icon: '\u2744\ufe0f', label: 'Frozen' },
    { key: 'frustrated', icon: '\ud83d\udca2', label: 'Frustrated' },
    { key: 'hopeful', icon: '\u2600\ufe0f', label: 'Hopeful' },
  ];

  a.appendChild(el('h2', { className: 'center' }, 'How are you feeling right now?'));
  a.appendChild(el('p', { className: 'sub-text center' }, 'No wrong answers.'));
  a.appendChild(el('div', { className: 'spacer' }));

  const grid = el('div', { className: 'emotion-grid' });
  for (const em of emotions) {
    const btn = el('button', {
      className: 'emotion-btn' + (S.session.emotional.state === em.key ? ' selected' : ''),
      onClick: () => {
        S.session.emotional.state = em.key;
        render();
      }
    },
      el('span', { className: 'emotion-icon' }, em.icon),
      el('span', { className: 'emotion-label' }, em.label),
    );
    grid.appendChild(btn);
  }
  a.appendChild(grid);

  a.appendChild(el('div', { className: 'spacer' }));
  a.appendChild(el('p', { className: 'sub-text center' }, 'Anything else about how you feel?'));
  const ta = el('textarea', {
    className: 'input-field',
    placeholder: 'Optional...',
    'aria-label': 'How you feel in more detail',
    style: 'min-height: 60px;',
  });
  ta.value = S.session.emotional.note || '';
  ta.addEventListener('input', () => { S.session.emotional.note = ta.value; });
  a.appendChild(ta);

  a.appendChild(el('div', { className: 'spacer' }));
  a.appendChild(el('div', { className: 'btn-group' },
    el('button', { className: 'btn btn-primary', onClick: () => go('BRAINDUMP') }, 'Next'),
    el('button', { className: 'btn btn-escape', onClick: () => {
      S.session.emotional.state = S.session.emotional.state || 'skipped';
      go('BRAINDUMP');
    }}, 'Skip this'),
  ));
}

// ─── BRAINDUMP ───
function vBraindump(a) {
  a.appendChild(el('h2', { className: 'center' }, "What's on your mind?"));
  a.appendChild(el('p', { className: 'sub-text center' }, "Don't organize. Don't prioritize. Just dump."));
  a.appendChild(el('div', { className: 'spacer' }));

  const ta = el('textarea', {
    className: 'input-field',
    placeholder: 'Everything that is floating around in your head right now...',
    'aria-label': 'Brain dump',
    style: 'min-height: 150px;',
  });
  ta.value = S.session.braindump || '';
  ta.addEventListener('input', () => { S.session.braindump = ta.value; });
  a.appendChild(ta);

  a.appendChild(el('div', { className: 'spacer' }));
  a.appendChild(el('div', { className: 'btn-group' },
    el('button', { className: 'btn btn-primary', onClick: () => go('MUSTS') }, 'Done dumping'),

// ─── MUSTS ───
function vMusts(a) {

  a.appendChild(el('p', { className: 'sub-text center' }, 'Court dates, deadlines, promises you made.'));
  a.appendChild(el('div', { className: 'spacer' }));

  if (S.session.braindump) {
    a.appendChild(el('div', { className: 'braindump-ref' }, S.session.braindump));
    a.appendChild(el('div', { className: 'spacer' }));
  }

  // existing must items
  const musts = S.session.items.filter(i => i.priority === 'must');

      const c = el('span', { className: 'chip' },

// ─── CATEGORIZE ───
function vCategorize(a) {
  const uncategorized = S.session.items.filter(i => !i.cat);
  if (uncategorized.length === 0) {
    go('BLOCKERS');
    return;
  }

  const item = uncategorized[0];
  const total = S.session.items.filter(i => !i.cat).length;
  const done = S.session.items.length - total;

  a.appendChild(el('p', { className: 'progress-text' }, 'Categorizing: ' + (done + 1) + ' of ' + S.session.items.length));
  a.appendChild(el('div', { className: 'spacer' }));

  a.appendChild(el('div', { className: 'gentle-box' },
    el('p', { style: 'font-size: 1.15rem;' }, item.text),

  a.appendChild(el('div', { className: 'spacer' }));

  const grid = el('div', { className: 'cat-grid' });

// ─── INSIGHTS ───
function vInsights(a) {
  const sessions = loadSessions();
  a.appendChild(el('h2', { className: 'center' }, 'Patterns'));
  a.appendChild(el('div', { className: 'spacer' }));

  if (sessions.length === 0) {
    a.appendChild(el('p', { className: 'sub-text center' }, 'No sessions yet. Complete a few check-ins and patterns will appear here.'));
    a.appendChild(el('div', { className: 'spacer-lg' }));
    a.appendChild(el('button', { className: 'btn btn-escape', onClick: () => go('DONE') }, 'Back'));
    return;
  }

  // Streak
  const dates = sessions.map(s => new Date(s.ts).toDateString());
  const uniqueDates = [...new Set(dates)];
  let streak = 0;
  const today = new Date();
  for (let d = 0; d < 365; d++) {
    const check = new Date(today);
    check.setDate(check.getDate() - d);
    if (uniqueDates.includes(check.toDateString())) {
      streak++;
    } else if (d > 0) break;
  }

  const streakCard = el('div', { className: 'section-card' });
  streakCard.appendChild(el('h3', null, 'Check-in streak'));
  streakCard.appendChild(el('p', { style: 'font-size: 2rem; font-weight: 600; color: var(--primary);' }, streak + ' day' + (streak === 1 ? '' : 's')));
  streakCard.appendChild(el('p', { className: 'sub-text' }, sessions.length + ' total sessions'));
  a.appendChild(streakCard);
  a.appendChild(el('div', { className: 'spacer' }));

  // Category breakdown
  const catCounts = {};
  sessions.forEach(s => {
    (s.items || []).forEach(i => {
      if (i.cat) catCounts[i.cat] = (catCounts[i.cat] || 0) + 1;
    });
  });
  const maxCat = Math.max(1, ...Object.values(catCounts));

  if (Object.keys(catCounts).length > 0) {
    const catCard = el('div', { className: 'section-card' });
    catCard.appendChild(el('h3', null, 'Most common categories'));
    const sorted = Object.entries(catCounts).sort((a, b) => b[1] - a[1]);
    sorted.forEach(([cat, count]) => {
      const row = el('div', { className: 'insight-bar-container' });
      row.appendChild(el('span', { className: 'insight-bar-label' }, cat));
      row.appendChild(el('div', { className: 'insight-bar', style: 'width: ' + Math.round(count / maxCat * 150) + 'px; background: var(--cat-' + cat + ');' }));
      row.appendChild(el('span', { className: 'insight-bar-val' }, '' + count));
      catCard.appendChild(row);
    });
    a.appendChild(catCard);
    a.appendChild(el('div', { className: 'spacer' }));
  }

  // Emotional trends (last 7)
  const recent = sessions.slice(-7);
  const emoCounts = {};
  recent.forEach(s => {
    const st = s.emotional && s.emotional.state;
    if (st && st !== 'skipped') emoCounts[st] = (emoCounts[st] || 0) + 1;
  });
  const maxEmo = Math.max(1, ...Object.values(emoCounts));

  if (Object.keys(emoCounts).length > 0) {
    const emoCard = el('div', { className: 'section-card' });
    emoCard.appendChild(el('h3', null, 'Recent feelings (last 7 sessions)'));
    Object.entries(emoCounts).sort((a, b) => b[1] - a[1]).forEach(([emo, count]) => {
      const row = el('div', { className: 'insight-bar-container' });
      row.appendChild(el('span', { className: 'insight-bar-label' }, emo));
      row.appendChild(el('div', { className: 'insight-bar', style: 'width: ' + Math.round(count / maxEmo * 150) + 'px;' }));
      row.appendChild(el('span', { className: 'insight-bar-val' }, '' + count));
      emoCard.appendChild(row);
    });
    a.appendChild(emoCard);
    a.appendChild(el('div', { className: 'spacer' }));
  }

  // Recurring items (appear 2+ times across sessions)
  const itemCounts = {};
  sessions.forEach(s => {
    const seen = new Set();
    (s.items || []).forEach(i => {
      const key = i.text.toLowerCase().trim();
      if (!seen.has(key)) { seen.add(key); itemCounts[key] = (itemCounts[key] || 0) + 1; }
    });
  });
  const recurring = Object.entries(itemCounts).filter(([, c]) => c >= 2).sort((a, b) => b[1] - a[1]);

  if (recurring.length > 0) {
    const recCard = el('div', { className: 'section-card' });
    recCard.appendChild(el('h3', null, 'Keeps coming up'));
    recurring.slice(0, 8).forEach(([text, count]) => {
      recCard.appendChild(el('p', null,
        el('span', null, text),
        el('span', { className: 'sub-text' }, ' (' + count + 'x)'),
      ));
    });
    a.appendChild(recCard);
    a.appendChild(el('div', { className: 'spacer' }));
  }

  a.appendChild(el('div', { className: 'spacer' }));
  a.appendChild(el('button', { className: 'btn btn-escape', onClick: () => go('DONE') }, 'Back'));
}

// ─── EXPORT ───
function exportJsonl(session) {
  const line = JSON.stringify(session);
  const blob = new Blob([line + '\n'], { type: 'application/jsonl' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().split('T')[0];
  a.href = url;
  a.download = 'bring-log-' + date + '.jsonl';
  a.click();
  URL.revokeObjectURL(url);
}

function copyForAI(session) {
  const date = new Date(session.ts).toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
  const musts = session.items.filter(i => i.priority === 'must');
  const wants = session.items.filter(i => i.priority === 'want');
  let md = '## Bring Session \u2014 ' + date + '\n';
  if (session.emotional.state && session.emotional.state !== 'skipped') {
    md += '**Feeling:** ' + session.emotional.state;
    if (session.emotional.note) md += ' \u2014 ' + session.emotional.note;
    md += '\n';
  }
  if (musts.length > 0) {
    md += '**Must:** ' + musts.map(i => i.text + (i.cat ? ' [' + i.cat + ']' : '')).join(', ') + '\n';
  }
  if (wants.length > 0) {
    md += '**Want:** ' + wants.map(i => i.text + (i.cat ? ' [' + i.cat + ']' : '')).join(', ') + '\n';
  }
  if (session.blockers.length > 0) {
    md += '**Blockers:** ' + session.blockers.map(b => b.text).join(', ') + '\n';
  }
  if (session.braindump) {
    md += '**Braindump:** ' + session.braindump.replace(/\n/g, ' ').substring(0, 200) + '\n';
  }

  navigator.clipboard.writeText(md).then(() => {
    const btn = app().querySelector('.btn-state');
    if (btn) {
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = orig; }, 1500);
    }
  });
}

    el('button', { className: 'btn btn-escape', onClick: () => {
      clearCurrent();
      render();
    }}, 'Start fresh'),
  ));
} else {
  render();
}
