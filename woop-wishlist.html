<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loz — Wishlist & Possessions</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e0e12;
  --surface: #17171f;
  --surface2: #1e1e28;
  --border: rgba(255,255,255,0.07);
  --text: #f0f0f5;
  --text-muted: #888899;
  --primary: #7c6fdd;
  --primary-glow: rgba(124,111,221,0.2);
  --accent: #e8a44a;
  --green: #4ade80;
  --red: #f87171;
  --amber: #fbbf24;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
}

@media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ──────────────────────────────────────────────────────── */
.header {
  padding: 1rem 1.5rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  gap: 1rem; flex-wrap: wrap;
}

.header-brand { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.02em; }
.header-brand span { color: var(--primary); }

.header-right { display: flex; align-items: center; gap: 1.25rem; flex-wrap: wrap; }

.header-totals { display: flex; gap: 1.25rem; font-size: 0.78rem; color: var(--text-muted); }
.total-val { color: var(--accent); font-weight: 700; font-size: 0.95rem; display: block; }

.btn-resolve {
  display: flex; align-items: center; gap: 0.4rem;
  padding: 0.5rem 1rem; border-radius: var(--radius-sm);
  background: var(--primary-glow); border: 1px solid var(--primary);
  color: var(--primary); font: inherit; font-size: 0.78rem; font-weight: 700;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.btn-resolve:hover { background: rgba(124,111,221,0.3); }
.btn-resolve:disabled { opacity: 0.5; cursor: wait; }
.btn-pack {
  display: flex; align-items: center; gap: 0.4rem;
  padding: 0.5rem 1rem; border-radius: var(--radius-sm);
  background: rgba(232,164,74,0.12); border: 1px solid var(--accent);
  color: var(--accent); font: inherit; font-size: 0.78rem; font-weight: 700;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.btn-pack:hover { background: rgba(232,164,74,0.25); }

.btn-pf {
  display: flex; align-items: center; gap: 0.4rem;
  padding: 0.5rem 1rem; border-radius: var(--radius-sm);
  background: rgba(74,222,128,0.1); border: 1px solid var(--green);
  color: var(--green); font: inherit; font-size: 0.78rem; font-weight: 700;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.btn-pf:hover { background: rgba(74,222,128,0.22); }
.btn-pf:disabled { opacity: 0.5; cursor: wait; }

/* ── Resolve status bar ──────────────────────────────────────────── */
.resolve-bar {
  display: none;
  padding: 0.6rem 1.5rem;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  font-size: 0.78rem; color: var(--text-muted);
  align-items: center; gap: 1rem; flex-wrap: wrap;
}
.resolve-bar.show { display: flex; }
.resolve-progress { flex: 1; min-width: 200px; }
.resolve-track { height: 3px; background: rgba(124,111,221,0.15); border-radius: 2px; margin-top: 4px; }
.resolve-fill { height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.4s; }
.resolve-log { font-size: 0.7rem; color: var(--text-muted); font-family: monospace; max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Tabs ────────────────────────────────────────────────────────── */
.tabs {
  display: flex; background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem; overflow-x: auto;
}
.tab {
  padding: 0.7rem 1.35rem;
  font: inherit; font-size: 0.82rem; font-weight: 600;
  color: var(--text-muted); background: none; border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.tab:hover { color: var(--text); }
.tab.active-wish { color: var(--primary); border-bottom-color: var(--primary); }
.tab.active-own  { color: var(--green);   border-bottom-color: var(--green); }

/* ── Grid ────────────────────────────────────────────────────────── */
.grid-area { padding: 1.25rem 1.5rem; }

.section-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.1rem;
}
.section-title { font-size: 0.78rem; font-weight: 700; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; }

.toolbar { display: flex; gap: 0.65rem; padding: 0 1.5rem 1rem; flex-wrap: wrap; }
.search-input {
  flex: 1; min-width: 160px; padding: 0.55rem 0.9rem;
  border-radius: var(--radius-sm); background: var(--surface);
  border: 1px solid var(--border); color: var(--text); font: inherit; font-size: 0.85rem; outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--primary); }
.search-input::placeholder { color: var(--text-muted); }
.sort-select {
  padding: 0.55rem 0.85rem; border-radius: var(--radius-sm);
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); font: inherit; font-size: 0.82rem; outline: none; cursor: pointer;
}
.sort-select option { background: var(--surface); }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 1rem;
}

/* ── Card ────────────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
  transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
}
.card:hover { transform: translateY(-3px); box-shadow: var(--shadow); border-color: rgba(255,255,255,0.13); }
.card.wishlist-card:hover { border-color: var(--primary); box-shadow: 0 4px 24px var(--primary-glow); }
.card.owned-card:hover    { border-color: var(--green);   box-shadow: 0 4px 16px rgba(74,222,128,0.12); }

/* Ribbon */
.ribbon {
  position: absolute; top: 8px; left: 8px; z-index: 5;
  padding: 2px 7px; border-radius: 4px;
  font-size: 0.6rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
}
.ribbon.p-must { background: rgba(248,113,113,0.9); color: #fff; }
.ribbon.p-want { background: rgba(124,111,221,0.9); color: #fff; }
.ribbon.p-nice { background: rgba(80,80,100,0.85); color: #ccc; }

/* Image verify badge */
.verify-badge {
  position: absolute; bottom: 6px; right: 6px; z-index: 5;
  padding: 2px 6px; border-radius: 4px;
  font-size: 0.58rem; font-weight: 700; letter-spacing: 0.04em;
  display: flex; align-items: center; gap: 3px;
}
.verify-badge.confirmed { background: rgba(74,222,128,0.15); border: 1px solid rgba(74,222,128,0.3); color: var(--green); }
.verify-badge.pending   { background: rgba(251,191,36,0.12); border: 1px solid rgba(251,191,36,0.3);  color: var(--amber); }
.verify-badge.failed    { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3); color: var(--red); }

/* Delete */
.btn-delete {
  position: absolute; top: 7px; right: 7px; z-index: 6;
  width: 24px; height: 24px; border-radius: 50%;
  background: rgba(0,0,0,0.65); border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-muted); font-size: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.15s;
}
.card:hover .btn-delete { opacity: 1; }
.btn-delete:hover { background: var(--red); color: #fff; border-color: var(--red); }

/* Image */
.card-img-wrap {
  width: 100%; height: 172px; overflow: hidden;
  background: var(--surface2); position: relative;
}
.card-img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.4s; display: none;
}
.card-img.loaded { display: block; }
.card:hover .card-img { transform: scale(1.04); }

.img-placeholder {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 0.5rem; color: var(--text-muted); font-size: 0.72rem;
}
.img-placeholder-icon { font-size: 2.2rem; }
.img-placeholder.resolving { color: var(--primary); }
.img-placeholder.resolving .img-placeholder-icon { animation: spin 1.5s linear infinite; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

/* Card body */
.card-body { padding: 0.8rem; }
.card-name {
  font-size: 0.9rem; font-weight: 700; margin-bottom: 0.2rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-note {
  font-size: 0.72rem; color: var(--text-muted); margin-bottom: 0.55rem;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-meta { display: flex; align-items: center; justify-content: space-between; gap: 0.4rem; }
.price-tag { font-size: 1.05rem; font-weight: 800; color: var(--accent); letter-spacing: -0.02em; }
.price-unknown { font-size: 0.78rem; color: var(--text-muted); }
.cat-pill {
  font-size: 0.6rem; font-weight: 700; letter-spacing: 0.04em;
  padding: 2px 6px; border-radius: 4px; text-transform: uppercase;
  background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border);
}

/* Card footer */
.card-footer { padding: 0 0.8rem 0.8rem; display: flex; flex-direction: column; gap: 0.35rem; }
.btn-buy {
  display: block; width: 100%; padding: 0.5rem;
  background: var(--primary); color: #fff; font: inherit; font-size: 0.78rem; font-weight: 700;
  border: none; border-radius: var(--radius-sm); cursor: pointer; text-align: center;
  text-decoration: none; transition: background 0.15s;
}
.btn-buy:hover { background: #9284e8; }
.btn-buy.no-url { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); cursor: default; }
.btn-owned-label {
  display: block; width: 100%; padding: 0.45rem;
  text-align: center; font-size: 0.72rem; color: var(--green);
  border: 1px solid rgba(74,222,128,0.2); border-radius: var(--radius-sm);
  background: rgba(74,222,128,0.05);
}
.btn-mark-owned {
  display: block; width: 100%; padding: 0.4rem;
  background: transparent; border: 1px solid rgba(74,222,128,0.18);
  border-radius: var(--radius-sm); color: var(--green);
  font: inherit; font-size: 0.7rem; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
}
.btn-mark-owned:hover { background: rgba(74,222,128,0.08); }
.btn-recheck {
  display: block; width: 100%; padding: 0.38rem;
  background: transparent; border: 1px solid rgba(124,111,221,0.2);
  border-radius: var(--radius-sm); color: var(--primary);
  font: inherit; font-size: 0.68rem; font-weight: 600;
  cursor: pointer; transition: all 0.15s; text-align: center;
}
.btn-recheck:hover { background: var(--primary-glow); }

/* ── Image edit switch panel ─────────────────────────────────────── */
/* ── Image Hunter Modal ──────────────────────────────────────────── */
.hunter-overlay {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
  align-items: center; justify-content: center; padding: 1rem;
}
.hunter-overlay.open { display: flex; }
.hunter-modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; width: 100%; max-width: 860px;
  max-height: 90vh; display: flex; flex-direction: column;
  box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  animation: modalIn 0.18s ease;
}
@keyframes modalIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.hunter-header {
  padding: 1rem 1.25rem 0.75rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 1rem;
}
.hunter-title { font-size: 0.9rem; font-weight: 700; }
.hunter-title span { color: var(--primary); }
.hunter-close {
  background: none; border: none; color: var(--text-muted);
  font-size: 1.2rem; cursor: pointer; line-height: 1; padding: 0.2rem;
}
.hunter-close:hover { color: var(--text); }
.hunter-body {
  display: grid; grid-template-columns: 1fr 280px;
  gap: 0; overflow: hidden; flex: 1; min-height: 0;
}
/* LEFT — sources */
.hunter-sources {
  padding: 1rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem;
  border-right: 1px solid var(--border);
}
.source-row { display: flex; flex-direction: column; gap: 0.45rem; }
.source-label {
  display: flex; align-items: center; gap: 0.5rem;
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
}
.source-badge {
  padding: 1px 7px; border-radius: 99px; font-size: 0.6rem; font-weight: 700;
}
.source-badge.ok      { background: rgba(74,222,128,0.12); color: var(--green); border: 1px solid rgba(74,222,128,0.25); }
.source-badge.empty   { background: rgba(251,191,36,0.1);  color: var(--amber);  border: 1px solid rgba(251,191,36,0.2); }
.source-badge.error   { background: rgba(248,113,113,0.1); color: var(--red);    border: 1px solid rgba(248,113,113,0.2); }
.source-badge.loading { background: rgba(124,111,221,0.1); color: var(--primary);border: 1px solid rgba(124,111,221,0.2); animation: pulse 1.2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.source-thumbs { display: flex; flex-wrap: wrap; gap: 0.4rem; }
.source-thumb {
  width: 68px; height: 52px; object-fit: cover;
  border-radius: 6px; border: 2px solid transparent;
  cursor: pointer; transition: all 0.15s; background: var(--surface2);
  flex-shrink: 0;
}
.source-thumb:hover   { border-color: var(--primary); transform: scale(1.06); }
.source-thumb.selected { border-color: var(--green); box-shadow: 0 0 0 1px var(--green); }
.source-empty { font-size: 0.72rem; color: var(--text-muted); font-style: italic; }
/* RIGHT — selected preview + save */
.hunter-sidebar {
  padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem;
  overflow-y: auto;
}
.hunter-preview-wrap {
  width: 100%; aspect-ratio: 4/3; border-radius: 10px;
  overflow: hidden; background: var(--surface2);
  border: 1px solid var(--border); position: relative;
}
.hunter-preview-img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.hunter-preview-empty {
  position: absolute; inset: 0; display: flex;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 0.4rem; color: var(--text-muted); font-size: 0.72rem;
}
.hunter-confidence {
  font-size: 0.75rem; font-weight: 700; padding: 0.25rem 0.6rem;
  border-radius: 99px; display: inline-block;
}
.hunter-confidence.high { background: rgba(74,222,128,0.15); color: var(--green); }
.hunter-confidence.mid  { background: rgba(251,191,36,0.12);  color: var(--amber); }
.hunter-confidence.low  { background: rgba(248,113,113,0.1);  color: var(--red); }
.hunter-confidence.checking { background: rgba(124,111,221,0.1); color: var(--primary); animation: pulse 1.2s infinite; }
.hunter-desc { font-size: 0.72rem; color: var(--text-muted); line-height: 1.45; }
.hunter-divider { border: none; border-top: 1px solid var(--border); margin: 0; }
.hunter-manual-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
.hunter-url-input {
  width: 100%; padding: 0.45rem 0.6rem;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font: inherit; font-size: 0.75rem;
  outline: none; transition: border-color 0.15s;
}
.hunter-url-input:focus { border-color: var(--primary); }
.hunter-url-input::placeholder { color: var(--text-muted); opacity: 0.5; }
.hunter-ext-links { display: flex; gap: 0.35rem; flex-wrap: wrap; }
.hunter-ext-link {
  padding: 0.3rem 0.55rem; font-size: 0.66rem; font-weight: 600;
  border: 1px solid var(--border); border-radius: 6px;
  text-decoration: none; color: var(--text-muted); transition: all 0.15s;
}
.hunter-ext-link:hover { border-color: var(--primary); color: var(--primary); }
.hunter-footer {
  padding: 0.75rem 1.25rem; border-top: 1px solid var(--border);
  display: flex; gap: 0.5rem; justify-content: flex-end;
}
.btn-hunter-cancel {
  padding: 0.5rem 1rem; background: transparent; border: 1px solid var(--border);
  border-radius: 8px; color: var(--text-muted); font: inherit; font-size: 0.8rem;
  cursor: pointer; transition: all 0.15s;
}
.btn-hunter-cancel:hover { border-color: var(--text-muted); color: var(--text); }
.btn-hunter-save {
  padding: 0.5rem 1.25rem; background: var(--primary); border: none;
  border-radius: 8px; color: #fff; font: inherit; font-size: 0.8rem; font-weight: 700;
  cursor: pointer; transition: background 0.15s;
}
.btn-hunter-save:hover { background: #9284e8; }
.btn-hunter-save:disabled { opacity: 0.4; cursor: default; }
/* Card hunt button */
.btn-hunt {
  display: block; width: 100%; padding: 0.38rem;
  background: transparent; border: 1px solid rgba(232,164,74,0.25);
  border-radius: var(--radius-sm); color: var(--accent);
  font: inherit; font-size: 0.68rem; font-weight: 600;
  cursor: pointer; transition: all 0.15s; text-align: center;
}
.btn-hunt:hover { background: rgba(232,164,74,0.1); }

/* Add card */
.btn-add-card {
  background: transparent; border: 1px dashed rgba(255,255,255,0.08);
  border-radius: var(--radius); min-height: 265px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 0.65rem; cursor: pointer; transition: all 0.15s;
  color: var(--text-muted); font: inherit; width: 100%;
}
.btn-add-card:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-glow); }
.btn-add-icon { font-size: 1.8rem; }
.btn-add-label { font-size: 0.78rem; font-weight: 600; }

/* ── Modal ───────────────────────────────────────────────────────── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.82); z-index: 200;
  align-items: center; justify-content: center;
}
.overlay.show { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.4rem;
  width: 420px; max-width: 95vw; max-height: 90vh;
  overflow-y: auto; box-shadow: var(--shadow);
}
.modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 1.1rem; }
.field { margin-bottom: 0.85rem; }
.field label {
  display: block; font-size: 0.68rem; font-weight: 600;
  color: var(--text-muted); letter-spacing: 0.05em;
  text-transform: uppercase; margin-bottom: 0.3rem;
}
.field input, .field select, .field textarea {
  width: 100%; padding: 0.55rem 0.8rem;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); font: inherit; font-size: 0.88rem;
  color: var(--text); outline: none; transition: border-color 0.15s;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--primary); }
.field select option { background: var(--surface2); }
.field textarea { resize: vertical; min-height: 55px; }

.img-preview-wrap { margin-top: 0.5rem; position: relative; height: 110px; border-radius: var(--radius-sm); overflow: hidden; background: var(--surface2); display: none; border: 1px solid var(--border); }
.img-preview-wrap.show { display: block; }
.img-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
.img-preview.loaded { display: block; }
.img-preview-placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 0.75rem; }

.modal-actions { display: flex; gap: 0.65rem; margin-top: 1.1rem; }
.btn-modal { flex: 1; padding: 0.6rem; border-radius: var(--radius-sm); font: inherit; font-size: 0.82rem; font-weight: 700; cursor: pointer; border: 1px solid; }
.btn-save { background: var(--primary); border-color: var(--primary); color: #fff; }
.btn-save:hover { background: #9284e8; }
.btn-abort { background: transparent; border-color: var(--border); color: var(--text-muted); }
.btn-abort:hover { color: var(--text); }

/* Empty state */
.empty { grid-column: 1/-1; text-align: center; padding: 4rem 2rem; color: var(--text-muted); font-size: 0.88rem; }
.empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
</style>
<!-- Picture Finder bridge — loads when server is running on port 8776 -->
<script>
  // Silently load pf-bridge.js — won't break if Picture Finder isn't running
  (function() {
    const s = document.createElement('script');
    s.src = 'http://localhost:8776/pf-bridge.js';
    s.onerror = () => {}; // silent fail if server offline
    document.head.appendChild(s);
  })();
</script>
</head>
<body>

<header class="header">
  <div class="header-brand">Loz — <span>Wish</span>list</div>
  <div class="header-right">
    <div class="header-totals">
      <div><span class="total-val" id="hWishCount">0</span>wanted</div>
      <div><span class="total-val" id="hWishCost">£?</span>total</div>
      <div><span class="total-val" id="hOwnCount">0</span>owned</div>
    </div>

// ── Startup: patch images + merge any new defaults not yet in localStorage ─
(function patchBakedImages() {
  let changed = false;

  // 1. Patch existing items missing a baked image
  wishes.forEach(w => {
    if (!w.img && BAKED_IMGS[w.id]) { w.img = BAKED_IMGS[w.id]; changed = true; }
  });

  // 2. Merge any WISH_DEFAULTS items the user doesn't have yet (by id)
  const existingIds = new Set(wishes.map(w => w.id));
  WISH_DEFAULTS.forEach(def => {
    if (!existingIds.has(def.id)) { wishes.push(def); changed = true; }
  });

  if (changed) saveWish(wishes);

  // 3. Seed verified cache for all baked images
  Object.entries(BAKED_IMGS).forEach(([id, url]) => {
    if (!verified[id] || !verified[id].img_url) {
      verified[id] = { img_url: url, confidence: 95, verified: true, manual: true };
    }
  });
  saveVerified(verified);
})();

// ── Image logic ─────────────────────────────────────────────────────────

function getImg(item) {
  if (item.img) return { url: item.img, status: 'manual' };
  const v = verified[item.id];
  if (v && v.verified && v.img_url) return { url: v.img_url, status: 'confirmed', confidence: v.confidence };
  if (v && !v.verified) return { url: null, status: 'failed' };
  return { url: null, status: 'pending' };
}

// ── Resolver ─────────────────────────────────────────────────────────────

async function runResolver(forceId = null) {
  if (resolving) return;
  resolving = true;

  const btn = document.getElementById('btnResolve');
  const bar = document.getElementById('resolveBar');
  btn.disabled = true;
  bar.classList.add('show');

  const allItems = [...wishes, ...owned];
  const toResolve = forceId
    ? allItems.filter(i => i.id === forceId)
    : allItems.filter(i => !i.img && (!verified[i.id] || !verified[i.id].verified));

  if (!toResolve.length) {
    setResolveStatus('All images verified ✓', 100, '');
    setTimeout(() => { bar.classList.remove('show'); btn.disabled = false; resolving = false; }, 2000);
    return;
  }

  // Check if resolver service is up
  try {
    const hRes = await fetch(RESOLVER + '/api/health', { signal: AbortSignal.timeout(3000) });
    if (!hRes.ok) throw new Error();
  } catch {
    setResolveStatus('⚠ image-resolver.py not running — start it first', 0, 'Run: python image-resolver.py');
    btn.disabled = false;
    resolving = false;
    return;
  }

  for (let i = 0; i < toResolve.length; i++) {
    const item = toResolve[i];
    const pct = Math.round((i / toResolve.length) * 100);
    setResolveStatus(`Resolving ${i+1}/${toResolve.length}: ${item.name}`, pct, `Searching Wikipedia + AI verify...`);

    try {
      const res = await fetch(`${RESOLVER}/api/resolve?q=${encodeURIComponent(item.name)}&id=${encodeURIComponent(item.id)}${forceId ? '&force=1' : ''}`);
      const data = await res.json();

      if (data.verified && data.img_url) {
        verified[item.id] = { img_url: data.img_url, confidence: data.confidence, verified: true, description: data.description };
        setResolveStatus(`${item.name} ✓ (${data.confidence}%)`, pct, data.description);
      } else {
        verified[item.id] = { img_url: null, verified: false, reason: data.reason || 'No match found' };
        setResolveStatus(`${item.name} — no match`, pct, data.reason || '');
      }
      saveVerified(verified);
      renderCards();
    } catch (err) {
      setResolveStatus(`Error on ${item.name}: ${err.message}`, pct, '');
    }

    await sleep(400);
  }

  setResolveStatus(`Done — ${toResolve.length} items processed`, 100, '');
  setTimeout(() => { bar.classList.remove('show'); }, 3000);
  btn.disabled = false;
  resolving = false;
}

function setResolveStatus(msg, pct, log) {
  document.getElementById('resolveStatus').textContent = msg;
  document.getElementById('resolveFill').style.width = pct + '%';
  if (log) document.getElementById('resolveLog').textContent = log;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function openPictureFinder() {
  if (typeof PictureFinder === 'undefined') {
    alert('Picture Finder server is not running.\n\nStart it with:\n  cd picture-finder\n  python server.py\n\nThen refresh this page.');
    return;
  }
  // Build item list from BOTH wishes and owned items
  const allItems = [
    ...wishes.map(w => ({ id: w.id, name: w.name, currentImg: w.img || null })),
    ...owned.map(o  => ({ id: o.id, name: o.name, currentImg: o.img || null })),
  ];
  document.getElementById('btnPF').disabled = true;
  document.getElementById('btnPF').textContent = '🖼 Loading…';

  PictureFinder.open(allItems, (imageMap) => {
    // imageMap = { 'item-id': 'https://...' }
    let changed = 0;
    Object.entries(imageMap).forEach(([id, url]) => {
      const wish = wishes.find(w => w.id === id);
      if (wish) { wish.img = url; changed++; }
      const own = owned.find(o => o.id === id);
      if (own) { own.img = url; changed++; }
    });
    if (changed) {
      saveWish(wishes);
      saveOwn(owned);
      render();
    }
    document.getElementById('btnPF').disabled = false;
    document.getElementById('btnPF').textContent = '🖼 Picture Finder';
  });

  // Reset button label when modal closes (in case user dismisses without saving)
  setTimeout(() => {
    document.getElementById('btnPF').disabled = false;
    document.getElementById('btnPF').textContent = '🖼 Picture Finder';
  }, 500);
}

  document.getElementById('hunterAmazonLink').href = `https://www.amazon.co.uk/s?k=${q}`;

  // Show loading state for all sources
  const sourcesEl = document.getElementById('hunterSources');
  sourcesEl.innerHTML = Object.entries(SOURCE_LABELS).map(([k, v]) => `
    <div class="source-row" id="src-${k}">
      <div class="source-label">
        ${v.icon} ${v.label}
        <span class="source-badge loading">Searching…</span>
      </div>
      <div class="source-thumbs"><div class="source-empty">—</div></div>
    </div>
  `).join('');

  // Open overlay
  document.getElementById('hunterOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Check resolver is running
  let resolverOk = false;
  try {
    const h = await fetch(`${RESOLVER}/api/health`, { signal: AbortSignal.timeout(2000) });
    resolverOk = (await h.json()).ok;
  } catch {}

  if (!resolverOk) {
    sourcesEl.innerHTML = `
      <div style="padding:2rem;text-align:center;color:var(--amber);">
        <div style="font-size:1.5rem;margin-bottom:0.5rem">⚠️</div>
        <div style="font-weight:700;margin-bottom:0.5rem">image-resolver.py is not running</div>
        <div style="font-size:0.78rem;color:var(--text-muted);">
          Open a terminal and run:<br>
          <code style="background:var(--surface2);padding:2px 8px;border-radius:4px;color:var(--primary);">python image-resolver.py</code>
        </div>
        <div style="margin-top:1rem;font-size:0.75rem;color:var(--text-muted)">
          Or paste a URL directly in the sidebar →
        </div>
      </div>`;
    return;
  }

  // Fetch all sources
  try {
    const params = new URLSearchParams({ q: name, id, url: itemUrl || '' });
    const res  = await fetch(`${RESOLVER}/api/hunt?${params}`);
    const data = await res.json();
    renderHunterSources(data.sources, name);
  } catch (e) {
    sourcesEl.innerHTML = `<div style="padding:2rem;color:var(--red)">Error: ${e.message}</div>`;
  }
}

function renderHunterSources(sources, itemName) {
  const sourcesEl = document.getElementById('hunterSources');
  sourcesEl.innerHTML = '';

  for (const [key, meta] of Object.entries(SOURCE_LABELS)) {
    const srcData = sources[key] || { status: 'empty', candidates: [] };
    const { status, candidates } = srcData;

    const row = document.createElement('div');
    row.className = 'source-row';

    const badgeClass = status === 'ok' ? 'ok' : status === 'error' ? 'error' : 'empty';
    const badgeText  = status === 'ok'
      ? `${candidates.length} found`
      : status === 'error' ? 'Error' : 'None found';

    row.innerHTML = `
      <div class="source-label">
        ${meta.icon} ${meta.label}
        <span class="source-badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="source-thumbs" id="thumbs-${key}"></div>
    `;
    sourcesEl.appendChild(row);

    const thumbsEl = row.querySelector(`#thumbs-${key}`);
    if (!candidates.length) {
      thumbsEl.innerHTML = '<div class="source-empty">No results from this source</div>';
    } else {
      for (const url of candidates) {
        const img = document.createElement('img');
        img.className = 'source-thumb';
        img.src   = url;
        img.title = url;
        img.loading = 'lazy';
        img.onerror = () => { img.style.display = 'none'; };
        img.addEventListener('click', () => selectHunterThumb(url, itemName, img));
        thumbsEl.appendChild(img);
      }
    }
  }
}

async function selectHunterThumb(url, itemName, thumbEl) {
  // Highlight selected thumb
  document.querySelectorAll('.source-thumb').forEach(t => t.classList.remove('selected'));
  thumbEl.classList.add('selected');

  hunterState.selectedUrl = url;
  document.getElementById('hunterUrlInput').value = url;

  // Show preview
  const previewImg   = document.getElementById('hunterPreviewImg');
  const previewEmpty = document.getElementById('hunterPreviewEmpty');
  previewImg.src     = url;
  previewImg.style.display = 'block';
  previewEmpty.style.display = 'none';

  // Enable save
  document.getElementById('hunterSaveBtn').disabled = false;

  // Show checking badge
  const confEl = document.getElementById('hunterConfidence');
  confEl.innerHTML = '<span class="hunter-confidence checking">🤖 Checking with AI…</span>';
  document.getElementById('hunterDesc').textContent = '';

  // Call /api/verify
  try {
    const params = new URLSearchParams({ url, q: itemName });
    const res    = await fetch(`${RESOLVER}/api/verify?${params}`,
                               { signal: AbortSignal.timeout(20000) });
    const v      = await res.json();
    const pct    = v.confidence || 0;
    const cls    = pct >= 70 ? 'high' : pct >= 40 ? 'mid' : 'low';
    const icon   = v.match ? '✓' : '✕';
    confEl.innerHTML = `<span class="hunter-confidence ${cls}">${icon} AI: ${pct}%</span>`;
    document.getElementById('hunterDesc').textContent = v.description || v.reason || '';
  } catch {
    confEl.innerHTML = '<span class="hunter-confidence low">AI check failed — save anyway</span>';
  }
}

function onHunterUrlInput(val) {
  if (val && val.startsWith('http')) {
    document.querySelectorAll('.source-thumb').forEach(t => t.classList.remove('selected'));
    hunterState.selectedUrl = val;
    document.getElementById('hunterSaveBtn').disabled = false;

    const previewImg   = document.getElementById('hunterPreviewImg');
    const previewEmpty = document.getElementById('hunterPreviewEmpty');
    previewImg.src     = val;
    previewImg.style.display = 'block';
    previewEmpty.style.display = 'none';
    document.getElementById('hunterConfidence').innerHTML = '';
    document.getElementById('hunterDesc').textContent = '';
  } else {
    hunterState.selectedUrl = null;
    document.getElementById('hunterSaveBtn').disabled = true;
  }
}

function saveHunterImage() {
  const { id, list, selectedUrl } = hunterState;
  if (!id || !selectedUrl) return;

  if (list === 'wish') {
    const item = wishes.find(w => w.id === id);
    if (item) { item.img = selectedUrl; saveWish(wishes); }
  } else {
    const item = owned.find(o => o.id === id);
    if (item) { item.img = selectedUrl; saveOwn(owned); }
  }

  verified[id] = { img_url: selectedUrl, confidence: 100, verified: true, manual: true };
  saveVerified(verified);

  renderCards();
  closeHunter();
}

function closeHunter() {
  document.getElementById('hunterOverlay').classList.remove('open');
  document.body.style.overflow = '';
  hunterState = { id: null, list: null, name: null, selectedUrl: null };
}

// ── YouTube gear pack ────────────────────────────────────────────────────
function loadYoutubePack() {
  const existingIds = new Set(wishes.map(w => w.id));
  const fresh = YOUTUBE_PACK.filter(item => !existingIds.has(item.id));
  if (!fresh.length) { alert('YouTube gear already loaded ✓'); return; }
  wishes = [...wishes, ...fresh];
  saveWish(wishes);
  renderCards();
  // switch to wishlist tab so user sees the new items
  currentView = 'wish';
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === 'wish'));
  document.getElementById('view-wish').style.display = '';
  document.getElementById('view-own').style.display = 'none';
  // flash the button
  const btn = document.querySelector('.btn-pack');
  const orig = btn.textContent;
  btn.textContent = `✓ ${fresh.length} items added`;
  setTimeout(() => { btn.textContent = orig; }, 2500);
}

function renderWish() {
  const grid = document.getElementById('wishGrid');
  const q = (document.getElementById('wishSearch')?.value || '').toLowerCase();
  const sort = document.getElementById('wishSort')?.value || 'priority';

  let items = wishes.filter(w => !q || w.name.toLowerCase().includes(q) || (w.note||'').toLowerCase().includes(q));

  if (sort === 'priority')   items.sort((a,b) => (PRIO_ORDER[a.prio]||1) - (PRIO_ORDER[b.prio]||1));
  else if (sort === 'price-asc')  items.sort((a,b) => (a.price||0) - (b.price||0));
  else if (sort === 'price-desc') items.sort((a,b) => (b.price||0) - (a.price||0));
  else if (sort === 'name')  items.sort((a,b) => a.name.localeCompare(b.name));
  else if (sort === 'added') items.sort((a,b) => (b.added||0) - (a.added||0));

  document.getElementById('wishCount').textContent = `(${items.length})`;
  grid.innerHTML = '';
  if (!items.length) { grid.innerHTML = '<div class="empty"><div class="empty-icon">✦</div>Wishlist is empty.</div>'; }
  else { items.forEach(w => grid.appendChild(makeWishCard(w))); }
  const add = document.createElement('button');
  add.className = 'btn-add-card';
  add.innerHTML = '<div class="btn-add-icon">+</div><div class="btn-add-label">Add to wishlist</div>';
  add.onclick = () => openModal('wish');
  grid.appendChild(add);
  renderHeader();
}

function renderOwned() {
  const grid = document.getElementById('ownGrid');
  const q = (document.getElementById('ownSearch')?.value || '').toLowerCase();
  let items = owned.filter(o => !q || o.name.toLowerCase().includes(q) || (o.note||'').toLowerCase().includes(q));
  document.getElementById('ownCount').textContent = `(${items.length})`;
  grid.innerHTML = '';
  if (!items.length) { grid.innerHTML = '<div class="empty"><div class="empty-icon">✓</div>No items yet.</div>'; }
  else { items.forEach(o => grid.appendChild(makeOwnedCard(o))); }
  const add = document.createElement('button');
  add.className = 'btn-add-card';
  add.innerHTML = '<div class="btn-add-icon">+</div><div class="btn-add-label">Add owned item</div>';
  add.onclick = () => openModal('own');
  grid.appendChild(add);
  renderHeader();
}

function renderHeader() {
  document.getElementById('hWishCount').textContent = wishes.length;
  const cost = wishes.reduce((s,w) => s + (parseFloat(w.price)||0), 0);
  document.getElementById('hWishCost').textContent = cost > 0 ? '£' + cost.toFixed(2) : '£?';
  document.getElementById('hOwnCount').textContent  = owned.length;
}

// ── Card builders ────────────────────────────────────────────────────────

function makeWishCard(w) {
  const div = document.createElement('div');
  div.className = 'card wishlist-card';
  div.id = 'card-' + w.id;

  const prioClass = { must:'p-must', want:'p-want', nice:'p-nice' }[w.prio] || 'p-want';
  const prioLabel = { must:'MUST HAVE', want:'WANT', nice:'NICE' }[w.prio] || 'WANT';
  const imgInfo = getImg(w);
  const icon = CAT_ICONS[w.cat] || '📦';

  let verifyBadge = '';
  if (imgInfo.status === 'confirmed') verifyBadge = `<div class="verify-badge confirmed">✓ AI ${imgInfo.confidence}%</div>`;
  else if (imgInfo.status === 'failed') verifyBadge = `<div class="verify-badge failed">✕ No match</div>`;
  else if (imgInfo.status === 'manual') verifyBadge = `<div class="verify-badge confirmed">✓ Manual</div>`;
  else verifyBadge = `<div class="verify-badge pending">⧖ Unverified</div>`;

  let placeholderClass = 'img-placeholder';
  let placeholderText = 'No image yet';

  div.innerHTML = `
    <button class="btn-delete" onclick="deleteItem('wish','${w.id}')" title="Remove">✕</button>
    <div class="ribbon ${prioClass}">${prioLabel}</div>
    <div class="card-img-wrap">
      <div class="${placeholderClass}" id="ph-${w.id}">
        <div class="img-placeholder-icon">${icon}</div>
        <div>${placeholderText}</div>
      </div>
      ${imgInfo.url ? `<img class="card-img" src="${esc(imgInfo.url)}" alt="${esc(w.name)}"
        onload="this.classList.add('loaded'); document.getElementById('ph-${w.id}').style.display='none';"
        onerror="this.classList.remove('loaded'); document.getElementById('ph-${w.id}').style.display='flex';">` : ''}
      ${verifyBadge}
    </div>
    <div class="card-body">
      <div class="card-name" title="${esc(w.name)}">${esc(w.name)}</div>
      ${w.note ? `<div class="card-note">${esc(w.note)}</div>` : ''}
      <div class="card-meta">
        ${w.price > 0 ? `<div class="price-tag">£${parseFloat(w.price).toFixed(2)}</div>` : `<div class="price-unknown">£ unknown</div>`}
        <div class="cat-pill">${esc(w.cat||'other')}</div>
      </div>
    </div>
    <div class="card-footer">
      ${w.url ? `<a class="btn-buy" href="${esc(w.url)}" target="_blank" rel="noopener">BUY NOW →</a>` : `<div class="btn-buy no-url">No link yet</div>`}
      <button class="btn-mark-owned" onclick="moveToOwned('${w.id}')">✓ Mark as owned</button>
      <button class="btn-hunt" onclick="showHunter('${w.id}','wish','${esc(w.name)}','${esc(w.url||'')}')">🔍 Hunt images</button>
    </div>
  `;

  div.querySelector('.card-img-wrap').addEventListener('dblclick', () => editItem('wish', w.id));
  return div;
}

function makeOwnedCard(o) {
  const div = document.createElement('div');
  div.className = 'card owned-card';
  div.id = 'card-' + o.id;

  const imgInfo = getImg(o);
  const icon = CAT_ICONS[o.cat] || '📦';

  let verifyBadge = '';
  if (imgInfo.status === 'confirmed') verifyBadge = `<div class="verify-badge confirmed">✓ AI ${imgInfo.confidence}%</div>`;
  else if (imgInfo.status === 'failed') verifyBadge = `<div class="verify-badge failed">✕ No match</div>`;
  else if (imgInfo.status === 'manual') verifyBadge = `<div class="verify-badge confirmed">✓ Manual</div>`;

  div.innerHTML = `
    <button class="btn-delete" onclick="deleteItem('own','${o.id}')" title="Remove">✕</button>
    <div class="card-img-wrap">
      <div class="img-placeholder" id="ph-${o.id}">
        <div class="img-placeholder-icon">${icon}</div>
        <div>No image yet</div>
      </div>
      ${imgInfo.url ? `<img class="card-img" src="${esc(imgInfo.url)}" alt="${esc(o.name)}"
        onload="this.classList.add('loaded'); document.getElementById('ph-${o.id}').style.display='none';"
        onerror="document.getElementById('ph-${o.id}').style.display='flex';">` : ''}
      ${verifyBadge}
    </div>
    <div class="card-body">
      <div class="card-name" title="${esc(o.name)}">${esc(o.name)}</div>
      ${o.note ? `<div class="card-note">${esc(o.note)}</div>` : ''}
      <div class="card-meta">
        ${o.price > 0 ? `<div class="price-tag" style="font-size:0.82rem;color:var(--text-muted);">£${parseFloat(o.price).toFixed(2)}/mo</div>` : '<div></div>'}
        <div class="cat-pill">${esc(o.cat||'other')}</div>
      </div>
    </div>
    <div class="card-footer">
      ${o.url ? `<a class="btn-buy" href="${esc(o.url)}" target="_blank" rel="noopener" style="background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.2);">MANAGE →</a>` : `<div class="btn-owned-label">✓ Owned</div>`}
      <button class="btn-hunt" onclick="showHunter('${o.id}','own','${esc(o.name)}','${esc(o.url||'')}')">🔍 Hunt images</button>
    </div>
  `;

  div.querySelector('.card-img-wrap').addEventListener('dblclick', () => editItem('own', o.id));
  return div;
}

// ── CRUD ──────────────────────────────────────────────────────────────────

function deleteItem(list, id) {
  if (list === 'wish') { wishes = wishes.filter(w => w.id !== id); saveWish(wishes); }
  else                 { owned  = owned.filter(o => o.id !== id);  saveOwn(owned); }
  delete verified[id]; saveVerified(verified);
  render();
}

function moveToOwned(wishId) {
  const w = wishes.find(x => x.id === wishId);
  if (!w) return;
  const newId = 'o-' + Date.now();
  owned.push({ id: newId, name: w.name, cat: w.cat, price: w.price, url: w.url, note: w.note, img: w.img || '' });
  if (verified[wishId]) { verified[newId] = { ...verified[wishId] }; }
  wishes = wishes.filter(x => x.id !== wishId);
  saveWish(wishes); saveOwn(owned); saveVerified(verified);
  render();
}

function editItem(list, id) {
  const item = list === 'wish' ? wishes.find(x => x.id === id) : owned.find(x => x.id === id);
  if (!item) return;
  editingId = id;
  document.getElementById('fMode').value = list;
  document.getElementById('modalTitle').textContent = 'Edit: ' + item.name;
  document.getElementById('fName').value  = item.name || '';
  document.getElementById('fCat').value   = item.cat  || 'other';
  document.getElementById('fPrice').value = item.price || '';
  document.getElementById('fUrl').value   = item.url   || '';
  document.getElementById('fPrio').value  = item.prio  || 'want';
  document.getElementById('fNote').value  = item.note  || '';
  document.getElementById('fImg').value   = item.img   || '';
  document.getElementById('fPrioWrap').style.display = list === 'wish' ? '' : 'none';
  updateImgPreview();
  document.getElementById('overlay').classList.add('show');
}

function openModal(mode) {
  editingId = null;
  document.getElementById('fMode').value = mode;
  document.getElementById('modalTitle').textContent = mode === 'wish' ? 'Add to Wishlist' : 'Add Owned Item';
  ['fName','fPrice','fUrl','fNote','fImg'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fCat').value  = 'tech';
  document.getElementById('fPrio').value = 'want';
  document.getElementById('fPrioWrap').style.display = mode === 'wish' ? '' : 'none';
  document.getElementById('imgPreviewWrap').classList.remove('show');
  document.getElementById('overlay').classList.add('show');
  setTimeout(() => document.getElementById('fName').focus(), 80);
}

function saveItem() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { document.getElementById('fName').focus(); return; }
  const mode = document.getElementById('fMode').value;
  const data = {
    name,
    cat:   document.getElementById('fCat').value,
    price: parseFloat(document.getElementById('fPrice').value) || 0,
    url:   document.getElementById('fUrl').value.trim(),
    prio:  document.getElementById('fPrio').value,
    note:  document.getElementById('fNote').value.trim(),
    img:   document.getElementById('fImg').value.trim(),
  };

  if (editingId) {
    if (mode === 'wish') {
      const idx = wishes.findIndex(x => x.id === editingId);
      if (idx !== -1) { wishes[idx] = { ...wishes[idx], ...data }; }
      saveWish(wishes);
    } else {
      const idx = owned.findIndex(x => x.id === editingId);
      if (idx !== -1) { owned[idx] = { ...owned[idx], ...data }; }
      saveOwn(owned);
    }
    // Clear verified if name changed
    if (verified[editingId]) { delete verified[editingId]; saveVerified(verified); }
  } else {
    const newId = (mode === 'wish' ? 'w-' : 'o-') + Date.now();
    const newItem = { id: newId, added: Date.now(), ...data };
    if (mode === 'wish') { wishes.push(newItem); saveWish(wishes); }
    else                 { owned.push(newItem);  saveOwn(owned); }
  }

  closeModal();
  render();
  // Auto-trigger resolver for new item
  if (!editingId && data.img === '') {
    setTimeout(() => runResolver(), 500);
  }
}

function closeModal() {
  document.getElementById('overlay').classList.remove('show');
  editingId = null;
}

function updateImgPreview() {
  const url = document.getElementById('fImg').value.trim();
  const wrap = document.getElementById('imgPreviewWrap');
  const img  = document.getElementById('imgPreview');
  const ph   = document.getElementById('imgPreviewPH');
  if (url) {
    wrap.classList.add('show');
    img.classList.remove('loaded');
    ph.style.display = 'flex';
    img.src = url;
  } else {
    wrap.classList.remove('show');
  }
}

document.getElementById('fImg').addEventListener('input', updateImgPreview);

// ── View ──────────────────────────────────────────────────────────────────

function setView(v) {
  currentView = v;
  document.getElementById('view-wish').style.display = v === 'wish' ? '' : 'none';
  document.getElementById('view-own').style.display  = v === 'own'  ? '' : 'none';
  document.getElementById('tab-wish').className = 'tab' + (v === 'wish' ? ' active-wish' : '');
  document.getElementById('tab-own').className  = 'tab' + (v === 'own'  ? ' active-own'  : '');
  render();
}

// ── Helpers ───────────────────────────────────────────────────────────────

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('overlay').classList.contains('show') && e.target.tagName !== 'TEXTAREA') {
    e.preventDefault(); saveItem();
  }
});

// ── Init ──────────────────────────────────────────────────────────────────

setView('wish');
</script>

</div>
