<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOS — Full of Shit</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f5f0;
  --text: #2e2e2e;
  --muted: #8a8a8a;
  --primary: #6b9080;
  --primary-h: #5a7d6e;
  --accent: #cce3de;
  --warm: #dda77b;
  --gentle: #eae4e9;
  --card: #fff;
  --btn-text: #fff;
  --shadow: 0 1px 4px rgba(0,0,0,0.07);
  --gain: #4e9a77;
  --loss: #c05050;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --radius: 12px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #141420;
    --text: #ddd;
    --muted: #777;
    --primary: #7db39a;
    --primary-h: #6a9f87;
    --accent: #1e2e2a;
    --warm: #c4956e;
    --gentle: #1e1a2a;
    --card: #1e1e30;
    --btn-text: #0e0e18;
    --shadow: 0 1px 4px rgba(0,0,0,0.3);
    --gain: #5cbf8a;
    --loss: #d46a6a;
  }
}

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; }
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

#app {
  max-width: 520px;
  margin: 0 auto;
  padding: 0 1rem 4rem;
}

/* ─── SETUP SCREEN ─── */
.setup-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2rem;
  padding: 2rem 1.5rem;
}
.setup-logo {
  font-size: 2.5rem;
  font-weight: 800;
  letter-spacing: -0.03em;
  color: var(--primary);
}
.setup-tagline {
  font-size: 1rem;
  color: var(--muted);
  text-align: center;
  line-height: 1.5;
}
.setup-question {
  font-size: 1.1rem;
  font-weight: 600;
  text-align: center;
}
.balance-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.6rem;
  width: 100%;
  max-width: 320px;
}
.balance-opt {
  background: var(--card);
  border: 2px solid var(--accent);
  border-radius: var(--radius);
  padding: 0.9rem 0.5rem;
  text-align: center;
  cursor: pointer;
  font-size: 1.05rem;
  font-weight: 600;
  font-family: var(--font);
  color: var(--text);
  transition: border-color 0.15s, background 0.15s, transform 0.1s;
}
.balance-opt:hover { border-color: var(--primary); }
.balance-opt:active { transform: scale(0.96); }
.balance-opt.selected { border-color: var(--primary); background: var(--accent); }

/* ─── HEADER ─── */
.page-header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--bg);
  padding: 1rem 0 0.6rem;
  border-bottom: 1px solid var(--accent);
  margin-bottom: 1.2rem;
}
.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.8rem;
}
.header-logo {
  font-size: 1.2rem;
  font-weight: 800;
  color: var(--primary);
  letter-spacing: -0.02em;
}
.header-value-block {
  flex: 1;
  text-align: center;
}
.header-total {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.1;
}
.header-pnl {
  font-size: 0.78rem;
  font-weight: 600;
  margin-top: 0.1rem;
}
.pnl-up { color: var(--gain); }
.pnl-dn { color: var(--loss); }
.pnl-zero { color: var(--muted); }

.header-right {
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.refresh-btn {
  background: none;
  border: 1.5px solid var(--accent);
  border-radius: 8px;
  padding: 0.35rem 0.6rem;
  font-size: 1rem;
  cursor: pointer;
  color: var(--muted);
  transition: color 0.15s, border-color 0.15s, transform 0.2s;
}
.refresh-btn:hover { color: var(--primary); border-color: var(--primary); }
.refresh-btn.spinning { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.data-badge {
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 0.15rem 0.5rem;
  border-radius: 20px;
}
.badge-live { background: var(--gain); color: #fff; }
.badge-demo { background: var(--warm); color: #2e2e2e; }

.cash-bar {
  display: flex;
  gap: 1rem;
  margin-top: 0.6rem;
  font-size: 0.78rem;
  color: var(--muted);
}
.cash-bar span strong { color: var(--text); font-weight: 600; }

/* ─── LUCKY SECTION ─── */
.lucky-section { margin-bottom: 1rem; }

.lucky-buttons {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 0.5rem;
}
.lucky-btn {
  flex: 1;
  padding: 0.9rem 0.5rem;
  border: 2px solid var(--warm);
  border-radius: var(--radius);
  background: var(--card);
  cursor: pointer;
  font-family: var(--font);
  text-align: center;
  transition: transform 0.1s, border-color 0.15s, background 0.15s;
}
.lucky-btn:hover { border-color: var(--primary); background: var(--accent); }
.lucky-btn:active { transform: scale(0.96); }
.lucky-btn.ai-btn { border-color: var(--primary); }
.lucky-icon { font-size: 1.4rem; display: block; margin-bottom: 0.15rem; }
.lucky-label { font-size: 0.8rem; font-weight: 600; color: var(--text); line-height: 1.2; }
.lucky-sub { font-size: 0.65rem; color: var(--muted); margin-top: 0.1rem; }

.pro-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  justify-content: flex-end;
  font-size: 0.75rem;
  color: var(--muted);
}
.pro-row .active-label { color: var(--primary); font-weight: 600; }
.pro-switch {
  position: relative;
  width: 36px;
  height: 20px;
  background: var(--accent);
  border-radius: 10px;
  cursor: pointer;
  border: none;
  transition: background 0.2s;
}
.pro-switch.on { background: var(--primary); }
.pro-switch::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--card);
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  transition: transform 0.2s;
}
.pro-switch.on::after { transform: translateX(16px); }

.ai-prompt-row {
  margin-top: 0.5rem;
  display: flex;
  gap: 0.4rem;
}
.ai-input {
  flex: 1;
  padding: 0.55rem 0.8rem;
  border: 1.5px solid var(--accent);
  border-radius: 8px;
  font-size: 0.85rem;
  font-family: var(--font);
  background: var(--card);
  color: var(--text);
}
.ai-input:focus { outline: none; border-color: var(--primary); }

/* ─── REVEAL CARD ─── */
.reveal-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 1.1rem 1.2rem;
  box-shadow: var(--shadow);
  margin-bottom: 1.2rem;
  animation: revealIn 0.25s ease;
}
@keyframes revealIn {
  from { opacity: 0; transform: translateY(-6px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.reveal-loading {
  text-align: center;
  padding: 1.5rem;
  color: var(--muted);
  font-size: 0.9rem;
  font-style: italic;
}
.reveal-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 0.5rem;
  margin-bottom: 0.5rem;
}
.reveal-company { flex: 1; }
.reveal-ticker {
  font-size: 1.3rem;
  font-weight: 800;
  color: var(--primary);
  letter-spacing: -0.01em;
}
.reveal-name { font-size: 0.85rem; color: var(--muted); margin-top: 0.1rem; }
.reveal-sector-badge {
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 0.2rem 0.55rem;
  border-radius: 20px;
  background: var(--warm);
  color: #2e2e2e;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 0.2rem;
}
.reveal-price-row {
  font-size: 0.9rem;
  color: var(--muted);
  margin-bottom: 0.5rem;
}
.reveal-price-row strong { color: var(--text); font-weight: 600; }
.reveal-why {
  font-size: 0.82rem;
  line-height: 1.45;
  color: var(--text);
  background: var(--gentle);
  border-radius: 8px;
  padding: 0.6rem 0.8rem;
  margin-bottom: 0.8rem;
}
.reveal-actions {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-wrap: wrap;
}
.qty-stepper {
  display: flex;
  align-items: center;
  gap: 0;
  border: 1.5px solid var(--accent);
  border-radius: 8px;
  overflow: hidden;
}
.qty-btn {
  background: var(--accent);
  border: none;
  padding: 0.45rem 0.7rem;
  font-size: 1rem;
  cursor: pointer;
  color: var(--text);
  font-family: var(--font);
  transition: background 0.1s;
}
.qty-btn:hover { background: var(--primary); color: var(--btn-text); }
.qty-val {
  padding: 0.4rem 0.6rem;
  font-size: 0.9rem;
  font-weight: 600;
  min-width: 2.5rem;
  text-align: center;
  border: none;
  background: var(--card);
  color: var(--text);
  font-family: var(--font);
}
.buy-btn {
  flex: 1;
  padding: 0.55rem 1rem;
  background: var(--primary);
  color: var(--btn-text);
  border: none;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  white-space: nowrap;
}
.buy-btn:hover { background: var(--primary-h); }
.buy-btn:active { transform: scale(0.97); }
.buy-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.spin-again-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 0.8rem;
  cursor: pointer;
  font-family: var(--font);
  padding: 0.3rem;
  white-space: nowrap;
}
.spin-again-btn:hover { color: var(--primary); text-decoration: underline; }

/* ─── POSITIONS ─── */
.positions-header {
  display: flex;
  align-items: baseline;
  gap: 0.5rem;
  margin-bottom: 0.7rem;
}
.positions-title {
  font-size: 0.8rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
}
.positions-count {
  font-size: 0.8rem;
  color: var(--muted);
}

.empty-state {
  text-align: center;
  padding: 2rem 1rem;
  color: var(--muted);
  font-size: 0.9rem;
  line-height: 1.5;
}

.position-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 0.85rem 1rem;
  box-shadow: var(--shadow);
  margin-bottom: 0.6rem;
  transition: box-shadow 0.15s;
}
.position-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

.pos-main {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  margin-bottom: 0.5rem;
}
.pos-sparkline { flex-shrink: 0; }
.pos-left { flex: 1; min-width: 0; }
.pos-symbol { font-size: 1rem; font-weight: 700; letter-spacing: -0.01em; }
.pos-name {
  font-size: 0.75rem;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 0.05rem;
}
.pos-right { text-align: right; flex-shrink: 0; }
.pos-price { font-size: 0.95rem; font-weight: 600; }
.pos-change { font-size: 0.75rem; margin-top: 0.05rem; }

.pos-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem 1rem;
  font-size: 0.75rem;
  color: var(--muted);
  padding: 0.5rem 0;
  border-top: 1px solid var(--accent);
  margin-bottom: 0.5rem;
}
.stat-item strong { color: var(--text); font-weight: 600; }
.stat-pnl-up { color: var(--gain); font-weight: 600; }
.stat-pnl-dn { color: var(--loss); font-weight: 600; }

.pos-actions { display: flex; gap: 0.4rem; }
.act-btn {
  padding: 0.4rem 0.85rem;
  border-radius: 7px;
  font-size: 0.8rem;
  font-weight: 500;
  font-family: var(--font);
  cursor: pointer;
  border: none;
  transition: background 0.1s, transform 0.1s;
}
.act-btn:active { transform: scale(0.96); }
.act-buy { background: var(--accent); color: var(--text); }
.act-buy:hover { background: var(--primary); color: var(--btn-text); }
.act-sell { background: var(--gentle); color: var(--text); }
.act-sell:hover { background: var(--loss); color: #fff; }

/* inline buy-more row */
.inline-buy {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  flex-wrap: wrap;
  padding-top: 0.5rem;
  border-top: 1px solid var(--accent);
  margin-top: 0.4rem;
  animation: revealIn 0.15s ease;
}

/* ─── HISTORY ─── */
.history-toggle {
  width: 100%;
  background: none;
  border: none;
  text-align: left;
  padding: 0.7rem 0;
  font-size: 0.78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  cursor: pointer;
  font-family: var(--font);
  display: flex;
  align-items: center;
  gap: 0.4rem;
  border-top: 1px solid var(--accent);
  margin-top: 0.5rem;
}
.history-toggle:hover { color: var(--primary); }
.history-chevron { transition: transform 0.2s; font-style: normal; }
.history-chevron.open { transform: rotate(90deg); }

.tx-list { display: flex; flex-direction: column; gap: 0; }
.tx-row {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.55rem 0;
  border-bottom: 1px solid var(--accent);
  font-size: 0.8rem;
}
.tx-row:last-child { border-bottom: none; }
.tx-badge {
  font-size: 0.65rem;
  font-weight: 700;
  padding: 0.15rem 0.4rem;
  border-radius: 5px;
  text-transform: uppercase;
  flex-shrink: 0;
}
.tx-buy-badge { background: var(--gain); color: #fff; }
.tx-sell-badge { background: var(--warm); color: #2e2e2e; }
.tx-info { flex: 1; }
.tx-sym { font-weight: 600; }
.tx-det { color: var(--muted); font-size: 0.72rem; margin-top: 0.05rem; }
.tx-amt { font-weight: 600; flex-shrink: 0; }

/* ─── SETTINGS / RESET ─── */
.settings-row {
  display: flex;
  gap: 0.5rem;
  padding: 0.8rem 0;
  border-top: 1px solid var(--accent);
  margin-top: 0.5rem;
}
.ghost-btn {
  flex: 1;
  background: none;
  border: 1.5px solid var(--accent);
  border-radius: 8px;
  padding: 0.5rem 0.6rem;
  font-size: 0.75rem;
  font-family: var(--font);
  color: var(--muted);
  cursor: pointer;
  text-align: center;
  transition: border-color 0.15s, color 0.15s;
}
.ghost-btn:hover { border-color: var(--primary); color: var(--primary); }
.ghost-btn.danger:hover { border-color: var(--loss); color: var(--loss); }

/* ─── LIVE PULSE ─── */
.live-indicator {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  font-size: 0.68rem;
  color: var(--muted);
  margin-top: 0.3rem;
}
.live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gain);
  animation: livepulse 2s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes livepulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.75); }
}

/* ─── EXTERNAL LINKS ─── */
.pos-links {
  display: flex;
  gap: 0.35rem;
  flex-wrap: wrap;
  padding-top: 0.5rem;
  border-top: 1px solid var(--accent);
  margin-top: 0.3rem;
}
.ext-link {
  font-size: 0.7rem;
  color: var(--muted);
  text-decoration: none;
  padding: 0.22rem 0.55rem;
  border: 1px solid var(--accent);
  border-radius: 6px;
  transition: color 0.15s, border-color 0.15s;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 0.2rem;
}
.ext-link:hover { color: var(--primary); border-color: var(--primary); }

/* ─── BUTTON ─── */
.btn-primary {
  display: block;
  width: 100%;
  padding: 0.85rem;
  background: var(--primary);
  color: var(--btn-text);
  border: none;
  border-radius: var(--radius);
  font-size: 1rem;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}
.btn-primary:hover { background: var(--primary-h); }
.btn-primary:active { transform: scale(0.98); }
</style>
</head>

// ─── RENDER ENGINE ───
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) for (const [k, v] of Object.entries(attrs)) {
    if (k === 'className') e.className = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (v !== null && v !== undefined) e.setAttribute(k, v);
  }
  for (const c of children) {
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else if (c instanceof Node) e.appendChild(c);
  }
  return e;
}

function render() {
  const a = document.getElementById('app');
  a.innerHTML = '';

// ─── HELPERS ───
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

function fmt(n) {
  const cur = profile ? profile.currency : 'GBP';
  return new Intl.NumberFormat('en-GB', { style:'currency', currency: cur, minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n);
}
function fmtShort(n) {
  const cur = profile ? profile.currency : 'GBP';
  if (Math.abs(n) >= 1000) return new Intl.NumberFormat('en-GB', { style:'currency', currency: cur, maximumFractionDigits: 0 }).format(n);
  return fmt(n);
}
function fmtPct(n) { return (n >= 0 ? '+' : '') + n.toFixed(2) + '%'; }
function sym() { return profile && profile.currency === 'USD' ? '$' : '£'; }

function getPrice(symbol) {
  const c = priceCache[symbol];
  if (c && c.price) return c.price;
  const d = DEMO_DATA[symbol];
  return d ? d.prices[d.prices.length - 1] : null;
}

function getPriceHistory(symbol) {
  const c = priceCache[symbol];
  if (c && c.prices) return c.prices;
  const d = DEMO_DATA[symbol];
  return d ? d.prices : null;
}

function getPriceChange(symbol) {
  const c = priceCache[symbol];
  if (c && c.changePct != null) return { change: c.change, pct: c.changePct };
  const d = DEMO_DATA[symbol];
  if (!d) return null;
  const p = d.prices;
  const curr = p[p.length - 1], prev = p[p.length - 2];
  return { change: curr - prev, pct: ((curr - prev) / prev) * 100 };
}

function getHolding(symbol) {
  return portfolio && portfolio.holdings.find(h => h.symbol === symbol);
}

function holdingQty(h) { return h.lots.reduce((s, l) => s + l.qty, 0); }
function holdingCost(h) { return h.lots.reduce((s, l) => s + l.qty * l.costBasis, 0); }
function holdingValue(h) { const p = getPrice(h.symbol); return p ? holdingQty(h) * p : 0; }
function holdingPnL(h) { return holdingValue(h) - holdingCost(h); }
function holdingPnLPct(h) { const c = holdingCost(h); return c ? (holdingPnL(h) / c) * 100 : 0; }

function holdingDuration(h) {
  const oldest = h.lots.reduce((min, l) => Math.min(min, new Date(l.boughtAt).getTime()), Infinity);
  const days = Math.floor((Date.now() - oldest) / 86400000);
  if (days === 0) return 'today';
  if (days === 1) return '1 day';
  return days + ' days';
}

function portfolioTotal() {
  if (!portfolio) return 0;
  return portfolio.holdings.reduce((s, h) => s + holdingValue(h), portfolio.cash);
}
function portfolioPnL() {
  if (!profile) return 0;
  return portfolioTotal() - profile.startingBalance;
}
function portfolioPnLPct() {
  if (!profile || !profile.startingBalance) return 0;
  return (portfolioPnL() / profile.startingBalance) * 100;
}
function portfolioInvested() {
  if (!portfolio) return 0;
  return portfolio.holdings.reduce((s, h) => s + holdingValue(h), 0);
}

// ─── API ───
const CACHE_TTL = 15 * 60 * 1000;

async function fetchPrice(symbol) {
  const cached = priceCache[symbol];
  if (cached && (Date.now() - cached.fetchedAt) < CACHE_TTL) return cached;
  try {
    const url = 'https://corsproxy.io/?' + encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/' + symbol + '?interval=1d&range=1mo');
    const resp = await fetch(url, { signal: AbortSignal.timeout(5000) });
    if (resp.ok) {
      const data = await resp.json();
      const result = data.chart.result[0];
      const closes = result.indicators.quote[0].close.filter(p => p != null);
      const current = result.meta.regularMarketPrice || closes[closes.length - 1];
      const prev = closes.length >= 2 ? closes[closes.length - 2] : closes[0];
      const entry = { price: current, change: current - prev, changePct: ((current - prev) / prev) * 100, prices: closes.slice(-30), fetchedAt: Date.now() };
      priceCache[symbol] = entry;
      save('fos_prices', priceCache);
      dataMode = 'live';
      return entry;
    }
  } catch(e) {}
  const demo = DEMO_DATA[symbol];
  if (demo) {
    const p = demo.prices, cur = p[p.length - 1], prev = p[p.length - 2];
    return { price: cur, change: cur - prev, changePct: ((cur - prev) / prev) * 100, prices: p, fetchedAt: Date.now() };
  }
  return null;
}

async function refreshAll() {
  if (!portfolio) return;
  S.refreshing = true;
  render();
  const symbols = portfolio.holdings.map(h => h.symbol);
  for (let i = 0; i < symbols.length; i++) {
    await fetchPrice(symbols[i]);
    if (i < symbols.length - 1) await new Promise(r => setTimeout(r, 300));
  }
  S.refreshing = false;
  render();
}

// ─── SPARKLINE ───
function sparklineSVG(prices, w, h) {
  if (!prices || prices.length < 2) return document.createTextNode('');
  const min = Math.min(...prices), max = Math.max(...prices), range = max - min || 1;
  const pts = prices.map((p, i) =>
    ((i / (prices.length - 1)) * w).toFixed(1) + ',' + (h - ((p - min) / range) * (h - 2) - 1).toFixed(1)
  ).join(' ');
  const color = prices[prices.length - 1] >= prices[0] ? 'var(--gain)' : 'var(--loss)';
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', w); svg.setAttribute('height', h);
  svg.setAttribute('viewBox', '0 0 ' + w + ' ' + h);
  svg.style.cssText = 'display:block;overflow:visible';
  svg.innerHTML = '<polyline points="' + pts + '" fill="none" stroke="' + color + '" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>';
  return svg;
}

// ─── TRADE LOGIC ───
function executeBuy(symbol, name, qty, price) {
  const total = qty * price;
  if (total > portfolio.cash) return false;
  portfolio.cash -= total;
  const h = getHolding(symbol);
  if (h) {
    h.lots.push({ qty, costBasis: price, boughtAt: new Date().toISOString() });
  } else {
    const co = POPULAR_COMPANIES.find(c => c.symbol === symbol);
    portfolio.holdings.push({
      id: uid(), symbol, name,
      lots: [{ qty, costBasis: price, boughtAt: new Date().toISOString() }],
      conviction: co ? co.why : '',
    });
  }
  transactions.push({ id: uid(), type:'BUY', symbol, name, qty, price, total, timestamp: new Date().toISOString() });
  saveAll();
  return true;
}

function executeSell(symbol, qty, price) {
  const h = getHolding(symbol);
  if (!h) return false;
  const curQty = holdingQty(h);
  if (qty > curQty) return false;
  const total = qty * price;
  portfolio.cash += total;
  let remaining = qty;
  while (remaining > 0 && h.lots.length > 0) {
    if (h.lots[0].qty <= remaining) { remaining -= h.lots[0].qty; h.lots.shift(); }
    else { h.lots[0].qty -= remaining; remaining = 0; }
  }
  if (h.lots.length === 0) portfolio.holdings = portfolio.holdings.filter(x => x.symbol !== symbol);
  transactions.push({ id: uid(), type:'SELL', symbol, name: h.name || symbol, qty, price, total, timestamp: new Date().toISOString() });
  saveAll();
  return true;
}

  // AI prompt input when Pro is on
  if (S.proMode) {
    const promptRow = el('div', { className:'ai-prompt-row' });
    const inp = el('input', {
      className:'ai-input',
      type:'text',
      placeholder:'Ask anything: "Best UK dividend stock under £5"…',
    });
    inp.value = S.aiPrompt || '';
    inp.addEventListener('input', () => { S.aiPrompt = inp.value; });
    promptRow.appendChild(inp);
    sec.appendChild(promptRow);
  }

  a.appendChild(sec);
}

// ─── RENDER: REVEAL CARD ───
function renderReveal(a) {
  if (!S.luckyResult && !S.luckyLoading) return;

  const card = el('div', { className:'reveal-card' });

  if (S.luckyLoading) {
    card.appendChild(el('div', { className:'reveal-loading' }, S.luckySource === 'ai' ? '🧠 Claude is thinking…' : '🌐 Fetching what\'s trending…'));
    a.appendChild(card);
    return;
  }

  const r = S.luckyResult;
  const price = getPrice(r.symbol);
  const canBuy = price && portfolio.cash >= price * (S.buyQty || 1);
  const total = price ? price * (S.buyQty || 1) : null;

  // Top: ticker + sector badge
  const top = el('div', { className:'reveal-top' });
  const company = el('div', { className:'reveal-company' });
  company.appendChild(el('div', { className:'reveal-ticker' }, r.symbol));
  company.appendChild(el('div', { className:'reveal-name' }, r.name));
  top.appendChild(company);
  top.appendChild(el('span', { className:'reveal-sector-badge' }, r.sector));
  card.appendChild(top);

  // Price
  if (price) {
    const ch = getPriceChange(r.symbol);
    const chClass = ch && ch.pct >= 0 ? 'pnl-up' : 'pnl-dn';
    const chStr = ch ? ' · ' + fmtPct(ch.pct) : '';
    const priceRow = el('div', { className:'reveal-price-row' });
    priceRow.appendChild(el('strong', null, fmt(price)));
    if (ch) priceRow.appendChild(el('span', { className: chClass }, chStr));
    card.appendChild(priceRow);
  }

  // Conviction reason
  if (r.why) card.appendChild(el('div', { className:'reveal-why' }, r.why));

  // Buy actions
  const actions = el('div', { className:'reveal-actions' });

  if (price) {
    // Qty stepper
    const stepper = el('div', { className:'qty-stepper' });
    stepper.appendChild(el('button', { className:'qty-btn', onClick() {
      if (S.buyQty > 1) { S.buyQty--; render(); }
    }}, '−'));
    stepper.appendChild(el('input', {
      className:'qty-val',
      type:'number',
      min:'1',
      value: String(S.buyQty || 1),
      onChange(e) { const v = parseInt(e.target.value); if (v > 0) { S.buyQty = v; render(); } },
    }));
    stepper.appendChild(el('button', { className:'qty-btn', onClick() { S.buyQty = (S.buyQty || 1) + 1; render(); }},'＋'));
    actions.appendChild(stepper);

    const label = total ? 'Buy · ' + fmtShort(total) : 'Buy';
    actions.appendChild(el('button', {
      className:'buy-btn',
      disabled: !canBuy || null,
      onClick() {
        const ok = executeBuy(r.symbol, r.name, S.buyQty || 1, price);
        if (ok) {
          S.luckyResult = null;
          S.buyQty = 1;
          // Fetch live price in background after buying
          fetchPrice(r.symbol).then(render);
          render();
        }
      },
    }, canBuy ? label : (portfolio.cash < price ? 'Not enough cash' : label)));
  }

  actions.appendChild(el('button', { className:'spin-again-btn', onClick: luckyPreset }, '↻ Spin again'));
  card.appendChild(actions);

  a.appendChild(card);
}

// ─── RENDER: POSITIONS ───
function renderPositions(a) {
  const h = portfolio.holdings;

  const hdr = el('div', { className:'positions-header' });
  hdr.appendChild(el('span', { className:'positions-title' }, 'Your positions'));
  if (h.length > 0) hdr.appendChild(el('span', { className:'positions-count' }, '(' + h.length + ')'));
  a.appendChild(hdr);

  if (h.length === 0) {
    a.appendChild(el('div', { className:'empty-state' },
      'Nothing here yet.\nHit the lucky button to find something you believe in.'
    ));
    return;
  }

  for (const holding of h) {
    const price = getPrice(holding.symbol);
    const prices = getPriceHistory(holding.symbol);
    const ch = getPriceChange(holding.symbol);
    const qty = holdingQty(holding);
    const cost = holdingCost(holding);
    const val = holdingValue(holding);
    const pnl = holdingPnL(holding);
    const pnlPct = holdingPnLPct(holding);
    const dur = holdingDuration(holding);
    const pnlUp = pnl >= 0;
    const chUp = ch ? ch.pct >= 0 : true;

    const card = el('div', { className:'position-card' });

    // Main row: sparkline + symbol/name + price/change
    const main = el('div', { className:'pos-main' });
    if (prices) main.appendChild(el('div', { className:'pos-sparkline' }, sparklineSVG(prices, 56, 28)));

    const left = el('div', { className:'pos-left' });
    left.appendChild(el('div', { className:'pos-symbol' }, holding.symbol));
    left.appendChild(el('div', { className:'pos-name' }, holding.name));
    main.appendChild(left);

    const right = el('div', { className:'pos-right' });
    right.appendChild(el('div', { className:'pos-price' }, price ? fmt(price) : '—'));
    if (ch) right.appendChild(el('div', { className:'pos-change ' + (chUp ? 'pnl-up' : 'pnl-dn') }, fmtPct(ch.pct)));
    main.appendChild(right);
    card.appendChild(main);

    // Purchase date
    const oldestMs = holding.lots.reduce((min, l) => Math.min(min, new Date(l.boughtAt).getTime()), Infinity);
    const buyDate = new Date(oldestMs).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });

    // Stats row
    const stats = el('div', { className:'pos-stats' });
    stats.appendChild(el('span', { className:'stat-item' }, el('strong', null, qty + ' share' + (qty !== 1 ? 's' : ''))));
    stats.appendChild(el('span', { className:'stat-item' }, 'bought ', el('strong', null, buyDate)));
    stats.appendChild(el('span', { className:'stat-item' }, 'held ', el('strong', null, dur)));
    stats.appendChild(el('span', null, ''));  // line break feel
    stats.appendChild(el('span', { className:'stat-item' }, 'cost ', el('strong', null, fmtShort(cost))));
    stats.appendChild(el('span', { className:'stat-item' }, 'value ', el('strong', null, fmtShort(val))));
    stats.appendChild(el('span', { className:'stat-item ' + (pnlUp ? 'stat-pnl-up' : 'stat-pnl-dn') },
      (pnlUp ? '▲ +' : '▼ ') + fmtShort(pnl) + ' (' + fmtPct(pnlPct) + ')'
    ));
    card.appendChild(stats);

    // Actions row
    const acts = el('div', { className:'pos-actions' });

    // Buy more — toggles inline buy panel
    acts.appendChild(el('button', {
      className:'act-btn act-buy',
      onClick() {
        S.buyingSymbol = S.buyingSymbol === holding.symbol ? null : holding.symbol;
        S.buyQty = 1;
        render();
      },
    }, '+ Buy more'));

    // Sell all
    acts.appendChild(el('button', {
      className:'act-btn act-sell',
      onClick() {
        if (price) {
          executeSell(holding.symbol, qty, price);
          render();
        }
      },
    }, 'Sell all'));

    card.appendChild(acts);

    // Inline buy-more panel
    if (S.buyingSymbol === holding.symbol && price) {
      const ibuy = el('div', { className:'inline-buy' });
      const stepper = el('div', { className:'qty-stepper' });
      stepper.appendChild(el('button', { className:'qty-btn', onClick() { if (S.buyQty > 1) { S.buyQty--; render(); }}}, '−'));
      stepper.appendChild(el('input', { className:'qty-val', type:'number', min:'1', value: String(S.buyQty), onChange(e) { const v = parseInt(e.target.value); if (v > 0) { S.buyQty = v; render(); }}}));
      stepper.appendChild(el('button', { className:'qty-btn', onClick() { S.buyQty++; render(); }}, '＋'));
      ibuy.appendChild(stepper);

      const total = price * S.buyQty;
      const canBuy = portfolio.cash >= total;
      ibuy.appendChild(el('button', {
        className:'buy-btn',
        disabled: !canBuy || null,
        onClick() {
          if (executeBuy(holding.symbol, holding.name, S.buyQty, price)) {
            S.buyingSymbol = null;
            S.buyQty = 1;
            render();
          }
        },
      }, canBuy ? 'Buy · ' + fmtShort(total) : 'Not enough cash'));

      ibuy.appendChild(el('button', { className:'spin-again-btn', onClick() { S.buyingSymbol = null; render(); }}, 'Cancel'));
      card.appendChild(ibuy);
    }

    // External links
    const sym = holding.symbol;
    const isUK = sym.endsWith('.L');
    const isETF = (POPULAR_COMPANIES.find(c => c.symbol === sym) || {}).sector === 'ETF';
    const cleanSym = sym.replace('.L', '').toLowerCase();
    const yfUrl = 'https://finance.yahoo.com/quote/' + encodeURIComponent(sym);
    const saUrl = isETF
      ? 'https://stockanalysis.com/etf/' + cleanSym + '/'
      : 'https://stockanalysis.com/stocks/' + cleanSym + '/';
    const newsUrl = 'https://finance.yahoo.com/quote/' + encodeURIComponent(sym) + '/news/';
    const analysisUrl = 'https://finance.yahoo.com/quote/' + encodeURIComponent(sym) + '/analysis/';

    const links = el('div', { className:'pos-links' });
    links.appendChild(el('a', { className:'ext-link', href: yfUrl, target:'_blank', rel:'noopener' }, '📈 Live price'));
    links.appendChild(el('a', { className:'ext-link', href: analysisUrl, target:'_blank', rel:'noopener' }, '🎯 Analyst ratings'));
    links.appendChild(el('a', { className:'ext-link', href: saUrl, target:'_blank', rel:'noopener' }, '🔍 Fundamentals'));
    links.appendChild(el('a', { className:'ext-link', href: newsUrl, target:'_blank', rel:'noopener' }, '📰 News'));
    card.appendChild(links);

    a.appendChild(card);
  }
}

// ─── RENDER: HISTORY ───
function renderHistory(a) {
  const toggle = el('button', { className:'history-toggle', onClick() { S.historyOpen = !S.historyOpen; saveAll(); render(); }});
  toggle.appendChild(el('span', { className:'history-chevron' + (S.historyOpen ? ' open' : '') }, '▶'));
  toggle.appendChild(document.createTextNode(' Transaction history (' + transactions.length + ')'));
  a.appendChild(toggle);

  if (!S.historyOpen || transactions.length === 0) return;

  const list = el('div', { className:'tx-list' });
  const sorted = [...transactions].reverse();
  for (const tx of sorted) {
    const d = new Date(tx.timestamp);
    const dateStr = d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
    const timeStr = d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });

    const row = el('div', { className:'tx-row' });
    row.appendChild(el('span', { className:'tx-badge ' + (tx.type === 'BUY' ? 'tx-buy-badge' : 'tx-sell-badge') }, tx.type));
    const info = el('div', { className:'tx-info' });
    info.appendChild(el('div', { className:'tx-sym' }, tx.symbol));
    info.appendChild(el('div', { className:'tx-det' }, tx.qty + ' @ ' + fmt(tx.price) + ' · ' + dateStr + ' ' + timeStr));
    row.appendChild(info);
    row.appendChild(el('div', { className:'tx-amt ' + (tx.type === 'BUY' ? 'pnl-dn' : 'pnl-up') },
      (tx.type === 'BUY' ? '−' : '+') + fmtShort(tx.total)));
    list.appendChild(row);
  }
  a.appendChild(list);
}

// ─── RENDER: SETTINGS ───
function renderSettings(a) {
  const row = el('div', { className:'settings-row' });

  // API key toggle
  const apiKey = profile && profile.claudeApiKey;
  row.appendChild(el('button', { className:'ghost-btn', onClick() {
    const k = prompt('Claude API key (for Pro AI picks):', apiKey || '');
    if (k !== null) { profile.claudeApiKey = k.trim(); saveAll(); }
  }}, apiKey ? '🔑 API key set' : '+ Add API key'));

  // Reset
  row.appendChild(el('button', { className:'ghost-btn danger', onClick() {
    if (confirm('Reset everything? Your fake portfolio will be wiped.')) {
      localStorage.clear(); profile = null; portfolio = null; transactions = []; priceCache = {};
      S = { luckyResult:null, luckyLoading:false, luckySource:null, proMode:false, aiPrompt:'', buyQty:1, buyingSymbol:null, historyOpen:false, setupBalance:10000, refreshing:false };
      render();
    }
  }}, 'Reset portfolio'));

  a.appendChild(row);
}

// ─── LIVE SIMULATION + AUTO-REFRESH ───
let lastTickAt = null;
let tickInterval = null;

function simulatePriceTick() {
  // Small random walk on all demo symbols — makes sparklines and prices feel alive
  for (const [sym, demo] of Object.entries(DEMO_DATA)) {
    const base = demo.prices[demo.prices.length - 1];
    const prev = demo.prices[demo.prices.length - 2];
    const entry = priceCache[sym] || { price: base, prices: [...demo.prices] };

    // ±0.2% jitter per tick, mean-revert toward base so it doesn't drift forever
    const drift = (base - entry.price) * 0.05; // gentle pull back to base
    const noise = entry.price * (Math.random() * 0.004 - 0.002);
    const newPrice = Math.max(entry.price + drift + noise, base * 0.8); // floor at -20%

    const dayChange = newPrice - prev;
    const newPrices = [...(entry.prices || demo.prices).slice(-29), newPrice];

    priceCache[sym] = {
      price: newPrice,
      change: dayChange,
      changePct: (dayChange / prev) * 100,
      prices: newPrices,
      fetchedAt: Date.now(),
    };
  }
  lastTickAt = Date.now();
  if (portfolio && (portfolio.holdings.length > 0 || S.luckyResult)) render();
}

function startAutoRefresh() {
  if (tickInterval) clearInterval(tickInterval);
  if (dataMode === 'live') {
    // Live: fetch from API every 45s (polite to Yahoo)
    tickInterval = setInterval(async () => {
      if (portfolio && portfolio.holdings.length > 0) {
        await refreshAll();
        lastTickAt = Date.now();
      }
    }, 45000);
  } else {
    // Demo: simulate price movement every 5s
    tickInterval = setInterval(simulatePriceTick, 5000);
    // First tick immediately
    setTimeout(simulatePriceTick, 500);
  }
}

// ─── INIT ───
loadState();
render();
startAutoRefresh();
</script>
