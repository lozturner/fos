<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOS — Full of Shit</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f5f0;
  --text: #2e2e2e;
  --muted: #8a8a8a;
  --primary: #6b9080;
  --primary-h: #5a7d6e;
  --accent: #cce3de;
  --warm: #dda77b;
  --gentle: #eae4e9;
  --card: #fff;
  --btn-text: #fff;
  --shadow: 0 1px 4px rgba(0,0,0,0.07);
  --gain: #4e9a77;
  --loss: #c05050;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --radius: 12px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #141420;
    --text: #ddd;
    --muted: #777;
    --primary: #7db39a;
    --primary-h: #6a9f87;
    --accent: #1e2e2a;
    --warm: #c4956e;
    --gentle: #1e1a2a;
    --card: #1e1e30;
    --btn-text: #0e0e18;
    --shadow: 0 1px 4px rgba(0,0,0,0.3);
    --gain: #5cbf8a;
    --loss: #d46a6a;
  }
}

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; }
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

#app {
  max-width: 520px;
  margin: 0 auto;
  padding: 0 1rem 4rem;
}

/* ─── SETUP SCREEN ─── */
.setup-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2rem;
  padding: 2rem 1.5rem;
}
.setup-logo {
  font-size: 2.5rem;
  font-weight: 800;
  letter-spacing: -0.03em;
  color: var(--primary);
}
.setup-tagline {
  font-size: 1rem;
  color: var(--muted);
  text-align: center;
  line-height: 1.5;
}
.setup-question {
  font-size: 1.1rem;
  font-weight: 600;
  text-align: center;
}
.balance-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.6rem;
  width: 100%;
  max-width: 320px;
}
.balance-opt {
  background: var(--card);
  border: 2px solid var(--accent);
  border-radius: var(--radius);
  padding: 0.9rem 0.5rem;
  text-align: center;
  cursor: pointer;
  font-size: 1.05rem;
  font-weight: 600;
  font-family: var(--font);
  color: var(--text);
  transition: border-color 0.15s, background 0.15s, transform 0.1s;
}
.balance-opt:hover { border-color: var(--primary); }
.balance-opt:active { transform: scale(0.96); }
.balance-opt.selected { border-color: var(--primary); background: var(--accent); }

/* ─── HEADER ─── */
.page-header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--bg);
  padding: 1rem 0 0.6rem;
  border-bottom: 1px solid var(--accent);
  margin-bottom: 1.2rem;
}
.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.8rem;
}
.header-logo {
  font-size: 1.2rem;
  font-weight: 800;
  color: var(--primary);
  letter-spacing: -0.02em;
}
.header-value-block {
  flex: 1;
  text-align: center;
}
.header-total {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.1;
}
.header-pnl {
  font-size: 0.78rem;
  font-weight: 600;
  margin-top: 0.1rem;
}
.pnl-up { color: var(--gain); }
.pnl-dn { color: var(--loss); }
.pnl-zero { color: var(--muted); }

.header-right {
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.refresh-btn {
  background: none;
  border: 1.5px solid var(--accent);
  border-radius: 8px;
  padding: 0.35rem 0.6rem;
  font-size: 1rem;
  cursor: pointer;
  color: var(--muted);
  transition: color 0.15s, border-color 0.15s, transform 0.2s;
}
.refresh-btn:hover { color: var(--primary); border-color: var(--primary); }
.refresh-btn.spinning { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── MAKE IT REAL ─── */
.real-trigger {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-h) 100%);
  border-radius: var(--radius);
  padding: 1rem 1.2rem;
  margin: 0.8rem 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  border: none;
  font-family: var(--font);
  width: 100%;
  text-align: left;
  gap: 0.8rem;
  transition: opacity 0.15s, transform 0.1s;
}
.real-trigger:hover { opacity: 0.9; }
.real-trigger:active { transform: scale(0.99); }
.real-trigger-text { color: #fff; flex: 1; }
.real-trigger-heading { font-size: 0.9rem; font-weight: 700; }
.real-trigger-sub { font-size: 0.75rem; opacity: 0.85; margin-top: 0.15rem; }
.real-trigger-arrow { color: #fff; font-size: 1.1rem; opacity: 0.7; transition: transform 0.2s; }
.real-trigger-arrow.open { transform: rotate(90deg); }

.real-panel { margin-bottom: 1rem; animation: revealIn 0.2s ease; }
.real-section-title {
  font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.07em; color: var(--muted); margin: 1rem 0 0.5rem;
}
.step-card {
  display: flex; gap: 0.8rem; align-items: flex-start;
  background: var(--card); border-radius: 10px;
  padding: 0.8rem; margin-bottom: 0.4rem; box-shadow: var(--shadow);
}
.step-icon { font-size: 1.3rem; flex-shrink: 0; margin-top: 0.1rem; }
.step-body { flex: 1; }
.step-time { font-size: 0.68rem; color: var(--primary); font-weight: 700; margin-bottom: 0.1rem; }
.step-title { font-size: 0.85rem; font-weight: 600; }
.step-detail { font-size: 0.75rem; color: var(--muted); line-height: 1.4; margin-top: 0.2rem; }
.broker-card {
  background: var(--card); border-radius: 10px;
  padding: 0.8rem 1rem; margin-bottom: 0.4rem; box-shadow: var(--shadow);
}
.broker-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 0.25rem; }
.broker-name { font-size: 0.9rem; font-weight: 700; }
.broker-type { font-size: 0.68rem; color: var(--muted); }
.broker-best { font-size: 0.75rem; color: var(--text); line-height: 1.35; margin-bottom: 0.5rem; }
.broker-meta { display: flex; gap: 0.8rem; flex-wrap: wrap; font-size: 0.72rem; margin-bottom: 0.5rem; }
.broker-meta span { color: var(--muted); }
.broker-meta strong { color: var(--text); }
.broker-links { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.broker-link {
  font-size: 0.72rem; padding: 0.25rem 0.6rem; border-radius: 6px;
  text-decoration: none; background: var(--accent); color: var(--text);
  transition: background 0.15s;
}
.broker-link:hover { background: var(--primary); color: var(--btn-text); }
.broker-link.tel { background: var(--gentle); }
.docs-list { background: var(--card); border-radius: 10px; padding: 0.1rem 1rem; box-shadow: var(--shadow); }
.docs-item { font-size: 0.82rem; padding: 0.5rem 0; border-bottom: 1px solid var(--accent); line-height: 1.4; }
.docs-item:last-child { border-bottom: none; }

.cash-bar {
  display: flex;
  gap: 1rem;
  margin-top: 0.6rem;
  font-size: 0.78rem;
  color: var(--muted);
}
.cash-bar span strong { color: var(--text); font-weight: 600; }

/* ─── LUCKY BUTTONS ─── */
.lucky-section { margin-bottom: 0.8rem; }
.lucky-buttons { display: flex; gap: 0.5rem; margin-bottom: 0.4rem; }
.lucky-btn {
  flex: 1; padding: 0.8rem 0.4rem;
  border: 2px solid var(--warm); border-radius: var(--radius);
  background: var(--card); cursor: pointer; font-family: var(--font);
  text-align: center; transition: transform 0.1s, border-color 0.15s, background 0.15s;
}
.lucky-btn:hover { border-color: var(--primary); background: var(--accent); }
.lucky-btn:active { transform: scale(0.95); }
.lucky-btn.ai-btn { border-color: var(--primary); }
.lucky-icon { font-size: 1.3rem; display: block; margin-bottom: 0.1rem; }
.lucky-label { font-size: 0.75rem; font-weight: 700; color: var(--text); line-height: 1.2; }
.lucky-sub { font-size: 0.6rem; color: var(--muted); margin-top: 0.05rem; }

.pro-row {
  display: flex; align-items: center; gap: 0.5rem;
  justify-content: flex-end; font-size: 0.72rem; color: var(--muted);
}
.pro-row .active-label { color: var(--primary); font-weight: 600; }
.pro-switch {
  position: relative; width: 34px; height: 19px;
  background: var(--accent); border-radius: 10px; cursor: pointer; border: none;
  transition: background 0.2s;
}
.pro-switch.on { background: var(--primary); }
.pro-switch::after {
  content: ''; position: absolute; top: 3px; left: 3px;
  width: 13px; height: 13px; border-radius: 50%;
  background: var(--card); box-shadow: 0 1px 2px rgba(0,0,0,0.2); transition: transform 0.2s;
}
.pro-switch.on::after { transform: translateX(15px); }
.ai-prompt-row { margin-top: 0.4rem; display: flex; gap: 0.4rem; }
.ai-input {
  flex: 1; padding: 0.5rem 0.7rem; border: 1.5px solid var(--accent); border-radius: 8px;
  font-size: 0.82rem; font-family: var(--font); background: var(--card); color: var(--text);
}
.ai-input:focus { outline: none; border-color: var(--primary); }

/* ─── SLIP (betting slip accumulator) ─── */
@keyframes revealIn {
  from { opacity: 0; transform: translateY(-5px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.slip-card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); margin-bottom: 1rem;
  overflow: hidden; animation: revealIn 0.2s ease;
}
.slip-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.6rem 0.9rem; background: var(--gentle);
  border-bottom: 1px solid var(--accent);
}
.slip-title {
  font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.07em; color: var(--muted);
}
.slip-total { font-size: 0.85rem; font-weight: 700; }
.slip-row {
  display: flex; align-items: center; gap: 0.6rem;
  padding: 0.55rem 0.9rem; border-bottom: 1px solid var(--accent);
  animation: revealIn 0.2s ease;
}
.slip-row:last-of-type { border-bottom: none; }
.slip-sym { font-weight: 800; font-size: 0.9rem; min-width: 3.5rem; }
.slip-name { flex: 1; font-size: 0.75rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.slip-price { font-size: 0.8rem; font-weight: 600; }
.slip-qty-ctrl { display: flex; align-items: center; gap: 0; border: 1px solid var(--accent); border-radius: 6px; overflow: hidden; flex-shrink: 0; }
.slip-qty-btn {
  background: var(--accent); border: none; padding: 0.3rem 0.5rem; font-size: 0.85rem;
  cursor: pointer; color: var(--text); font-family: var(--font); transition: background 0.1s; line-height: 1;
}
.slip-qty-btn:hover { background: var(--primary); color: var(--btn-text); }
.slip-qty-val {
  padding: 0.25rem 0.4rem; font-size: 0.8rem; font-weight: 600; min-width: 1.8rem;
  text-align: center; border: none; background: var(--card); color: var(--text); font-family: var(--font);
}
.slip-cost { font-size: 0.78rem; font-weight: 600; min-width: 3.5rem; text-align: right; }
.slip-remove {
  background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.9rem;
  padding: 0.1rem 0.2rem; line-height: 1; transition: color 0.1s;
}
.slip-remove:hover { color: var(--loss); }
.slip-loading { padding: 1rem; text-align: center; color: var(--muted); font-size: 0.85rem; font-style: italic; }
.slip-pending {
  display: flex; align-items: center; gap: 0.6rem; padding: 0.6rem 0.9rem;
  border-top: 1px dashed var(--accent); background: var(--gentle);
}
.slip-pending-sym { font-weight: 800; font-size: 0.9rem; color: var(--muted); }
.slip-pending-name { flex: 1; font-size: 0.75rem; color: var(--muted); font-style: italic; }
.slip-add-btn {
  background: var(--primary); color: var(--btn-text); border: none; border-radius: 7px;
  padding: 0.35rem 0.7rem; font-size: 0.78rem; font-weight: 700; cursor: pointer;
  font-family: var(--font); transition: background 0.15s, transform 0.1s; white-space: nowrap;
}
.slip-add-btn:hover { background: var(--primary-h); }
.slip-add-btn:active { transform: scale(0.95); }
.slip-add-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.slip-spin-btn {
  background: none; border: none; color: var(--muted); font-size: 0.78rem;
  cursor: pointer; font-family: var(--font); white-space: nowrap; padding: 0.2rem;
}
.slip-spin-btn:hover { color: var(--primary); text-decoration: underline; }
.slip-why {
  font-size: 0.72rem; color: var(--muted); line-height: 1.35;
  padding: 0.4rem 0.9rem 0.5rem; border-top: 1px solid var(--accent);
}
.slip-footer {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.7rem 0.9rem; border-top: 2px solid var(--accent);
  background: var(--card);
}
.slip-footer-total { flex: 1; font-size: 0.85rem; color: var(--muted); }
.slip-footer-total strong { color: var(--text); font-weight: 700; font-size: 0.9rem; }
.slip-buy-all {
  background: var(--primary); color: var(--btn-text); border: none; border-radius: 8px;
  padding: 0.55rem 1.2rem; font-size: 0.9rem; font-weight: 700; cursor: pointer;
  font-family: var(--font); transition: background 0.15s, transform 0.1s;
}
.slip-buy-all:hover { background: var(--primary-h); }
.slip-buy-all:active { transform: scale(0.97); }
.slip-buy-all:disabled { opacity: 0.35; cursor: not-allowed; }
.slip-clear-btn {
  background: none; border: none; color: var(--muted); font-size: 0.75rem;
  cursor: pointer; font-family: var(--font); padding: 0.3rem;
}
.slip-clear-btn:hover { color: var(--loss); }

/* ─── POSITIONS GRID (bookies board style) ─── */
.section-label {
  font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.07em; color: var(--muted); margin-bottom: 0.5rem;
  display: flex; align-items: baseline; gap: 0.5rem;
}
.section-label span { font-weight: 400; }
.empty-state {
  text-align: center; padding: 2rem 1rem; color: var(--muted); font-size: 0.85rem; line-height: 1.5;
}
.pos-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 1rem;
}
.pos-tile {
  background: var(--card); border-radius: 10px; padding: 0.7rem 0.8rem;
  box-shadow: var(--shadow); cursor: pointer; position: relative;
  border: 2px solid transparent;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.pos-tile:hover { border-color: var(--accent); }
.pos-tile.expanded { border-color: var(--primary); }
.pos-tile-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.3rem; }
.pos-tile-sym { font-size: 0.95rem; font-weight: 800; letter-spacing: -0.01em; }
.pos-tile-chg { font-size: 0.72rem; font-weight: 700; text-align: right; }
.pos-tile-spark { margin: 0.3rem 0; }
.pos-tile-price { font-size: 0.8rem; font-weight: 600; }
.pos-tile-pnl { font-size: 0.75rem; font-weight: 700; margin-top: 0.1rem; }
.pos-tile-sub { font-size: 0.65rem; color: var(--muted); margin-top: 0.05rem; }

/* Expanded detail panel — full width, sits between rows */
.pos-detail {
  grid-column: 1 / -1;
  background: var(--card); border-radius: 10px; padding: 0.8rem 1rem;
  box-shadow: var(--shadow); animation: revealIn 0.15s ease;
  border: 2px solid var(--primary);
}
.pos-detail-top { display: flex; align-items: baseline; gap: 0.5rem; margin-bottom: 0.5rem; }
.pos-detail-sym { font-size: 1rem; font-weight: 800; }
.pos-detail-name { font-size: 0.78rem; color: var(--muted); flex: 1; }
.pos-detail-stats {
  display: flex; flex-wrap: wrap; gap: 0.3rem 0.8rem; font-size: 0.75rem;
  color: var(--muted); margin-bottom: 0.6rem;
}
.pos-detail-stats strong { color: var(--text); }
.pos-detail-acts { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.act-btn {
  padding: 0.38rem 0.8rem; border-radius: 7px; font-size: 0.78rem; font-weight: 600;
  font-family: var(--font); cursor: pointer; border: none; transition: background 0.1s, transform 0.1s;
}
.act-btn:active { transform: scale(0.95); }
.act-buy { background: var(--accent); color: var(--text); }
.act-buy:hover { background: var(--primary); color: var(--btn-text); }
.act-sell { background: var(--gentle); color: var(--text); }
.act-sell:hover { background: var(--loss); color: #fff; }
.pos-detail-links { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid var(--accent); }
.ext-link-sm {
  font-size: 0.68rem; color: var(--muted); text-decoration: none;
  padding: 0.2rem 0.5rem; border: 1px solid var(--accent); border-radius: 5px;
  transition: color 0.1s, border-color 0.1s;
}
.ext-link-sm:hover { color: var(--primary); border-color: var(--primary); }

/* ─── SELL ALL BUTTON ─── */
.sell-all-btn {
  padding: 0.3rem 0.7rem; border-radius: 7px; font-size: 0.72rem; font-weight: 700;
  font-family: var(--font); cursor: pointer; border: 1.5px solid var(--loss);
  background: transparent; color: var(--loss); margin-right: 0.3rem;
  transition: all 0.1s;
}
.sell-all-btn:hover { background: var(--loss); color: #fff; }
.sell-all-btn:active { transform: scale(0.95); }

/* ─── DAY-BY-DAY ROWS ─── */
.day-row {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.3rem 0; border-bottom: 1px solid var(--accent);
}
.day-row:last-of-type { border-bottom: none; }
.day-today { background: color-mix(in srgb, var(--primary) 6%, transparent); border-radius: 6px; padding: 0.3rem 0.4rem; }
.day-label { font-size: 0.72rem; color: var(--muted); white-space: nowrap; min-width: 110px; }
.day-bar-track { flex: 1; height: 10px; background: var(--accent); border-radius: 5px; overflow: hidden; }
.day-bar { height: 100%; border-radius: 5px; min-width: 3px; transition: width 0.3s ease; }
.day-up { background: var(--gain); }
.day-dn { background: var(--loss); }
.day-meta { display: flex; align-items: center; gap: 0; white-space: nowrap; min-width: 120px; justify-content: flex-end; }
.day-pnl { font-size: 0.78rem; font-weight: 700; }
.day-mover { font-size: 0.65rem; color: var(--muted); margin-left: 0.3rem; }

/* ─── CHART CARD ─── */
.chart-card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 0.9rem 1rem;
  margin-bottom: 0.8rem;
}
.chart-label {
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem;
}
.chart-svg-wrap { width: 100%; overflow: visible; }
.chart-empty {
  font-size: 0.78rem; color: var(--muted); padding: 0.8rem 0;
  text-align: center; line-height: 1.5;
}

/* ─── TIME WINDOW BAR ─── */
.tw-bar {
  display: flex; gap: 0.3rem; margin-bottom: 0.6rem; align-items: center;
}
.tw-btn {
  padding: 0.25rem 0.55rem; border-radius: 6px; font-size: 0.7rem; font-weight: 700;
  font-family: var(--font); cursor: pointer; border: 1.5px solid var(--accent);
  background: var(--card); color: var(--muted); transition: all 0.1s;
}
.tw-btn:hover { border-color: var(--primary); color: var(--text); }
.tw-btn.tw-active { background: var(--primary); color: var(--btn-text); border-color: var(--primary); }
.tw-loading { font-size: 0.7rem; margin-left: 0.3rem; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.tw-headline {
  font-size: 0.85rem; font-weight: 700; margin-bottom: 0.6rem;
  padding: 0.35rem 0.7rem; background: var(--card); border-radius: 8px;
  display: inline-block;
}

/* ─── UNDERDOG ELEMENTS ─── */
.lucky-btn.underdog-btn { border-color: var(--warm); }
.lucky-btn.underdog-btn:hover { background: color-mix(in srgb, var(--warm) 15%, var(--card)); border-color: var(--warm); }
.underdog-badge {
  font-size: 0.6rem; font-weight: 700; color: #fff;
  padding: 0.15rem 0.45rem; border-radius: 5px; letter-spacing: 0.02em;
  white-space: nowrap; vertical-align: middle;
}
.conviction-row {
  display: flex; align-items: flex-start; gap: 0.4rem;
  font-size: 0.75rem; color: var(--muted); line-height: 1.4;
  margin-bottom: 0.5rem; padding: 0.4rem 0.5rem;
  background: var(--accent); border-radius: 7px;
}
.conviction-text { flex: 1; }

let _lastSnapshotDay = null;

function recordSnapshot(forced) {
  if (!portfolio) return;
  const value = portfolioTotal();
  const ts = Date.now();
  const last = snapshots[snapshots.length - 1];
  // Throttle auto-snapshots to 1 per 2 minutes; forced (on trade) always records
  if (!forced && last && (ts - last.ts) < 120000) return;
  // Per-holding values for daily attribution
  const h = portfolio.holdings.map(hh => ({ s: hh.symbol, v: holdingValue(hh) }));
  snapshots.push({ ts, value, h });
  if (snapshots.length > 500) snapshots = snapshots.slice(-500);
  save('fos_snapshots', snapshots);
}

function maybeRecordDayStart() {
  const today = new Date().toDateString();
  if (_lastSnapshotDay !== today) {
    _lastSnapshotDay = today;
    recordSnapshot(true); // day-boundary snapshot
  }
}

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) for (const [k, v] of Object.entries(attrs)) {
    if (k === 'className') e.className = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (v !== null && v !== undefined) e.setAttribute(k, v);
  }
  for (const c of children) {
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else if (c instanceof Node) e.appendChild(c);
  }
  return e;
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

function fmt(n) {

  return new Intl.NumberFormat('en-GB', { style:'currency', currency: cur, minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n);

function fmtShort(n) {

  if (Math.abs(n) >= 1000) return new Intl.NumberFormat('en-GB', { style:'currency', currency: cur, maximumFractionDigits: 0 }).format(n);

function fmtPct(n) { return (n >= 0 ? '+' : '') + n.toFixed(2) + '%'; }

function getPrice(symbol) {
  const c = priceCache[symbol];
  if (c && c.price) return c.price;
  const d = DEMO_DATA[symbol];
  return d ? d.prices[d.prices.length - 1] : null;
}

function getPriceHistory(symbol) {
  const c = priceCache[symbol];
  if (c && c.prices) return c.prices;
  const d = DEMO_DATA[symbol];
  return d ? d.prices : null;
}

function getPriceChange(symbol) {
  const c = priceCache[symbol];
  if (c && c.changePct != null) return { change: c.change, pct: c.changePct };
  const d = DEMO_DATA[symbol];
  if (!d) return null;
  const p = d.prices;
  const curr = p[p.length - 1], prev = p[p.length - 2];
  return { change: curr - prev, pct: ((curr - prev) / prev) * 100 };
}

function getHolding(symbol) {
  return portfolio && portfolio.holdings.find(h => h.symbol === symbol);
}

function holdingQty(h) { return h.lots.reduce((s, l) => s + l.qty, 0); }
function holdingCost(h) { return h.lots.reduce((s, l) => s + l.qty * l.costBasis, 0); }
function holdingValue(h) { const p = getPrice(h.symbol); return p ? holdingQty(h) * p : 0; }
function holdingPnL(h) { return holdingValue(h) - holdingCost(h); }
function holdingPnLPct(h) { const c = holdingCost(h); return c ? (holdingPnL(h) / c) * 100 : 0; }

function holdingDuration(h) {
  const oldest = h.lots.reduce((min, l) => Math.min(min, new Date(l.boughtAt).getTime()), Infinity);
  const days = Math.floor((Date.now() - oldest) / 86400000);
  if (days === 0) return 'today';
  if (days === 1) return '1 day';
  return days + ' days';
}

function portfolioTotal() {
  if (!portfolio) return 0;
  return portfolio.holdings.reduce((s, h) => s + holdingValue(h), portfolio.cash);
}
function portfolioPnL() {
  if (!profile) return 0;
  return portfolioTotal() - profile.startingBalance;
}
function portfolioPnLPct() {
  if (!profile || !profile.startingBalance) return 0;
  return (portfolioPnL() / profile.startingBalance) * 100;
}
function portfolioInvested() {
  if (!portfolio) return 0;
  return portfolio.holdings.reduce((s, h) => s + holdingValue(h), 0);
}

// ─── API ───
const CACHE_TTL = 15 * 60 * 1000;

async function fetchPrice(symbol) {
  const cached = priceCache[symbol];
  if (cached && (Date.now() - cached.fetchedAt) < CACHE_TTL) return cached;
  try {
    const url = 'https://corsproxy.io/?' + encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/' + symbol + '?interval=1d&range=1mo');
    const resp = await fetch(url, { signal: AbortSignal.timeout(5000) });
    if (resp.ok) {
      const data = await resp.json();
      const result = data.chart.result[0];
      const closes = result.indicators.quote[0].close.filter(p => p != null);
      const current = result.meta.regularMarketPrice || closes[closes.length - 1];
      const prev = closes.length >= 2 ? closes[closes.length - 2] : closes[0];
      const entry = { price: current, change: current - prev, changePct: ((current - prev) / prev) * 100, prices: closes.slice(-30), fetchedAt: Date.now() };
      priceCache[symbol] = entry;
      save('fos_prices', priceCache);
      dataMode = 'live';
      return entry;
    }
  } catch(e) {}
  const demo = DEMO_DATA[symbol];
  if (demo) {
    const p = demo.prices, cur = p[p.length - 1], prev = p[p.length - 2];
    return { price: cur, change: cur - prev, changePct: ((cur - prev) / prev) * 100, prices: p, fetchedAt: Date.now() };
  }
  return null;
}

  const symbols = portfolio.holdings.map(h => h.symbol);

// ─── HISTORICAL PRICE FOR TIME WINDOW ───
const TW_CONFIG = {
  '1H':  { range:'1d',  interval:'5m',  msBack: 60*60*1000 },
  '12H': { range:'1d',  interval:'30m', msBack: 12*60*60*1000 },
  '1D':  { range:'5d',  interval:'1h',  msBack: 24*60*60*1000 },
  '5D':  { range:'1mo', interval:'1d',  msBack: 5*24*60*60*1000 },
  '7D':  { range:'1mo', interval:'1d',  msBack: 7*24*60*60*1000 },
};

async function fetchHistoricalPrice(symbol, window) {
  const key = symbol + '_' + window;
  const cached = historicalCache[key];
  if (cached && (Date.now() - cached.fetchedAt) < 5 * 60 * 1000) return cached.price;
  const cfg = TW_CONFIG[window];
  if (!cfg) return null;
  try {
    const url = 'https://corsproxy.io/?' + encodeURIComponent(
      'https://query1.finance.yahoo.com/v8/finance/chart/' + symbol + '?range=' + cfg.range + '&interval=' + cfg.interval
    );
    const resp = await fetch(url, { signal: AbortSignal.timeout(6000) });
    if (!resp.ok) return null;
    const data = await resp.json();
    const result = data.chart.result[0];
    const timestamps = result.timestamp;
    const closes = result.indicators.quote[0].close;
    const targetTs = (Date.now() - cfg.msBack) / 1000;
    let best = null, bestDiff = Infinity;
    for (let i = 0; i < timestamps.length; i++) {
      const diff = Math.abs(timestamps[i] - targetTs);
      if (diff < bestDiff && closes[i] != null) { bestDiff = diff; best = closes[i]; }
    }
    if (best != null) {
      historicalCache[key] = { price: best, fetchedAt: Date.now() };
      return best;
    }
  } catch(e) {}
  return null;
}

async function loadTimeWindow(window) {
  if (!portfolio || portfolio.holdings.length === 0) return;
  S.timeWindow = window;
  S.twLoading = true;
  render();
  for (const h of portfolio.holdings) {
    await fetchHistoricalPrice(h.symbol, window).catch(() => {});
  }
  S.twLoading = false;
  render();
}

// ─── SPARKLINE ───
function sparklineSVG(prices, w, h) {
  if (!prices || prices.length < 2) return document.createTextNode('');
  const min = Math.min(...prices), max = Math.max(...prices), range = max - min || 1;
  const pts = prices.map((p, i) =>
    ((i / (prices.length - 1)) * w).toFixed(1) + ',' + (h - ((p - min) / range) * (h - 2) - 1).toFixed(1)
  ).join(' ');
  const color = prices[prices.length - 1] >= prices[0] ? 'var(--gain)' : 'var(--loss)';
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', w); svg.setAttribute('height', h);
  svg.setAttribute('viewBox', '0 0 ' + w + ' ' + h);
  svg.style.cssText = 'display:block;overflow:visible';
  svg.innerHTML = '<polyline points="' + pts + '" fill="none" stroke="' + color + '" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>';
  return svg;
}

// ─── TRADE LOGIC ───
function executeBuy(symbol, name, qty, price) {
  const total = qty * price;
  if (total > portfolio.cash) return false;
  portfolio.cash -= total;
  const h = getHolding(symbol);
  if (h) {
    h.lots.push({ qty, costBasis: price, boughtAt: new Date().toISOString() });
  } else {
    const co = POPULAR_COMPANIES.find(c => c.symbol === symbol) || UNDERDOG_COMPANIES.find(c => c.symbol === symbol);
    portfolio.holdings.push({
      id: uid(), symbol, name,
      lots: [{ qty, costBasis: price, boughtAt: new Date().toISOString() }],
      conviction: co ? co.why : '',
      tag: co && co.tag ? co.tag : null,
      searchQ: co && co.searchQ ? co.searchQ : null,
    });
  }
  transactions.push({ id: uid(), type:'BUY', symbol, name, qty, price, total, timestamp: new Date().toISOString() });
  saveAll();
  recordSnapshot(true);
  return true;
}

function executeSell(symbol, qty, price) {
  const h = getHolding(symbol);
  if (!h) return false;
  const curQty = holdingQty(h);
  if (qty > curQty) return false;
  const total = qty * price;
  portfolio.cash += total;
  let remaining = qty;
  while (remaining > 0 && h.lots.length > 0) {
    if (h.lots[0].qty <= remaining) { remaining -= h.lots[0].qty; h.lots.shift(); }
    else { h.lots[0].qty -= remaining; remaining = 0; }
  }
  if (h.lots.length === 0) portfolio.holdings = portfolio.holdings.filter(x => x.symbol !== symbol);
  transactions.push({ id: uid(), type:'SELL', symbol, name: h.name || symbol, qty, price, total, timestamp: new Date().toISOString() });
  saveAll();
  recordSnapshot(true);
  return true;
}

function sellAll() {
  if (!portfolio || portfolio.holdings.length === 0) return;
  const names = portfolio.holdings.map(h => h.symbol).join(', ');
  if (!confirm('Sell everything? (' + names + ')\nProceeds go back to cash.')) return;
  const toSell = [...portfolio.holdings];
  for (const h of toSell) {
    const price = getPrice(h.symbol);
    if (price) executeSell(h.symbol, holdingQty(h), price);
  }
  render();
}

// ─── RENDER: SLIP ───
function renderSlip(a) {
  if (S.slip.length === 0 && !S.slipLoading) return;

  const card = el('div', { className:'slip-card' });

  // Header
  const hdr = el('div', { className:'slip-header' });
  hdr.appendChild(el('div', { className:'slip-title' }, 'Your picks'));
  const slipTotal = S.slip.reduce((sum, item) => {
    const p = getPrice(item.symbol); return sum + (p ? p * item.qty : 0);
  }, 0);
  hdr.appendChild(el('div', { className:'slip-total' }, slipTotal > 0 ? fmtShort(slipTotal) : ''));
  card.appendChild(hdr);

  // Loading row
  if (S.slipLoading) {
    card.appendChild(el('div', { className:'slip-loading' },
      S.slipLoadSource === 'ai' ? '🧠 Claude is thinking…' : '🌐 Fetching what\'s trending…'
    ));
  }

  // Slip rows
  for (const item of S.slip) {
    const price = getPrice(item.symbol);
    const row = el('div', { className:'slip-row' });
    row.appendChild(el('div', { className:'slip-sym' }, item.symbol));
    row.appendChild(el('div', { className:'slip-name' }, item.name));
    if (price) {
      const ch = getPriceChange(item.symbol);
      const chEl = el('div', { className:'slip-price' });
      chEl.appendChild(document.createTextNode(fmtShort(price)));
      if (ch) chEl.appendChild(el('span', { className: ch.pct >= 0 ? 'pnl-up' : 'pnl-dn', style:'font-size:0.65rem;margin-left:0.25rem' }, fmtPct(ch.pct)));
      row.appendChild(chEl);
    }

    // Qty stepper
    const ctrl = el('div', { className:'slip-qty-ctrl' });
    ctrl.appendChild(el('button', { className:'slip-qty-btn', onClick(e) { e.stopPropagation(); if (item.qty > 1) { item.qty--; render(); }}}, '−'));
    ctrl.appendChild(el('span', { className:'slip-qty-val' }, String(item.qty)));
    ctrl.appendChild(el('button', { className:'slip-qty-btn', onClick(e) { e.stopPropagation(); item.qty++; render(); }}, '+'));
    row.appendChild(ctrl);

    if (price) row.appendChild(el('div', { className:'slip-cost' }, fmtShort(price * item.qty)));
    row.appendChild(el('button', { className:'slip-remove', title:'Remove', onClick(e) { e.stopPropagation(); S.slip = S.slip.filter(s => s.symbol !== item.symbol); render(); }}, '×'));
    card.appendChild(row);

    if (item.why) {
      const why = el('div', { className:'slip-why' }, item.why);
      card.appendChild(why);
    }
  }

  // Add more / spin
  const addRow = el('div', { className:'slip-pending' });
  addRow.appendChild(el('div', { className:'slip-pending-name' }, S.slip.length === 0 ? 'Spinning…' : 'Keep adding, or buy your picks'));
  addRow.appendChild(el('button', { className:'slip-spin-btn', onClick: luckyPreset }, '🎲 Add another'));
  card.appendChild(addRow);

  // Footer: total + buy all
  if (S.slip.length > 0) {
    const canAfford = S.slip.some(item => { const p = getPrice(item.symbol); return p && portfolio.cash >= p * item.qty; });
    const footer = el('div', { className:'slip-footer' });
    footer.appendChild(el('div', { className:'slip-footer-total' }, 'Total: ', el('strong', null, fmtShort(slipTotal))));
    footer.appendChild(el('button', { className:'slip-clear-btn', onClick() { S.slip = []; render(); }}, 'Clear'));
    footer.appendChild(el('button', {
      className:'slip-buy-all',
      disabled: (!canAfford) || null,
      onClick: buyAllSlip,
    }, canAfford ? 'Buy all →' : 'Not enough cash'));
    card.appendChild(footer);
  }

  a.appendChild(card);
}

// ─── RENDER: POSITIONS GRID ───
function renderPositions(a) {
  const holdings = portfolio.holdings;

  const lbl = el('div', { className:'section-label' });
  lbl.appendChild(document.createTextNode('Portfolio'));
  if (holdings.length > 0) lbl.appendChild(el('span', null, holdings.length + ' positions'));
  a.appendChild(lbl);

  if (holdings.length === 0) {
    a.appendChild(el('div', { className:'empty-state' }, 'Nothing yet. Hit a lucky button and add picks to your slip.'));
    return;
  }

  // ── Time window bar ──
  const TW_OPTIONS = [
    { key: null,  label: 'All time' },
    { key: '1H',  label: '1H' },
    { key: '12H', label: '12H' },
    { key: '1D',  label: '1D' },
    { key: '5D',  label: '5D' },
    { key: '7D',  label: '7D' },
  ];
  const twBar = el('div', { className:'tw-bar' });
  TW_OPTIONS.forEach(opt => {
    const btn = el('button', {
      className: 'tw-btn' + (S.timeWindow === opt.key ? ' tw-active' : ''),
      onClick() {
        if (opt.key === null) { S.timeWindow = null; render(); }
        else loadTimeWindow(opt.key);
      },
    }, opt.label);
    twBar.appendChild(btn);
  });
  if (S.twLoading) twBar.appendChild(el('span', { className:'tw-loading' }, '⏳'));
  a.appendChild(twBar);

  // ── Windowed aggregate P&L headline ──
  if (S.timeWindow && !S.twLoading) {
    let twTotal = 0, twCounted = 0;
    for (const h of holdings) {
      const price = getPrice(h.symbol);
      const startPrice = (historicalCache[h.symbol + '_' + S.timeWindow] || {}).price;
      if (price && startPrice) {
        twTotal += (price - startPrice) * holdingQty(h);
        twCounted++;
      }
    }
    if (twCounted > 0) {
      const up = twTotal >= 0;
      const hl = el('div', { className:'tw-headline ' + (up ? 'pnl-up' : 'pnl-dn') });
      hl.appendChild(el('span', null, 'Last ' + S.timeWindow + ': '));
      hl.appendChild(el('strong', null, (up ? '▲ +' : '▼ ') + fmtShort(twTotal)));
      a.appendChild(hl);
    }
  }

  const grid = el('div', { className:'pos-grid' });

  holdings.forEach((holding, idx) => {
    const price = getPrice(holding.symbol);
    const prices = getPriceHistory(holding.symbol);
    const ch = getPriceChange(holding.symbol);
    const qty = holdingQty(holding);
    const isExpanded = S.expandedSymbol === holding.symbol;

    // Windowed P&L if a time window is set
    let twPnl = null, twPnlPct = null;
    if (S.timeWindow) {
      const startPrice = (historicalCache[holding.symbol + '_' + S.timeWindow] || {}).price;
      if (price && startPrice) {
        twPnl = (price - startPrice) * qty;
        twPnlPct = ((price - startPrice) / startPrice) * 100;
      }
    }
    const pnl = twPnl !== null ? twPnl : holdingPnL(holding);
    const pnlPct = twPnlPct !== null ? twPnlPct : holdingPnLPct(holding);
    const pnlUp = pnl >= 0;

    // Tile
    const tile = el('div', {
      className:'pos-tile' + (isExpanded ? ' expanded' : ''),
      onClick() { S.expandedSymbol = isExpanded ? null : holding.symbol; render(); },
    });

    const top = el('div', { className:'pos-tile-top' });
    top.appendChild(el('div', { className:'pos-tile-sym' }, holding.symbol));
    if (ch) top.appendChild(el('div', { className:'pos-tile-chg ' + (ch.pct >= 0 ? 'pnl-up' : 'pnl-dn') }, fmtPct(ch.pct)));
    tile.appendChild(top);

    if (prices) tile.appendChild(el('div', { className:'pos-tile-spark' }, sparklineSVG(prices, 80, 26)));

    tile.appendChild(el('div', { className:'pos-tile-price' }, price ? fmtShort(price) : '—'));
    tile.appendChild(el('div', {
      className:'pos-tile-pnl ' + (pnlUp ? 'pnl-up' : 'pnl-dn'),
    }, (pnlUp ? '▲ +' : '▼ ') + fmtShort(pnl)));
    const subLabel = S.timeWindow
      ? qty + ' share' + (qty !== 1 ? 's' : '') + ' · ' + fmtPct(pnlPct) + ' (' + S.timeWindow + ')'
      : qty + ' share' + (qty !== 1 ? 's' : '') + ' · ' + fmtPct(pnlPct);
    tile.appendChild(el('div', { className:'pos-tile-sub' }, subLabel));

    grid.appendChild(tile);

    // Detail panel — insert after every 2 tiles, or after last tile
    if (isExpanded) {
      // We'll render detail after grid, keyed on position
      tile.dataset.showDetail = '1';
    }
  });

  a.appendChild(grid);

  // Expanded detail — render separately below grid
  if (S.expandedSymbol) {
    const holding = holdings.find(h => h.symbol === S.expandedSymbol);
    if (holding) {
      const price = getPrice(holding.symbol);
      const qty = holdingQty(holding);
      const cost = holdingCost(holding);
      const val = holdingValue(holding);
      const pnl = holdingPnL(holding);
      const pnlPct = holdingPnLPct(holding);
      const dur = holdingDuration(holding);
      const oldestMs = holding.lots.reduce((min, l) => Math.min(min, new Date(l.boughtAt).getTime()), Infinity);
      const buyDate = new Date(oldestMs).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
      const pnlUp = pnl >= 0;

      // Windowed P&L in expanded panel
      let twPnlDetail = null, twPnlPctDetail = null;
      if (S.timeWindow) {
        const startP = (historicalCache[holding.symbol + '_' + S.timeWindow] || {}).price;
        if (price && startP) {
          twPnlDetail = (price - startP) * qty;
          twPnlPctDetail = ((price - startP) / startP) * 100;
        }
      }

      const detail = el('div', { className:'pos-detail' });

      const top = el('div', { className:'pos-detail-top' });
      top.appendChild(el('span', { className:'pos-detail-sym' }, holding.symbol));
      top.appendChild(el('span', { className:'pos-detail-name' }, holding.name));
      // Underdog tag badge
      if (holding.tag) {
        const tagColor = UNDERDOG_TAG_COLORS[holding.tag] || 'var(--muted)';
        const badge = el('span', { className:'underdog-badge', style:'background:' + tagColor }, holding.tag);
        top.appendChild(badge);
      }
      top.appendChild(el('button', { className:'slip-clear-btn', onClick() { S.expandedSymbol = null; render(); }}, '✕'));
      detail.appendChild(top);

      // Conviction text + tooltip link for underdogs
      if (holding.conviction) {
        const convRow = el('div', { className:'conviction-row' });
        convRow.appendChild(el('span', { className:'conviction-text' }, holding.conviction));
        if (holding.searchQ) {
          const searchUrl = 'https://www.google.com/search?q=' + encodeURIComponent(holding.searchQ);
          convRow.appendChild(el('a', { className:'conviction-search', href: searchUrl, target:'_blank', rel:'noopener', title:'Search for evidence' }, '🔎'));
        }
        detail.appendChild(convRow);
      }

      const stats = el('div', { className:'pos-detail-stats' });
      stats.appendChild(el('span', null, el('strong', null, qty + ' share' + (qty !== 1 ? 's' : ''))));
      stats.appendChild(el('span', null, 'bought ', el('strong', null, buyDate)));
      stats.appendChild(el('span', null, 'held ', el('strong', null, dur)));
      stats.appendChild(el('span', null, 'cost ', el('strong', null, fmtShort(cost))));
      stats.appendChild(el('span', null, 'value ', el('strong', null, fmtShort(val))));
      stats.appendChild(el('span', { className: pnlUp ? 'pnl-up' : 'pnl-dn', style:'font-weight:700' },
        (pnlUp ? '▲ +' : '▼ ') + fmtShort(pnl) + ' (' + fmtPct(pnlPct) + ') all time'
      ));
      if (twPnlDetail !== null) {
        const twUp = twPnlDetail >= 0;
        stats.appendChild(el('span', { className: twUp ? 'pnl-up' : 'pnl-dn', style:'font-weight:700' },
          (twUp ? '▲ +' : '▼ ') + fmtShort(twPnlDetail) + ' (' + fmtPct(twPnlPctDetail) + ') last ' + S.timeWindow
        ));
      }
      detail.appendChild(stats);

      const acts = el('div', { className:'pos-detail-acts' });
      if (!slipHas(holding.symbol)) {
        acts.appendChild(el('button', { className:'act-btn act-buy', onClick() {
          addToSlip({ symbol: holding.symbol, name: holding.name, sector: '', why: holding.conviction || '' });
          S.expandedSymbol = null; render();
        }}, '+ Add to slip'));
      }
      if (price) {
        acts.appendChild(el('button', { className:'act-btn act-sell', onClick() {
          if (confirm('Sell all ' + qty + ' shares of ' + holding.symbol + '?')) {
            executeSell(holding.symbol, qty, price); S.expandedSymbol = null; render();
          }
        }}, 'Sell all'));
      }
      detail.appendChild(acts);

      const sym = holding.symbol;
      const isETF = (POPULAR_COMPANIES.find(c => c.symbol === sym) || UNDERDOG_COMPANIES.find(c => c.symbol === sym) || {}).sector === 'ETF';
      const cleanSym = sym.replace('.L','').toLowerCase();
      const lnks = el('div', { className:'pos-detail-links' });
      lnks.appendChild(el('a', { className:'ext-link-sm', href:'https://finance.yahoo.com/quote/' + encodeURIComponent(sym), target:'_blank', rel:'noopener' }, '📈 Live price'));

// ─── RENDER: EARNINGS CHART + HISTOGRAM ───
function renderChart(a) {
  if (!portfolio || (portfolio.holdings.length === 0 && snapshots.length < 2)) return;

  const holdings = portfolio.holdings;
  const card = el('div', { className:'chart-card' });

  // ── Continuous line chart ──
  const snaps = snapshots.length >= 2 ? snapshots : null;
  card.appendChild(el('div', { className:'chart-label' }, 'Earnings over time'));

  if (snaps) {
    const W = 460, H = 110;
    const values = snaps.map(s => s.value);
    const times  = snaps.map(s => s.ts);
    const minV = Math.min(...values), maxV = Math.max(...values);
    const rangeV = (maxV - minV) || 1;
    const minT = times[0], maxT = times[times.length - 1];
    const rangeT = (maxT - minT) || 1;
    const pad = { l: 2, r: 2, t: 8, b: 20 };
    const cw = W - pad.l - pad.r, ch = H - pad.t - pad.b;
    const xOf = t => (pad.l + ((t - minT) / rangeT) * cw).toFixed(1);
    const yOf = v => (pad.t + (1 - (v - minV) / rangeV) * ch).toFixed(1);
    const pts = snaps.map(s => xOf(s.ts) + ',' + yOf(s.value)).join(' ');
    const isUp = values[values.length - 1] >= values[0];
    const col = isUp ? '#5cbf8a' : '#d46a6a';
    const colA = isUp ? 'rgba(92,191,138,0.12)' : 'rgba(212,106,106,0.12)';
    const baseY = (pad.t + ch).toFixed(1);
    const areaPts = xOf(minT) + ',' + baseY + ' ' + pts + ' ' + xOf(maxT) + ',' + baseY;
    const fmtAgo = ts => {
      const m = Math.round((Date.now() - ts) / 60000);
      if (m < 1) return 'now';
      if (m < 60) return m + 'm ago';
      const hh = Math.round(m / 60);
      if (hh < 24) return hh + 'h ago';
      return Math.round(hh / 24) + 'd ago';
    };
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('width', '100%');
    svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
    svg.style.cssText = 'display:block;overflow:visible;';
    svg.innerHTML =
      '<polygon points="' + areaPts + '" fill="' + colA + '" stroke="none"/>' +
      '<polyline points="' + pts + '" fill="none" stroke="' + col + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' +
      '<circle cx="' + xOf(maxT) + '" cy="' + yOf(values[values.length-1]) + '" r="3" fill="' + col + '"/>' +
      '<text x="' + pad.l + '" y="' + (H-4) + '" font-size="9" fill="rgba(128,128,128,0.8)" font-family="system-ui">' + fmtAgo(minT) + '</text>' +
      '<text x="' + (W-pad.r) + '" y="' + (H-4) + '" font-size="9" fill="rgba(128,128,128,0.8)" font-family="system-ui" text-anchor="end">now</text>' +
      '<text x="' + pad.l + '" y="14" font-size="9" fill="rgba(128,128,128,0.8)" font-family="system-ui">' + fmtShort(maxV) + '</text>' +
      '<text x="' + pad.l + '" y="' + (H-22) + '" font-size="9" fill="rgba(128,128,128,0.8)" font-family="system-ui">' + fmtShort(minV) + '</text>';
    card.appendChild(el('div', { className:'chart-svg-wrap' }, svg));
  } else {
    card.appendChild(el('div', { className:'chart-empty' }, 'Tracking starts now — the line will grow as prices update.'));
  }

  // ── Day-by-day breakdown ──
  if (snapshots.length >= 2) {
    // Group snapshots by calendar day
    const dayMap = {};
    for (const s of snapshots) {
      const d = new Date(s.ts);
      const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      if (!dayMap[key]) dayMap[key] = [];
      dayMap[key].push(s);
    }
    const days = Object.entries(dayMap).sort(([a],[b]) => a.localeCompare(b));

    // Compute day numbers from first day
    const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const dayPnls = days.map(([dateStr, daySnaps], i) => {
      const first = daySnaps[0];
      const last  = daySnaps[daySnaps.length - 1];
      const pnl   = last.value - first.value;

      // Find top mover from holdings embedded in snaps
      let topMover = null;
      if (first.h && last.h) {
        let best = 0;
        for (const lh of last.h) {
          const fh = first.h.find(x => x.s === lh.s);
          if (!fh) continue;
          const delta = lh.v - fh.v;
          if (Math.abs(delta) > Math.abs(best)) { best = delta; topMover = { sym: lh.s, pnl: delta }; }
        }
      }

      const d = new Date(dateStr);
      const label = 'Day ' + (i + 1) + ' · ' + DAY_NAMES[d.getDay()] + ' ' + d.getDate() + '/' + (d.getMonth()+1);
      return { label, pnl, topMover, closeValue: last.value };
    });

    card.appendChild(el('div', { className:'chart-label', style:'margin-top:1rem' }, 'Day by day'));

    const maxAbsPnl = Math.max(...dayPnls.map(d => Math.abs(d.pnl)), 1);
    dayPnls.forEach((day, i) => {
      const isToday = i === dayPnls.length - 1;
      const row = el('div', { className:'day-row' + (isToday ? ' day-today' : '') });

      row.appendChild(el('div', { className:'day-label' }, day.label));

      const barTrack = el('div', { className:'day-bar-track' });
      const barPct = (Math.abs(day.pnl) / maxAbsPnl * 100).toFixed(0) + '%';
      barTrack.appendChild(el('div', {
        className: 'day-bar ' + (day.pnl >= 0 ? 'day-up' : 'day-dn'),
        style: 'width:' + barPct,
      }));
      row.appendChild(barTrack);

      const meta = el('div', { className:'day-meta' });
      meta.appendChild(el('span', { className: 'day-pnl ' + (day.pnl >= 0 ? 'pnl-up' : 'pnl-dn') },
        (day.pnl >= 0 ? '+' : '') + fmtShort(day.pnl)));
      if (day.topMover && Math.abs(day.topMover.pnl) > 0.01) {
        meta.appendChild(el('span', { className:'day-mover' },
          ' · ' + day.topMover.sym + ' ' + (day.topMover.pnl >= 0 ? '+' : '') + fmtShort(day.topMover.pnl)));
      }
      row.appendChild(meta);
      card.appendChild(row);
    });
  }

  // ── Position histogram ──
  if (holdings.length > 0) {
    card.appendChild(el('div', { className:'chart-label', style:'margin-top:1rem' }, 'What you hold'));

    const totalVal = holdings.reduce((s, hh) => s + holdingValue(hh), 0) + portfolio.cash;
    const allBars = [
      ...holdings.map(hh => ({ label: hh.symbol, value: holdingValue(hh), pnl: holdingPnL(hh), isCash: false })),
      { label: 'Cash', value: portfolio.cash, pnl: 0, isCash: true },
    ].filter(b => b.value > 0);

    const histW = 460, barH = 18, gap = 5, labelW = 50;
    const maxBarW = histW - labelW - 80;
    const maxBVal = Math.max(...allBars.map(b => b.value));
    const histSvgH = allBars.length * (barH + gap);

    const hist = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    hist.setAttribute('width', '100%');
    hist.setAttribute('viewBox', '0 0 ' + histW + ' ' + histSvgH);
    hist.style.cssText = 'display:block;overflow:visible;';
    let inner = '';
    allBars.forEach((b, i) => {
      const y = i * (barH + gap);
      const bw = Math.max(3, (b.value / maxBVal) * maxBarW);
      const col = b.isCash ? 'rgba(128,128,128,0.3)' : b.pnl >= 0 ? 'rgba(92,191,138,0.65)' : 'rgba(212,106,106,0.65)';
      const pct = ((b.value / totalVal) * 100).toFixed(0) + '%';
      inner +=
        '<text x="' + (labelW-4) + '" y="' + (y+barH-4) + '" font-size="9.5" fill="rgba(140,140,140,0.9)" font-family="system-ui" text-anchor="end">' + b.label + '</text>' +
        '<rect x="' + labelW + '" y="' + y + '" width="' + bw.toFixed(1) + '" height="' + barH + '" fill="' + col + '" rx="3"/>' +
        '<text x="' + (labelW+bw+5) + '" y="' + (y+barH-4) + '" font-size="9" fill="rgba(140,140,140,0.9)" font-family="system-ui">' + fmtShort(b.value) + ' · ' + pct + '</text>';
    });
    hist.innerHTML = inner;
    card.appendChild(el('div', { className:'chart-svg-wrap' }, hist));
  }

  a.appendChild(card);
}

const BROKER_FEES = {
  'T212':  { name:'Trading 212',        perTrade: 0,     fxRate: 0.0015, stampDuty: true },
  'FREE':  { name:'Freetrade Basic',    perTrade: 0,     fxRate: 0.0099, stampDuty: true },
  'HL':    { name:'Hargreaves Lansdown',perTrade: 11.95, fxRate: 0.0100, stampDuty: true },
  'AJB':   { name:'AJ Bell',           perTrade: 9.95,  fxRate: 0.0100, stampDuty: true },
};

const REFRESH_OPTIONS = [
  { label:'Off',       ms: 0 },
  { label:'15 sec',    ms: 15000 },
  { label:'1 min',     ms: 60000 },
  { label:'5 min',     ms: 300000 },
  { label:'15 min',    ms: 900000 },
  { label:'2 hours',   ms: 7200000 },
  { label:'Every day', ms: 86400000 },
];

function renderRealCalc(a) {
  if (!portfolio) return;

  // ── Trigger button ──
  const trigger = el('button', {
    className: 'realcalc-trigger',
    onClick() { S.realCalcOpen = !S.realCalcOpen; saveAll(); render(); },
  });
  trigger.appendChild(el('span', { className:'realcalc-trigger-icon' }, '💷'));
  const trigText = el('span', { className:'realcalc-trigger-text' });
  trigText.appendChild(el('strong', null, 'What would this cost for real?'));
  trigText.appendChild(el('span', null, ' After fees, stamp duty, and real broker costs.'));
  trigger.appendChild(trigText);
  trigger.appendChild(el('span', { className:'realcalc-arrow' + (S.realCalcOpen ? ' open' : '') }, '▶'));
  a.appendChild(trigger);

  if (!S.realCalcOpen) return;

  const panel = el('div', { className:'realcalc-panel' });

  // ── Broker selector ──
  const bRow = el('div', { className:'realcalc-section' });
  bRow.appendChild(el('div', { className:'realcalc-label' }, 'Which broker?'));
  const bTabs = el('div', { className:'realcalc-broker-tabs' });
  Object.entries(BROKER_FEES).forEach(([key, b]) => {
    bTabs.appendChild(el('button', {
      className: 'realcalc-broker-btn' + (S.realCalcBroker === key ? ' active' : ''),
      onClick() { S.realCalcBroker = key; saveAll(); render(); },
    }, b.name));
  });
  bRow.appendChild(bTabs);
  panel.appendChild(bRow);

  // ── Fee calculation ──
  const broker = BROKER_FEES[S.realCalcBroker];
  const holdings = portfolio ? portfolio.holdings : [];
  const numTrades = holdings.length;

  let totalInvested = 0;
  let totalCurrentValue = 0;
  const rows = [];

  for (const h of holdings) {
    const price = getPrice(h.symbol);
    const qty = holdingQty(h);
    const cost = holdingCost(h);
    const value = price ? price * qty : cost;
    const tradeFee = broker.perTrade;
    const isUK = h.symbol.endsWith('.L');
    const isETF = (POPULAR_COMPANIES.find(c => c.symbol === h.symbol) || UNDERDOG_COMPANIES.find(c => c.symbol === h.symbol) || {}).sector === 'ETF';
    // Stamp duty: 0.5% on UK non-ETF share buys
    const stampRate = (broker.stampDuty && isUK && !isETF) ? 0.005 : 0;
    const stampDuty = cost * stampRate;
    // FX: applies on both buy and sell for non-GBP symbols
    const isForeign = !isUK;
    const fxFee = isForeign ? (cost * broker.fxRate + value * broker.fxRate) : 0;
    const totalFeeForPosition = tradeFee + stampDuty + fxFee;
    totalInvested += cost + totalFeeForPosition;
    totalCurrentValue += value;
    rows.push({ h, price, qty, cost, value, tradeFee, stampDuty, fxFee, totalFeeForPosition });
  }

  const totalTradeFees = rows.reduce((s, r) => s + r.tradeFee, 0);
  const totalStampDuty = rows.reduce((s, r) => s + r.stampDuty, 0);
  const totalFxFees = rows.reduce((s, r) => s + r.fxFee, 0);
  const totalAllFees = totalTradeFees + totalStampDuty + totalFxFees;
  const realStartingCash = portfolio ? portfolio.cash + totalInvested : 0;
  const realCurrentValue = portfolio.cash + totalCurrentValue - totalAllFees;
  const realPnl = realCurrentValue - realStartingCash;
  const realPnlUp = realPnl >= 0;

  // ── Big number ──
  const bigCard = el('div', { className:'realcalc-big' });
  bigCard.appendChild(el('div', { className:'realcalc-big-label' }, 'If you\'d traded with real money today'));
  const bigNum = el('div', { className:'realcalc-big-num' });
  bigNum.appendChild(el('span', null, fmtShort(realCurrentValue)));
  bigNum.appendChild(el('span', { className:'realcalc-big-sub' }, 'in your account right now'));
  bigCard.appendChild(bigNum);
  const bigPnl = el('div', { className:'realcalc-big-pnl ' + (realPnlUp ? 'pnl-up' : 'pnl-dn') });
  bigPnl.appendChild(document.createTextNode((realPnlUp ? '▲ +' : '▼ ') + fmtShort(Math.abs(realPnl)) + ' vs what you put in'));
  bigCard.appendChild(bigPnl);
  panel.appendChild(bigCard);

  // ── Fee breakdown ──
  const feeCard = el('div', { className:'realcalc-fees' });
  feeCard.appendChild(el('div', { className:'realcalc-label' }, 'Fee breakdown'));
  const feeTable = el('div', { className:'realcalc-fee-table' });

  if (totalTradeFees > 0) {
    const fRow = el('div', { className:'realcalc-fee-row' });
    fRow.appendChild(el('span', null, 'Trading fees (' + numTrades + ' trade' + (numTrades !== 1 ? 's' : '') + ' × ' + fmtShort(broker.perTrade) + ')'));
    fRow.appendChild(el('span', { className:'pnl-dn' }, '−' + fmtShort(totalTradeFees)));
    feeTable.appendChild(fRow);
  } else {
    const fRow = el('div', { className:'realcalc-fee-row' });
    fRow.appendChild(el('span', null, 'Trading fees'));
    fRow.appendChild(el('span', { className:'pnl-up' }, 'Free ✓'));
    feeTable.appendChild(fRow);
  }

  if (totalStampDuty > 0) {
    const sRow = el('div', { className:'realcalc-fee-row' });
    sRow.appendChild(el('span', null, 'Stamp duty (0.5% on UK shares, buy only)'));
    sRow.appendChild(el('span', { className:'pnl-dn' }, '−' + fmtShort(totalStampDuty)));
    feeTable.appendChild(sRow);
  }

  if (totalFxFees > 0) {
    const fxRow = el('div', { className:'realcalc-fee-row' });
    fxRow.appendChild(el('span', null, 'FX conversion (' + (broker.fxRate * 100).toFixed(2) + '% each way, US/foreign stocks)'));
    fxRow.appendChild(el('span', { className:'pnl-dn' }, '−' + fmtShort(totalFxFees)));
    feeTable.appendChild(fxRow);
  }

  const totRow = el('div', { className:'realcalc-fee-row realcalc-fee-total' });
  totRow.appendChild(el('span', null, 'Total fees eaten'));
  totRow.appendChild(el('span', { className:'pnl-dn' }, '−' + fmtShort(totalAllFees)));
  feeTable.appendChild(totRow);

  feeCard.appendChild(feeTable);
  panel.appendChild(feeCard);

  // ── Per-position breakdown ──
  if (rows.length > 0) {
    const posCard = el('div', { className:'realcalc-fees' });
    posCard.appendChild(el('div', { className:'realcalc-label' }, 'Per position'));
    rows.forEach(r => {
      const pRow = el('div', { className:'realcalc-fee-row' });
      const pnlUp = r.value >= r.cost;
      pRow.appendChild(el('span', null, r.h.symbol + ' · ' + r.qty + ' share' + (r.qty !== 1 ? 's' : '')));
      const right = el('span');
      right.appendChild(el('span', { className: pnlUp ? 'pnl-up' : 'pnl-dn' }, fmtShort(r.value)));
      if (r.totalFeeForPosition > 0) right.appendChild(el('span', { className:'pnl-dn', style:'font-size:0.65rem;margin-left:0.3rem' }, '−' + fmtShort(r.totalFeeForPosition) + ' fees'));
      pRow.appendChild(right);
      posCard.appendChild(pRow);
    });
    panel.appendChild(posCard);
  }

  // ── Live refresh slider ──
  const refreshCard = el('div', { className:'realcalc-fees' });
  refreshCard.appendChild(el('div', { className:'realcalc-label' }, 'Auto-refresh prices'));
  const sliderRow = el('div', { className:'realcalc-slider-row' });
  const currentIdx = REFRESH_OPTIONS.findIndex(o => o.ms === S.liveRefreshMs);
  const slider = el('input', {
    type: 'range', min: '0', max: String(REFRESH_OPTIONS.length - 1),
    value: String(currentIdx >= 0 ? currentIdx : 0),
    className: 'refresh-slider',
  });
  slider.addEventListener('input', () => {
    const idx = parseInt(slider.value);
    S.liveRefreshMs = REFRESH_OPTIONS[idx].ms;
    saveAll();
    startAutoRefresh();
    sliderLabel.textContent = REFRESH_OPTIONS[idx].label;
  });
  const sliderLabel = el('div', { className:'realcalc-slider-label' }, REFRESH_OPTIONS[currentIdx >= 0 ? currentIdx : 0].label);
  sliderRow.appendChild(slider);
  sliderRow.appendChild(sliderLabel);

  const tickLabels = el('div', { className:'realcalc-tick-labels' });
  REFRESH_OPTIONS.forEach(o => tickLabels.appendChild(el('span', null, o.label)));
  refreshCard.appendChild(sliderRow);
  refreshCard.appendChild(tickLabels);
  refreshCard.appendChild(el('div', { className:'realcalc-hint' }, 'The simulation ticks every 5s regardless — this controls real price fetches from Yahoo Finance.'));
  panel.appendChild(refreshCard);

  a.appendChild(panel);
}

// ─── LIVE SIMULATION + AUTO-REFRESH ───
let lastTickAt = null;
let tickInterval = null;

function simulatePriceTick() {
  // Small random walk on all demo symbols — makes sparklines and prices feel alive
  for (const [sym, demo] of Object.entries(DEMO_DATA)) {
    const base = demo.prices[demo.prices.length - 1];
    const prev = demo.prices[demo.prices.length - 2];
    const entry = priceCache[sym] || { price: base, prices: [...demo.prices] };

    // ±0.2% jitter per tick, mean-revert toward base so it doesn't drift forever
    const drift = (base - entry.price) * 0.05; // gentle pull back to base
    const noise = entry.price * (Math.random() * 0.004 - 0.002);
    const newPrice = Math.max(entry.price + drift + noise, base * 0.8); // floor at -20%

    const dayChange = newPrice - prev;
    const newPrices = [...(entry.prices || demo.prices).slice(-29), newPrice];

    priceCache[sym] = {
      price: newPrice,
      change: dayChange,
      changePct: (dayChange / prev) * 100,
      prices: newPrices,
      fetchedAt: Date.now(),
    };
  }
  lastTickAt = Date.now();
  if (portfolio && (portfolio.holdings.length > 0 || S.luckyResult)) render();
}

let liveRefreshInterval = null;

function startAutoRefresh() {
  if (tickInterval) clearInterval(tickInterval);
  if (liveRefreshInterval) clearInterval(liveRefreshInterval);

  // Price simulation tick — always on, 5s
  tickInterval = setInterval(simulatePriceTick, 5000);
  setTimeout(simulatePriceTick, 600);

  // Real price fetch — falls back to 45s minimum, or user-configured interval
  const userMs = S && S.liveRefreshMs > 0 ? S.liveRefreshMs : 45000;
  const fetchMs = Math.max(userMs, 15000); // never faster than 15s to avoid rate limits
  liveRefreshInterval = setInterval(async () => {
    if (portfolio && portfolio.holdings.length > 0) {
      const symbols = portfolio.holdings.map(h => h.symbol);
      for (const sym of symbols) {
        try { await fetchPrice(sym); } catch(e) {}
        await new Promise(r => setTimeout(r, 300));
      }
      lastTickAt = Date.now();
      maybeRecordDayStart();
      recordSnapshot(false);
      if (portfolio.holdings.length > 0) render();
    }
  }, fetchMs);
}
