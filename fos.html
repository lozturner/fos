}

@media (prefers-color-scheme: dark) {

    --primary-hover: #6a9f87;
    --accent: #2a3a35;
    --warm: #c4956e;
    --gentle: #2a2535;

    --loss: #c06a6a;

    --cat-work: #6aad6e;
    --cat-trend: #9a7ac4;
    --cat-watch: #c4a850;

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; }
}

body {
  font-family: var(--font);
  font-size: 1.125rem;
  line-height: 1.6;
  color: var(--text);
  background: var(--bg);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

#app {
  max-width: 480px;

.center { text-align: center; }
.spacer { height: 1rem; }
.spacer-lg { height: 2rem; }
.hero-text { font-size: 1.5rem; font-weight: 600; text-align: center; line-height: 1.3; }
.sub-text { font-size: 0.9rem; color: var(--text-muted); text-align: center; }

h2 { font-size: 1.3rem; font-weight: 600; }
h3 { font-size: 1.05rem; font-weight: 600; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }

.btn {

  transition: transform 0.1s, opacity 0.1s;
  text-align: center;
}
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--primary); color: var(--btn-text); font-weight: 500; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-state { background: var(--accent); color: var(--text); }
.btn-escape { background: var(--escape-bg); color: var(--escape-text); font-size: 0.9rem; }
.btn-escape:hover { text-decoration: underline; }
.btn-group { display: flex; flex-direction: column; gap: 0.6rem; }

.input-field {
  display: block; width: 100%; padding: 0.75rem 1rem;
  border: 1.5px solid var(--accent); border-radius: 10px;
  font-size: 1rem; font-family: var(--font);
  background: var(--card-bg); color: var(--text);
  transition: border-color 0.2s;
  resize: vertical;
}
.input-field:focus { outline: none; border-color: var(--primary); }

.input-small {
  flex: 1; padding: 0.6rem 0.8rem;
  border: 1.5px solid var(--accent); border-radius: 8px;
  font-size: 0.95rem; font-family: var(--font);
  background: var(--card-bg); color: var(--text);
}
.input-small:focus { outline: none; border-color: var(--primary); }

.add-row { display: flex; gap: 0.5rem; align-items: center; }
.add-btn {
  padding: 0.6rem 1rem; border: none; border-radius: 8px;
  background: var(--primary); color: var(--btn-text);
  font-size: 0.95rem; font-family: var(--font); cursor: pointer;
}

.section-card {
  background: var(--card-bg); border-radius: 12px;
  padding: 1rem 1.2rem; box-shadow: var(--shadow);
}

.gentle-box {
  background: var(--gentle); border-radius: 10px;
  padding: 0.8rem 1rem; text-align: center;
}

.chip-list { display: flex; flex-wrap: wrap; gap: 0.4rem; }
.chip {
  display: inline-flex; align-items: center; gap: 0.3rem;
  padding: 0.3rem 0.7rem; border-radius: 20px;
  font-size: 0.85rem; background: var(--accent); color: var(--text);
}
.chip-remove {
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); font-size: 1rem; padding: 0 0.1rem;
}

.balance-label {

.pnl { font-weight: 600; }
.pnl-up { color: var(--gain); }
.pnl-down { color: var(--loss); }

.allocation-bar {

.allocation-segment { height: 100%; transition: width 0.3s; }

.holding-info { flex: 1; min-width: 0; }
.holding-symbol { font-weight: 600; font-size: 0.95rem; }
.holding-name { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.holding-value { text-align: right; }
.holding-price { font-weight: 500; font-size: 0.95rem; }
.holding-pnl { font-size: 0.8rem; }

.cat-badge {

  border-radius: 10px; font-size: 0.7rem; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.03em;

.cat-badge[data-cat="admire"] { background: var(--cat-admire); color: #1a1a2e; }
.cat-badge[data-cat="work"] { background: var(--cat-work); color: #1a1a2e; }
.cat-badge[data-cat="trend"] { background: var(--cat-trend); color: #1a1a2e; }
.cat-badge[data-cat="watch"] { background: var(--cat-watch); color: #1a1a2e; }

.nav-bar {

.nav-item {

.nav-item:hover, .nav-item.active { color: var(--primary); }

.toggle-group {

.tx-amount { text-align: right; font-weight: 500; font-size: 0.9rem; }

// ─── RENDER ENGINE ───
const $ = id => document.getElementById(id);
const app = () => $('app');

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'className') e.className = v;
      else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
      else if (v !== null && v !== undefined) e.setAttribute(k, v);
    }
  }
  for (const c of children) {
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else if (c) e.appendChild(c);
  }
  return e;
}

function render() {
  const a = app();
  a.innerHTML = '';
  const views = {
    WELCOME: vWelcome,

// ─── HELPERS ───
function uid() { return 'fos_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8); }

function formatMoney(n, compact) {
  const cur = profile ? profile.currency : 'GBP';
  if (compact && Math.abs(n) >= 1000) {
    return new Intl.NumberFormat('en-GB', { style: 'currency', currency: cur, maximumFractionDigits: 0 }).format(n);
  }
  return new Intl.NumberFormat('en-GB', { style: 'currency', currency: cur, minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n);
}

function formatPct(n) {
  const sign = n >= 0 ? '+' : '';
  return sign + n.toFixed(2) + '%';
}

function greeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Morning';
  if (h < 17) return 'Afternoon';
  return 'Evening';
}

function getPrice(symbol) {
  // Check cache first
  const cached = priceCache[symbol];
  if (cached && cached.price) return cached.price;
  // Fall back to demo data
  const demo = DEMO_DATA[symbol];
  if (demo) return demo.prices[demo.prices.length - 1];
  return null;
}

function getPriceHistory(symbol) {
  const demo = DEMO_DATA[symbol];
  if (demo) return demo.prices;
  return null;
}

function getHolding(symbol) {
  if (!portfolio) return null;
  return portfolio.holdings.find(h => h.symbol === symbol);
}

function holdingQty(holding) {
  return holding.lots.reduce((sum, l) => sum + l.qty, 0);
}

function holdingCostBasis(holding) {
  return holding.lots.reduce((sum, l) => sum + (l.qty * l.costBasis), 0);
}

function holdingCurrentValue(holding) {
  const price = getPrice(holding.symbol);
  if (!price) return 0;
  return holdingQty(holding) * price;
}

function holdingPnL(holding) {
  return holdingCurrentValue(holding) - holdingCostBasis(holding);
}

function holdingPnLPct(holding) {
  const cost = holdingCostBasis(holding);
  if (cost === 0) return 0;
  return (holdingPnL(holding) / cost) * 100;
}

function portfolioValue() {
  if (!portfolio) return 0;
  let total = portfolio.cash;
  for (const h of portfolio.holdings) {
    total += holdingCurrentValue(h);
  }
  return total;
}

function portfolioPnL() {
  if (!profile || !portfolio) return 0;
  return portfolioValue() - profile.startingBalance;
}

function portfolioPnLPct() {
  if (!profile) return 0;
  return (portfolioPnL() / profile.startingBalance) * 100;
}

// ─── API ───
const CACHE_TTL = 15 * 60 * 1000; // 15 minutes

async function fetchPrice(symbol) {
  const cached = priceCache[symbol];
  if (cached && (Date.now() - cached.fetchedAt) < CACHE_TTL) return cached;

  // Try Yahoo via CORS proxy
  try {
    const url = 'https://corsproxy.io/?' + encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/' + symbol + '?interval=1d&range=1mo');
    const resp = await fetch(url, { signal: AbortSignal.timeout(5000) });
    if (resp.ok) {
      const data = await resp.json();
      const result = data.chart.result[0];
      const meta = result.meta;
      const closes = result.indicators.quote[0].close.filter(p => p != null);
      const prev = closes.length >= 2 ? closes[closes.length - 2] : closes[0];
      const current = meta.regularMarketPrice || closes[closes.length - 1];
      const change = current - prev;
      const changePct = (change / prev) * 100;
      const entry = { price: current, change, changePct, prices: closes.slice(-30), fetchedAt: Date.now() };
      priceCache[symbol] = entry;
      save('fos_price_cache', priceCache);
      dataMode = 'live';
      return entry;
    }
  } catch(e) { /* fall through */ }

  // Try Alpha Vantage if key exists
  const avKey = profile && profile.alphaVantageKey;
  if (avKey) {
    try {
      const url = 'https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=' + symbol + '&apikey=' + avKey;
      const resp = await fetch(url, { signal: AbortSignal.timeout(5000) });
      if (resp.ok) {
        const data = await resp.json();
        const q = data['Global Quote'];
        if (q && q['05. price']) {
          const price = parseFloat(q['05. price']);
          const change = parseFloat(q['09. change']);
          const changePct = parseFloat(q['10. change percent']);
          const entry = { price, change, changePct, fetchedAt: Date.now() };
          priceCache[symbol] = entry;
          save('fos_price_cache', priceCache);
          dataMode = 'live';
          return entry;
        }
      }
    } catch(e) { /* fall through */ }
  }

  // Fallback to demo
  const demo = DEMO_DATA[symbol];
  if (demo) {
    const prices = demo.prices;
    const current = prices[prices.length - 1];
    const prev = prices[prices.length - 2];
    const entry = { price: current, change: current - prev, changePct: ((current - prev) / prev) * 100, prices, fetchedAt: Date.now() };
    priceCache[symbol] = entry;
    dataMode = 'demo';
    return entry;
  }
  return null;
}

async function refreshAllPrices() {
  if (!portfolio) return;
  const symbols = [...new Set(portfolio.holdings.map(h => h.symbol))];
  for (let i = 0; i < symbols.length; i++) {
    await fetchPrice(symbols[i]);
    if (i < symbols.length - 1) await new Promise(r => setTimeout(r, 200));
  }
  render();
}

// ─── SPARKLINE ───
function sparklineSVG(prices, w, h) {
  w = w || 80; h = h || 36;
  if (!prices || prices.length < 2) return el('span');
  const min = Math.min(...prices);
  const max = Math.max(...prices);
  const range = max - min || 1;
  const points = prices.map((p, i) =>
    ((i / (prices.length - 1)) * w).toFixed(1) + ',' + (h - ((p - min) / range) * h).toFixed(1)
  ).join(' ');
  const color = prices[prices.length - 1] >= prices[0] ? 'var(--gain)' : 'var(--loss)';
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', w);
  svg.setAttribute('height', h);
  svg.setAttribute('viewBox', '0 0 ' + w + ' ' + h);
  svg.style.display = 'block';
  svg.innerHTML = '<polyline points="' + points + '" fill="none" stroke="' + color + '" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>';
  return svg;
}

// ─── TRADE LOGIC ───
function executeBuy(symbol, name, qty, price, category, conviction, riskLevel, timeHorizon) {
  const total = qty * price;
  if (total > portfolio.cash) return false;
  portfolio.cash -= total;

  let holding = getHolding(symbol);
  if (holding) {
    holding.lots.push({ qty, costBasis: price, boughtAt: new Date().toISOString() });
  } else {
    portfolio.holdings.push({
      id: uid(),
      symbol, name,
      category: category || 'trend',
      conviction: conviction || '',
      lots: [{ qty, costBasis: price, boughtAt: new Date().toISOString() }],
      riskLevel: riskLevel || 'medium',
      timeHorizon: timeHorizon || 'long',
      lastConvictionCheck: new Date().toISOString(),
    });
  }

  transactions.push({
    id: uid(), type: 'BUY', symbol, name,
    qty, price, total,
    timestamp: new Date().toISOString(),
    balanceAfter: portfolio.cash,
  });

  saveAll();
  return true;
}

function executeSell(symbol, qty, price) {
  const holding = getHolding(symbol);
  if (!holding) return false;
  const currentQty = holdingQty(holding);
  if (qty > currentQty) return false;

  const total = qty * price;
  portfolio.cash += total;

  // FIFO lot removal
  let remaining = qty;
  while (remaining > 0 && holding.lots.length > 0) {
    const lot = holding.lots[0];
    if (lot.qty <= remaining) {
      remaining -= lot.qty;
      holding.lots.shift();
    } else {
      lot.qty -= remaining;
      remaining = 0;
    }
  }

  // Remove holding if empty
  if (holding.lots.length === 0) {
    portfolio.holdings = portfolio.holdings.filter(h => h.symbol !== symbol);
  }

  transactions.push({
    id: uid(), type: 'SELL', symbol, name: holding.name || symbol,
    qty, price, total,
    timestamp: new Date().toISOString(),
    balanceAfter: portfolio.cash,
  });

  saveAll();
  return true;
}

  a.appendChild(el('div', { className: 'spacer' }));

  // Company search
  const searchRow = el('div', { className: 'add-row' });
  const searchInp = el('input', {
    className: 'input-small',
    type: 'text',
    placeholder: 'Search company or symbol...',
    'aria-label': 'Search company',
    value: S.tradeSearch || '',
  });
  searchInp.addEventListener('input', () => { S.tradeSearch = searchInp.value; render(); });
  searchRow.appendChild(searchInp);
  a.appendChild(searchRow);
  a.appendChild(el('div', { className: 'spacer' }));

  // If selling, show current holdings
  if (S.tradeDir === 'SELL') {
    if (portfolio.holdings.length === 0) {
      a.appendChild(el('div', { className: 'gentle-box' },
        el('p', null, 'Nothing to sell yet.'),
        el('p', { className: 'sub-text', style: 'margin-top: 0.3rem;' }, 'Buy something first, then come back.'),
      ));
      a.appendChild(el('div', { className: 'spacer' }));
      a.appendChild(el('button', { className: 'btn btn-escape', onClick: () => go('DASHBOARD') }, 'Back to portfolio'));
      a.appendChild(navBar('TRADE'));
      return;
    }
  }

  // Quick chips for current holdings
  if (portfolio.holdings.length > 0) {
    const chips = el('div', { className: 'chip-list' });
    for (const h of portfolio.holdings) {
      chips.appendChild(el('span', {
        className: 'chip',
        style: 'cursor: pointer;',
        onClick: () => go('TRADE', { tradeSymbol: h.symbol, tradeSearch: '' }),
      }, h.symbol + ' (' + holdingQty(h) + ')'));
    }
    a.appendChild(chips);
    a.appendChild(el('div', { className: 'spacer' }));
  }

  // Show matching companies
  const q = (S.tradeSearch || '').toLowerCase();
  if (q && !S.tradeSymbol) {
    const matches = POPULAR_COMPANIES.filter(c =>
      c.symbol.toLowerCase().includes(q) || c.name.toLowerCase().includes(q)
    ).slice(0, 5);

    if (matches.length > 0) {
      const list = el('div', { style: 'display: flex; flex-direction: column; gap: 0.4rem;' });
      for (const c of matches) {
        list.appendChild(el('div', {
          className: 'company-card',
          style: 'cursor: pointer;',
          onClick: () => go('TRADE', { tradeSymbol: c.symbol, tradeSearch: '' }),
        },
          el('div', { className: 'company-info' },
            el('div', { className: 'company-name' }, c.name),
            el('div', { className: 'company-symbol' }, c.symbol),
          ),
        ));
      }
      a.appendChild(list);
    } else {
      a.appendChild(el('p', { className: 'sub-text' }, 'No matches. Try a different search.'));
    }
    a.appendChild(el('div', { className: 'spacer' }));
    a.appendChild(el('button', { className: 'btn btn-escape', onClick: () => go('DASHBOARD') }, 'Back to portfolio'));
    a.appendChild(navBar('TRADE'));
    return;
  }

  // If no symbol selected, prompt
  if (!S.tradeSymbol) {
    a.appendChild(el('p', { className: 'sub-text' }, 'Search for a company above, or tap a holding.'));
    a.appendChild(el('div', { className: 'spacer' }));
    a.appendChild(el('button', { className: 'btn btn-state', onClick: () => go('BROWSE') }, 'Browse companies'));
    a.appendChild(el('div', { className: 'spacer' }));
    a.appendChild(el('button', { className: 'btn btn-escape', onClick: () => go('DASHBOARD') }, 'Back to portfolio'));
    a.appendChild(navBar('TRADE'));
    return;
  }

  // ─── Trade form for selected symbol ───
  const sym = S.tradeSymbol;
  const price = getPrice(sym);
  const company = POPULAR_COMPANIES.find(c => c.symbol === sym);
  const holding = getHolding(sym);
  const currentQty = holding ? holdingQty(holding) : 0;

  a.appendChild(el('div', { className: 'section-card' },
    el('h3', null, sym),
    el('p', { className: 'sub-text', style: 'text-align: left;' }, company ? company.name : (holding ? holding.name : sym)),
    price ? el('p', { style: 'font-weight: 600; margin-top: 0.3rem;' }, formatMoney(price) + ' per share') : el('p', { className: 'sub-text' }, 'Price unavailable'),
    holding ? el('p', { className: 'sub-text', style: 'text-align: left;' }, 'You own: ' + currentQty + ' shares') : null,
  ));
  a.appendChild(el('div', { className: 'spacer' }));

  // Sparkline
  const prices = getPriceHistory(sym);
  if (prices) {
    const sparkContainer = el('div', { style: 'display: flex; justify-content: center;' });
    sparkContainer.appendChild(sparklineSVG(prices, 200, 60));
    a.appendChild(sparkContainer);
    a.appendChild(el('div', { className: 'spacer' }));
  }

  // Quantity input
  const qtyVal = S.tradeQty || '';
  a.appendChild(el('label', { style: 'font-size: 0.9rem; font-weight: 500;' }, 'Quantity'));
  const qtyInp = el('input', {
    className: 'input-field',
    type: 'number',
    min: '1',
    step: '1',
    placeholder: 'How many shares?',
    value: qtyVal,
    'aria-label': 'Quantity',
  });
  qtyInp.addEventListener('input', () => { S.tradeQty = qtyInp.value; render(); });
  a.appendChild(qtyInp);

  // Running total
  const qty = parseInt(S.tradeQty) || 0;
  if (qty > 0 && price) {
    const total = qty * price;
    a.appendChild(el('div', { style: 'margin-top: 0.5rem;' },
      el('p', { style: 'font-size: 0.95rem;' }, qty + ' \u00D7 ' + formatMoney(price) + ' = ' + el('strong', null, formatMoney(total)).outerHTML),
    ));
    if (S.tradeDir === 'BUY') {
      a.appendChild(el('p', { className: 'sub-text', style: 'text-align: left;' }, 'Available: ' + formatMoney(portfolio.cash)));
      if (total > portfolio.cash) {
        a.appendChild(el('p', { style: 'color: var(--loss); font-size: 0.85rem;' }, "You don't have enough fake cash for this."));
      }
    }
    if (S.tradeDir === 'SELL' && qty > currentQty) {
      a.appendChild(el('p', { style: 'color: var(--loss); font-size: 0.85rem;' }, 'You only own ' + currentQty + ' shares.'));
    }
  }
  a.appendChild(el('div', { className: 'spacer' }));

  // Conviction (buy only, new holding)
  if (S.tradeDir === 'BUY' && !holding) {
    a.appendChild(el('label', { style: 'font-size: 0.9rem; font-weight: 500;' }, 'Why this company?'));
    const convInp = el('textarea', {
      className: 'input-field',
      placeholder: 'What makes you believe in this one?',
      style: 'min-height: 60px;',
      'aria-label': 'Conviction reason',
    });
    convInp.value = S.tradeConviction || '';
    convInp.addEventListener('input', () => { S.tradeConviction = convInp.value; });
    a.appendChild(convInp);
    a.appendChild(el('div', { className: 'spacer' }));

    // Category
    a.appendChild(el('label', { style: 'font-size: 0.9rem; font-weight: 500;' }, 'Category'));
    const catChips = el('div', { className: 'chip-list', style: 'margin-top: 0.3rem;' });
    for (const cat of ['admire', 'work', 'trend']) {
      catChips.appendChild(el('span', {
        className: 'chip' + (S.tradeCat === cat ? ' selected' : ''),
        style: 'cursor: pointer; background: var(--cat-' + cat + '); color: #1a1a2e;' + (S.tradeCat === cat ? ' outline: 2px solid var(--primary);' : ''),
        onClick: () => { S.tradeCat = cat; render(); },
      }, cat));
    }
    a.appendChild(catChips);
    a.appendChild(el('div', { className: 'spacer' }));

    // Risk + Horizon
    const riskRow = el('div', { className: 'select-grid' });
    for (const r of ['low', 'medium', 'high']) {
      riskRow.appendChild(el('div', {
        className: 'select-card' + (S.tradeRisk === r ? ' selected' : ''),
        style: 'padding: 0.5rem;',
        onClick: () => { S.tradeRisk = r; render(); },
      }, el('div', { style: 'font-size: 0.85rem;' }, r)));
    }
    a.appendChild(el('label', { style: 'font-size: 0.9rem; font-weight: 500;' }, 'Risk level'));
    a.appendChild(riskRow);
    a.appendChild(el('div', { className: 'spacer' }));

    a.appendChild(el('label', { style: 'font-size: 0.9rem; font-weight: 500;' }, 'Time horizon'));
    const horizonRow = el('div', { className: 'select-grid-2' });
    for (const h of ['short', 'long']) {
      horizonRow.appendChild(el('div', {
        className: 'select-card' + (S.tradeHorizon === h ? ' selected' : ''),
        style: 'padding: 0.5rem;',
        onClick: () => { S.tradeHorizon = h; render(); },
      }, el('div', { style: 'font-size: 0.85rem;' }, h + ' term')));
    }
    a.appendChild(horizonRow);
    a.appendChild(el('div', { className: 'spacer' }));
  }

  // Confirm
  const canTrade = qty > 0 && price &&
    (S.tradeDir === 'BUY' ? (qty * price <= portfolio.cash) : (qty <= currentQty));

  a.appendChild(el('div', { className: 'btn-group' },
    el('button', {
      className: 'btn btn-primary',
      style: canTrade ? '' : 'opacity: 0.5; pointer-events: none;',
      onClick: () => {
        if (!canTrade) return;
        if (S.tradeDir === 'BUY') {
          const name = company ? company.name : (holding ? holding.name : sym);
          executeBuy(sym, name, qty, price, S.tradeCat || 'trend', S.tradeConviction || '', S.tradeRisk || 'medium', S.tradeHorizon || 'long');
        } else {
          executeSell(sym, qty, price);
        }
        S.tradeSymbol = null;
        S.tradeQty = '';
        S.tradeConviction = '';
        S.tradeCat = null;
        S.tradeRisk = null;
        S.tradeHorizon = null;
        S.tradeSearch = '';
        go('DASHBOARD');
      },
    }, 'Confirm ' + S.tradeDir.toLowerCase()),
    el('button', { className: 'btn btn-escape', onClick: () => {
      S.tradeSymbol = null;
      S.tradeQty = '';
      S.tradeConviction = '';
      S.tradeCat = null;
      S.tradeRisk = null;
      S.tradeHorizon = null;
      S.tradeSearch = '';
      go('DASHBOARD');
    }}, 'Actually, never mind'),
  ));

  a.appendChild(navBar('TRADE'));
}

// ─── VIEW: BROWSE ───
function vBrowse(a) {
  a.appendChild(el('div', { className: 'spacer' }));
  a.appendChild(el('h2', { className: 'center' }, 'Browse Companies'));
  a.appendChild(el('p', { className: 'sub-text' }, 'Find something you believe in. No rush.'));
  a.appendChild(el('div', { className: 'spacer' }));

  // Search
  const searchInp = el('input', {
    className: 'input-field',
    type: 'text',
    placeholder: 'Search by name or symbol...',
    'aria-label': 'Search companies',
    value: S.browseSearch || '',
  });
  searchInp.addEventListener('input', () => { S.browseSearch = searchInp.value; render(); });
  a.appendChild(searchInp);
  a.appendChild(el('div', { className: 'spacer' }));

  // Tabs
  const tabs = el('div', { className: 'tab-bar' });
  const tabList = [
    { key: 'all', label: 'All (' + POPULAR_COMPANIES.length + ')' },
    { key: 'watchlist', label: 'Watchlist (' + watchlist.length + ')' },
    { key: 'Tech', label: 'Tech' },
    { key: 'Finance', label: 'Finance' },
    { key: 'Energy', label: 'Energy' },
    { key: 'Healthcare', label: 'Health' },
    { key: 'Consumer', label: 'Consumer' },
    { key: 'Media', label: 'Media' },
    { key: 'ETF', label: 'ETFs' },
    { key: 'Industrial', label: 'Industrial' },
    { key: 'other', label: 'Other' },
  ];
  for (const t of tabList) {
    tabs.appendChild(el('button', {
      className: 'tab-btn' + (S.browseTab === t.key ? ' active' : ''),
      onClick: () => go('BROWSE', { browseTab: t.key }),
    }, t.label));
  }
  a.appendChild(tabs);
  a.appendChild(el('div', { className: 'spacer' }));

  // Filter companies
  const mainSectors = ['Tech','Finance','Energy','Healthcare','Consumer','Media','ETF','Industrial'];
  let companies;
  if (S.browseTab === 'watchlist') {
    companies = watchlist.map(w => ({ symbol: w.symbol, name: w.name, sector: w.sector || 'Other' }));
  } else if (S.browseTab === 'all') {
    companies = POPULAR_COMPANIES;
  } else if (S.browseTab === 'other') {
    companies = POPULAR_COMPANIES.filter(c => !mainSectors.includes(c.sector));
  } else {
    companies = POPULAR_COMPANIES.filter(c => c.sector === S.browseTab);
  }

  const q = (S.browseSearch || '').toLowerCase();
  if (q) {
    companies = companies.filter(c =>
      c.symbol.toLowerCase().includes(q) || c.name.toLowerCase().includes(q)
    );
  }

  if (companies.length === 0) {
    a.appendChild(el('p', { className: 'sub-text' }, S.browseTab === 'watchlist' ? 'Your watchlist is empty. Add companies you\'re curious about.' : 'No matches.'));
  } else {
    const list = el('div', { style: 'display: flex; flex-direction: column; gap: 0.5rem;' });
    for (const c of companies) {
      const isWatched = watchlist.some(w => w.symbol === c.symbol);
      const isOwned = getHolding(c.symbol);
      const price = getPrice(c.symbol);

      const card = el('div', { className: 'company-card' });
      const topRow = el('div', { className: 'company-card-row' });

      const info = el('div', { className: 'company-info' });
      info.appendChild(el('div', { className: 'company-name' }, c.name));
      const subRow = el('div', { style: 'display: flex; align-items: center; gap: 0.4rem;' });
      subRow.appendChild(el('span', { className: 'company-symbol' }, c.symbol));
      if (isOwned) subRow.appendChild(el('span', { style: 'font-size: 0.7rem; color: var(--gain);' }, 'owned'));
      info.appendChild(subRow);
      if (price) info.appendChild(el('div', { style: 'font-size: 0.8rem; color: var(--text-muted);' }, formatMoney(price)));
      topRow.appendChild(info);

      const actions = el('div', { style: 'display: flex; gap: 0.3rem; flex-shrink: 0;' });
      actions.appendChild(el('button', {
        className: 'company-action',
        onClick: () => go('TRADE', { tradeSymbol: c.symbol, tradeDir: 'BUY', tradeSearch: '', tradeConviction: c.why || '' }),
      }, 'Trade'));
      if (!isWatched) {
        actions.appendChild(el('button', {
          className: 'company-action',
          onClick: () => {
            watchlist.push({ symbol: c.symbol, name: c.name, sector: c.sector, addedAt: new Date().toISOString() });
            save('fos_watchlist', watchlist);
            render();
          },
        }, 'Watch'));
      } else {
        actions.appendChild(el('button', {
          className: 'company-action',
          style: 'color: var(--loss);',
          onClick: () => {
            watchlist = watchlist.filter(w => w.symbol !== c.symbol);
            save('fos_watchlist', watchlist);
            render();
          },
        }, 'Unwatch'));
      }
      topRow.appendChild(actions);
      card.appendChild(topRow);
      if (c.why) card.appendChild(el('div', { style: 'font-size: 0.75rem; color: var(--text-muted); line-height: 1.3;' }, c.why));
      list.appendChild(card);
    }
    a.appendChild(list);
  }

  a.appendChild(el('div', { className: 'spacer' }));
  a.appendChild(el('button', { className: 'btn btn-escape', onClick: () => go('DASHBOARD') }, 'Back to portfolio'));
  a.appendChild(navBar('DASHBOARD'));
}

// ─── VIEW: BANK ───
function vBank(a) {
  if (!profile || !portfolio) { go('WELCOME'); return; }

  a.appendChild(el('div', { className: 'spacer' }));
  a.appendChild(el('h2', { className: 'center' }, 'FOS Bank'));
  a.appendChild(el('p', { className: 'sub-text' }, 'Your completely made-up financial institution.'));
  a.appendChild(el('div', { className: 'spacer' }));

  // Balance summary
  const invested = transactions
    .filter(t => t.type === 'BUY')
    .reduce((sum, t) => sum + t.total, 0);
  const returned = transactions
    .filter(t => t.type === 'SELL')
    .reduce((sum, t) => sum + t.total, 0);

  const card = el('div', { className: 'section-card' });
  card.appendChild(el('div', { className: 'balance-label' }, 'Cash Balance'));
  card.appendChild(el('div', { className: 'balance-hero' }, formatMoney(portfolio.cash)));

  const details = el('div', { style: 'display: flex; justify-content: space-between; margin-top: 0.8rem; font-size: 0.85rem;' });
  details.appendChild(el('div', null,
    el('div', { className: 'sub-text', style: 'text-align: left;' }, 'Started with'),
    el('div', { style: 'font-weight: 500;' }, formatMoney(profile.startingBalance)),
  ));
  details.appendChild(el('div', { style: 'text-align: right;' },
    el('div', { className: 'sub-text' }, 'In market'),
    el('div', { style: 'font-weight: 500;' }, formatMoney(invested - returned)),
  ));
  card.appendChild(details);
  a.appendChild(card);
  a.appendChild(el('div', { className: 'spacer' }));

  // Transaction history
  a.appendChild(el('h3', null, 'Transaction History'));
  a.appendChild(el('div', { className: 'spacer', style: 'height: 0.3rem;' }));

  if (transactions.length === 0) {
    a.appendChild(el('div', { className: 'gentle-box' },
      el('p', null, 'No transactions yet.'),
      el('p', { className: 'sub-text', style: 'margin-top: 0.3rem;' }, 'Your first trade will show up here.'),
    ));
  } else {
    const txList = el('div', { className: 'section-card' });
    const sorted = [...transactions].reverse();
    for (const tx of sorted) {
      const date = new Date(tx.timestamp);
      const dateStr = date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
      const timeStr = date.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });

      const row = el('div', { className: 'tx-row' });
      row.appendChild(el('span', { className: 'tx-badge ' + (tx.type === 'BUY' ? 'tx-buy' : 'tx-sell') }, tx.type));

      const info = el('div', { className: 'tx-info' });
      info.appendChild(el('div', { className: 'tx-symbol' }, tx.symbol));
      info.appendChild(el('div', { className: 'tx-detail' }, tx.qty + ' @ ' + formatMoney(tx.price) + ' \u2022 ' + dateStr + ' ' + timeStr));
      row.appendChild(info);

      row.appendChild(el('div', { className: 'tx-amount' }, (tx.type === 'BUY' ? '-' : '+') + formatMoney(tx.total)));
      txList.appendChild(row);
    }
    a.appendChild(txList);
  }

  a.appendChild(el('div', { className: 'spacer' }));
  a.appendChild(el('div', { className: 'btn-group' },
    el('button', { className: 'btn btn-state', onClick: () => exportAllJsonl() }, 'Export JSONL'),
    el('button', { className: 'btn btn-escape', onClick: () => go('DASHBOARD') }, 'Back to portfolio'),
  ));

  a.appendChild(navBar('BANK'));
}

// ─── VIEW: RISK ───
function vRisk(a) {
  if (!profile || !portfolio) { go('WELCOME'); return; }

  a.appendChild(el('div', { className: 'spacer' }));
  a.appendChild(el('h2', { className: 'center' }, 'Risk Map'));
  a.appendChild(el('p', { className: 'sub-text' }, 'Where your money sits.'));
  a.appendChild(el('div', { className: 'spacer' }));

  if (portfolio.holdings.length === 0) {
    a.appendChild(el('div', { className: 'gentle-box' },
      el('p', null, 'Nothing to map yet.'),
      el('p', { className: 'sub-text', style: 'margin-top: 0.3rem;' }, 'Make some trades and come back.'),
    ));
    a.appendChild(el('div', { className: 'spacer' }));
    a.appendChild(el('button', { className: 'btn btn-escape', onClick: () => go('DASHBOARD') }, 'Back to portfolio'));
    a.appendChild(navBar('DASHBOARD'));
    return;
  }

  // Axis labels
  a.appendChild(el('div', { className: 'risk-axis-label' }, '\u2191 Higher risk'));

  // 2x2 grid
  const grid = el('div', { className: 'risk-grid' });

  const quadrants = [
    { risk: 'high', horizon: 'short', label: 'Exciting bets' },
    { risk: 'high', horizon: 'long', label: 'Moonshots' },
    { risk: 'low', horizon: 'short', label: 'Safe harbour' },
    { risk: 'low', horizon: 'long', label: 'Steady growers' },
  ];

  for (const q of quadrants) {
    const cell = el('div', { className: 'risk-cell' });
    cell.appendChild(el('div', { className: 'risk-label' }, q.label));

    const chips = el('div', { className: 'risk-chips' });
    const matchingHoldings = portfolio.holdings.filter(h => {
      const riskMatch = (q.risk === 'high' && h.riskLevel === 'high') ||
                        (q.risk === 'low' && (h.riskLevel === 'low' || h.riskLevel === 'medium'));
      const horizonMatch = h.timeHorizon === q.horizon;
      return riskMatch && horizonMatch;
    });

    for (const h of matchingHoldings) {
      const value = holdingCurrentValue(h);
      const size = Math.max(0.7, Math.min(1.1, value / (profile.startingBalance * 0.1)));
      chips.appendChild(el('span', {
        className: 'risk-chip',
        style: 'background: var(--cat-' + h.category + '); color: #1a1a2e; font-size: ' + size + 'rem;',
      }, h.symbol));
    }

    if (matchingHoldings.length === 0) {
      chips.appendChild(el('span', { style: 'font-size: 0.75rem; color: var(--text-muted);' }, '\u2014'));
    }

    cell.appendChild(chips);
    grid.appendChild(cell);
  }
  a.appendChild(grid);

  // Axis labels
  const axisRow = el('div', { style: 'display: flex; justify-content: space-between; margin-top: 0.3rem;' });
  axisRow.appendChild(el('span', { className: 'risk-axis-label' }, '\u2190 Short term'));
  axisRow.appendChild(el('span', { className: 'risk-axis-label' }, 'Long term \u2192'));
  a.appendChild(axisRow);
  a.appendChild(el('div', { className: 'risk-axis-label' }, '\u2193 Lower risk'));

  a.appendChild(el('div', { className: 'spacer-lg' }));

  // Conviction checks
  const stale = portfolio.holdings.filter(h => {
    const last = new Date(h.lastConvictionCheck);
    const daysSince = (Date.now() - last.getTime()) / (1000 * 60 * 60 * 24);
    return daysSince > 7;
  });

  if (stale.length > 0) {
    a.appendChild(el('h3', null, 'Time to reflect'));
    a.appendChild(el('div', { className: 'spacer', style: 'height: 0.3rem;' }));
    for (const h of stale) {
      const box = el('div', { className: 'conviction-box', style: 'margin-bottom: 0.5rem;' });
      box.appendChild(el('p', { style: 'font-weight: 500; font-size: 0.9rem;' }, 'Still believe in ' + h.symbol + '?'));
      if (h.conviction) {
        box.appendChild(el('p', { className: 'sub-text', style: 'text-align: left; margin: 0.3rem 0;' }, 'You said: "' + h.conviction + '"'));
      }
      const btns = el('div', { style: 'display: flex; gap: 0.4rem; margin-top: 0.5rem;' });
      btns.appendChild(el('button', {
        className: 'company-action',
        style: 'background: var(--gain); color: var(--btn-text);',
        onClick: () => {
          h.lastConvictionCheck = new Date().toISOString();
          saveAll();
          render();
        },
      }, 'Yes, still in'));
      btns.appendChild(el('button', {
        className: 'company-action',
        onClick: () => go('TRADE', { tradeSymbol: h.symbol, tradeDir: 'SELL' }),
      }, 'Hmm, let me think'));
      box.appendChild(btns);
      a.appendChild(box);
    }
  }

  a.appendChild(el('div', { className: 'spacer' }));
  a.appendChild(el('button', { className: 'btn btn-escape', onClick: () => go('DASHBOARD') }, 'Back to portfolio'));
  a.appendChild(navBar('DASHBOARD'));
}

// ─── VIEW: SETTINGS ───
function vSettings(a) {
  a.appendChild(el('div', { className: 'spacer' }));
  a.appendChild(el('h2', { className: 'center' }, 'Settings'));
  a.appendChild(el('p', { className: 'sub-text' }, 'FOS \u2014 Full of Shit. A safe space to practise investing with fake money.'));
  a.appendChild(el('div', { className: 'spacer' }));

  if (!profile) { go('WELCOME'); return; }

  // Data mode
  const modeCard = el('div', { className: 'section-card', style: 'margin-bottom: 1rem;' });
  modeCard.appendChild(el('h3', null, 'Data source'));
  modeCard.appendChild(el('p', null,
    el('span', null, 'Currently: '),
    el('span', { className: 'data-badge ' + (dataMode === 'live' ? 'data-live' : 'data-demo') }, dataMode === 'live' ? 'Live prices' : 'Demo data'),
  ));
  modeCard.appendChild(el('p', { className: 'sub-text', style: 'text-align: left; margin-top: 0.3rem;' },
    dataMode === 'demo' ? 'Using built-in sample data. Add an API key for live prices.' : 'Fetching real market data.'
  ));
  a.appendChild(modeCard);

  // API Key
  const apiCard = el('div', { className: 'section-card', style: 'margin-bottom: 1rem;' });
  apiCard.appendChild(el('h3', null, 'Alpha Vantage API Key'));
  apiCard.appendChild(el('p', { className: 'sub-text', style: 'text-align: left; margin-bottom: 0.5rem;' }, 'Optional. Free tier gives 25 calls/day.'));
  const apiInp = el('input', {
    className: 'input-small',
    type: 'text',
    placeholder: 'Paste your API key...',
    value: profile.alphaVantageKey || '',
    'aria-label': 'Alpha Vantage API key',
    style: 'width: 100%;',
  });
  apiInp.addEventListener('change', () => {
    profile.alphaVantageKey = apiInp.value.trim();
    save('fos_profile', profile);
  });
  apiCard.appendChild(apiInp);
  a.appendChild(apiCard);

  // Currency
  const curCard = el('div', { className: 'section-card', style: 'margin-bottom: 1rem;' });
  curCard.appendChild(el('h3', null, 'Currency'));
  const curToggle = el('div', { className: 'toggle-group', style: 'max-width: 200px;' });
  for (const cur of ['GBP', 'USD']) {
    curToggle.appendChild(el('button', {
      className: 'toggle-btn' + (profile.currency === cur ? ' active' : ''),
      onClick: () => {
        profile.currency = cur;
        save('fos_profile', profile);
        render();
      },
    }, cur === 'GBP' ? '\u00A3 GBP' : '$ USD'));
  }
  curCard.appendChild(curToggle);
  a.appendChild(curCard);

  // Export
  a.appendChild(el('div', { className: 'btn-group' },
    el('button', { className: 'btn btn-state', onClick: () => exportAllJsonl() }, 'Export all data (JSONL)'),
    el('button', { className: 'btn btn-state', onClick: () => copyPortfolioForAI() }, 'Copy portfolio for AI'),
  ));

  a.appendChild(el('div', { className: 'spacer-lg' }));

  // Reset
  a.appendChild(el('button', {
    className: 'btn btn-escape',
    style: 'color: var(--loss);',
    onClick: () => {
      if (S.confirmReset) {
        localStorage.removeItem('fos_profile');
        localStorage.removeItem('fos_portfolio');
        localStorage.removeItem('fos_transactions');
        localStorage.removeItem('fos_watchlist');
        localStorage.removeItem('fos_price_cache');
        localStorage.removeItem('fos_current');
        profile = null;
        portfolio = null;
        transactions = [];
        watchlist = [];
        priceCache = {};
        S = { view: 'WELCOME', onboardStep: 1 };
        render();
        return;
      }
      S.confirmReset = true;
      render();
    },
  }, S.confirmReset ? 'Yes, really reset everything' : 'Reset portfolio'));

  if (S.confirmReset) {
    a.appendChild(el('p', { className: 'sub-text', style: 'margin-top: 0.3rem;' }, 'Starting fresh is fine. Every reset is a new lesson.'));
    a.appendChild(el('button', { className: 'btn btn-escape', onClick: () => { S.confirmReset = false; render(); } }, 'Cancel'));
  }

  a.appendChild(navBar('SETTINGS'));
}

// ─── EXPORT ───
function exportAllJsonl() {
  const lines = [];
  lines.push(JSON.stringify({ type: 'profile', data: profile }));
  lines.push(JSON.stringify({ type: 'portfolio', data: portfolio }));
  for (const tx of transactions) {
    lines.push(JSON.stringify({ type: 'transaction', data: tx }));
  }
  for (const w of watchlist) {
    lines.push(JSON.stringify({ type: 'watchlist', data: w }));
  }
  const blob = new Blob([lines.join('\n') + '\n'], { type: 'application/jsonl' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'fos-export-' + new Date().toISOString().split('T')[0] + '.jsonl';
  a.click();
  URL.revokeObjectURL(url);
}

function copyPortfolioForAI() {
  if (!profile || !portfolio) return;
  let md = '## FOS Portfolio \u2014 ' + new Date().toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' }) + '\n';
  md += '**Starting balance:** ' + formatMoney(profile.startingBalance) + '\n';
  md += '**Current value:** ' + formatMoney(portfolioValue()) + '\n';
  md += '**Cash:** ' + formatMoney(portfolio.cash) + '\n';
  md += '**P&L:** ' + (portfolioPnL() >= 0 ? '+' : '') + formatMoney(portfolioPnL()) + ' (' + formatPct(portfolioPnLPct()) + ')\n\n';

  if (portfolio.holdings.length > 0) {
    md += '### Holdings\n';
    for (const h of portfolio.holdings) {
      const qty = holdingQty(h);
      const price = getPrice(h.symbol);
      const value = holdingCurrentValue(h);
      const pnl = holdingPnL(h);
      md += '- **' + h.symbol + '** (' + h.name + '): ' + qty + ' shares @ ' + (price ? formatMoney(price) : 'N/A') + ' = ' + formatMoney(value);
      md += ' | P&L: ' + (pnl >= 0 ? '+' : '') + formatMoney(pnl);
      md += ' | ' + h.category;
      if (h.conviction) md += ' | "' + h.conviction + '"';
      md += '\n';
    }
  }

  navigator.clipboard.writeText(md).then(() => {
    const btns = app().querySelectorAll('.btn-state');
    for (const btn of btns) {
      if (btn.textContent.includes('Copy')) {
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = orig; }, 1500);
      }
    }
  });
}

// ─── INIT ───
loadState();
if (profile && portfolio) {
  if (S.view === 'WELCOME') S.view = 'DASHBOARD';
  render();
  refreshAllPrices();
} else {
  S.view = 'WELCOME';
  S.onboardStep = 1;
  render();
}
</script>
