<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Picture Finder</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0e0e12;
  --surface: #17171f;
  --surf2:   #1e1e28;
  --border:  rgba(255,255,255,0.07);
  --text:    #f0f0f5;
  --muted:   #888899;
  --primary: #7c6fdd;
  --pglow:   rgba(124,111,221,0.2);
  --green:   #4ade80;
  --amber:   #fbbf24;
  --red:     #f87171;
  --accent:  #e8a44a;
}
body { font-family: system-ui,sans-serif; background:var(--bg); color:var(--text);
       height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* ── Top bar ── */
.topbar {
  padding:0.65rem 1rem; background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.topbar-brand { font-size:0.9rem; font-weight:700; display:flex; align-items:center; gap:0.5rem; }
.topbar-brand span { color:var(--primary); }
.topbar-sub { font-size:0.7rem; color:var(--muted); }
.topbar-actions { display:flex; gap:0.5rem; align-items:center; }
.btn { padding:0.4rem 0.9rem; border-radius:8px; font:inherit; font-size:0.78rem; font-weight:700;
       cursor:pointer; transition:all 0.15s; border:none; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:#9284e8; }
.btn-primary:disabled { opacity:0.4; cursor:default; }
.btn-ghost { background:transparent; border:1px solid var(--border); color:var(--muted); }
.btn-ghost:hover { border-color:var(--muted); color:var(--text); }
.btn-accent { background:rgba(232,164,74,0.15); border:1px solid var(--accent); color:var(--accent); }
.btn-accent:hover { background:rgba(232,164,74,0.28); }

/* ── Main 3-col layout ── */
.main { display:grid; grid-template-columns:230px 1fr 280px; flex:1; min-height:0; }

/* ── Left: item list ── */
.item-list {
  border-right:1px solid var(--border); overflow-y:auto;
  display:flex; flex-direction:column;
}
.item-list-header {
  padding:0.6rem 0.8rem; border-bottom:1px solid var(--border);
  font-size:0.65rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase;
  color:var(--muted); display:flex; justify-content:space-between; align-items:center;
  flex-shrink:0;
}
.item-row {
  padding:0.55rem 0.8rem; cursor:pointer; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:0.6rem; transition:background 0.1s;
  flex-shrink:0;
}
.item-row:hover { background:var(--surf2); }
.item-row.active { background:var(--pglow); border-left:2px solid var(--primary); }
.item-thumb {
  width:38px; height:30px; border-radius:4px; object-fit:cover;
  background:var(--surf2); flex-shrink:0; border:1px solid var(--border);
}
.item-thumb.empty { display:flex; align-items:center; justify-content:center;
                    font-size:1rem; color:var(--muted); }
.item-name { font-size:0.75rem; font-weight:600; line-height:1.3;
             white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
.item-badge { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.item-badge.ok  { background:var(--green); }
.item-badge.no  { background:var(--muted); }
.item-group-label {
  padding:0.3rem 0.8rem; font-size:0.6rem; font-weight:700; letter-spacing:0.12em;
  text-transform:uppercase; color:var(--muted); background:var(--surf2);
  border-bottom:1px solid var(--border); flex-shrink:0;
}
.add-item-row {
  padding:0.5rem 0.8rem; font-size:0.72rem; color:var(--primary); cursor:pointer;
  border-top:1px solid var(--border); margin-top:auto; flex-shrink:0;
  display:flex; align-items:center; gap:0.4rem;
}
.add-item-row:hover { background:var(--pglow); }

/* ── Centre: source results ── */
.hunt-area {
  overflow-y:auto; padding:0.9rem; display:flex; flex-direction:column; gap:1rem;
}
.hunt-empty {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:0.6rem; color:var(--muted); text-align:center; padding:2rem;
}
.hunt-empty-icon { font-size:2.5rem; }
.hunt-empty-msg { font-size:0.85rem; }

.source-section { display:flex; flex-direction:column; gap:0.5rem; }
.source-header { display:flex; align-items:center; gap:0.5rem; font-size:0.7rem;
                  font-weight:700; letter-spacing:0.08em; text-transform:uppercase; }
.src-badge { padding:1px 7px; border-radius:99px; font-size:0.6rem; font-weight:700; }
.src-badge.ok      { background:rgba(74,222,128,0.12); color:var(--green);  border:1px solid rgba(74,222,128,0.25); }
.src-badge.empty   { background:rgba(251,191,36,0.1);  color:var(--amber);  border:1px solid rgba(251,191,36,0.2); }
.src-badge.error   { background:rgba(248,113,113,0.1); color:var(--red);    border:1px solid rgba(248,113,113,0.2); }
.src-badge.loading { background:rgba(124,111,221,0.1); color:var(--primary);border:1px solid rgba(124,111,221,0.2);
                     animation:pulse 1.2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.thumb-grid { display:flex; flex-wrap:wrap; gap:0.45rem; }
.thumb {
  width:90px; height:68px; object-fit:cover; border-radius:6px;
  border:2px solid transparent; cursor:pointer; transition:all 0.15s;
  background:var(--surf2); flex-shrink:0;
}
.thumb:hover   { border-color:var(--primary); transform:scale(1.05); }
.thumb.selected { border-color:var(--green); box-shadow:0 0 0 1px var(--green); }
.src-empty { font-size:0.72rem; color:var(--muted); font-style:italic; }

/* ── Right: preview + save ── */
.sidebar {
  border-left:1px solid var(--border); padding:0.9rem;
  display:flex; flex-direction:column; gap:0.8rem; overflow-y:auto;
}
.preview-wrap {
  width:100%; aspect-ratio:4/3; border-radius:10px; overflow:hidden;
  background:var(--surf2); border:1px solid var(--border); position:relative;
}
.preview-img { width:100%; height:100%; object-fit:cover; display:block; }
.preview-empty {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:0.4rem;
  color:var(--muted); font-size:0.72rem;
}
.conf-badge { font-size:0.75rem; font-weight:700; padding:0.25rem 0.6rem;
              border-radius:99px; display:inline-block; }
.conf-badge.high     { background:rgba(74,222,128,0.15); color:var(--green); }
.conf-badge.mid      { background:rgba(251,191,36,0.12);  color:var(--amber); }
.conf-badge.low      { background:rgba(248,113,113,0.1);  color:var(--red); }
.conf-badge.checking { background:rgba(124,111,221,0.1);  color:var(--primary); animation:pulse 1.2s infinite; }
.sidebar-label { font-size:0.64rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; }
.url-input {
  width:100%; padding:0.4rem 0.6rem; background:var(--surf2); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font:inherit; font-size:0.73rem; outline:none;
  transition:border-color 0.15s;
}
.url-input:focus { border-color:var(--primary); }
.url-input::placeholder { color:var(--muted); opacity:0.5; }
.ext-links { display:flex; gap:0.35rem; flex-wrap:wrap; }
.ext-link {
  padding:0.28rem 0.55rem; font-size:0.65rem; font-weight:600;
  border:1px solid var(--border); border-radius:6px;
  text-decoration:none; color:var(--muted); transition:all 0.15s;
}
.ext-link:hover { border-color:var(--primary); color:var(--primary); }
.divider { border:none; border-top:1px solid var(--border); }
.desc-text { font-size:0.72rem; color:var(--muted); line-height:1.45; }

/* ── Status bar ── */
.statusbar {
  padding:0.4rem 1rem; background:var(--surf2); border-top:1px solid var(--border);
  font-size:0.7rem; color:var(--muted); display:flex; align-items:center; gap:0.75rem;
  flex-shrink:0;
}
.status-pip { width:7px; height:7px; border-radius:50%; background:var(--muted); flex-shrink:0; }
.status-pip.online { background:var(--green); }

/* ── Add item modal ── */
.add-overlay {
  display:none; position:fixed; inset:0; z-index:999;
  background:rgba(0,0,0,0.6); align-items:center; justify-content:center;
}
.add-overlay.open { display:flex; }
.add-box {
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:1.25rem; width:360px; display:flex; flex-direction:column; gap:0.75rem;
}
.add-box h3 { font-size:0.9rem; }
.add-input {
  width:100%; padding:0.5rem 0.65rem; background:var(--surf2); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font:inherit; font-size:0.8rem; outline:none;
}
.add-input:focus { border-color:var(--primary); }
.add-actions { display:flex; gap:0.5rem; justify-content:flex-end; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:3px; }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div>
    <div class="topbar-brand">🖼 <span>Picture</span> Finder</div>
    <div class="topbar-sub">Plug-in image hunter — sandboxed & portable</div>
  </div>
  <div class="topbar-actions">
    <button class="btn btn-ghost" onclick="addItemModal()">+ Add item</button>
    <button class="btn btn-accent" id="btnHuntAll" onclick="huntAll()">🔍 Hunt all</button>
    <button class="btn btn-primary" id="btnApply" onclick="applyToProject()" disabled>✓ Apply to project</button>
  </div>
</div>

<!-- Main grid -->
<div class="main">

  <!-- Left: item list -->
  <div class="item-list" id="itemList">
    <div class="item-list-header">
      <span>ITEMS</span>
      <span id="itemCount">0</span>
    </div>
    <div class="hunt-empty" id="listEmpty">
      <div class="hunt-empty-icon">📋</div>
      <div class="hunt-empty-msg">No items yet.<br>Add manually or open from a host app.</div>
    </div>
  </div>

  <!-- Centre: results -->
  <div class="hunt-area" id="huntArea">
    <div class="hunt-empty" id="huntEmpty">
      <div class="hunt-empty-icon">🖼</div>
      <div class="hunt-empty-msg">Select an item on the left<br>then hunt for its image.</div>
    </div>
  </div>

  <!-- Right: preview -->
  <div class="sidebar">
    <div class="preview-wrap">
      <div class="preview-empty" id="prevEmpty">
        <div style="font-size:2rem">🖼</div>
        <div>Click a thumbnail</div>
      </div>
      <img class="preview-img" id="prevImg" style="display:none" alt="preview"
        onerror="document.getElementById('prevEmpty').style.display='flex';this.style.display='none'">
    </div>
    <div id="confBadge"></div>
    <div class="desc-text" id="descText"></div>
    <hr class="divider">
    <div class="sidebar-label">Or paste any URL</div>
    <input class="url-input" id="manualUrl" type="url" placeholder="https://…"
      oninput="onManualUrl(this.value)">
    <div class="ext-links" id="extLinks">
      <a class="ext-link" id="lkGoogle" href="#" target="_blank">🔍 Google</a>
      <a class="ext-link" id="lkBing"   href="#" target="_blank">Bing</a>
      <a class="ext-link" id="lkArgos"  href="#" target="_blank">Argos</a>
      <a class="ext-link" id="lkAmazon" href="#" target="_blank">Amazon</a>
    </div>
    <hr class="divider">
    <button class="btn btn-primary" id="btnSaveImg" onclick="saveSelectedImage()" disabled
      style="width:100%">💾 Save for this item</button>
  </div>
</div>

<!-- Status bar -->
<div class="statusbar">
  <div class="status-pip" id="statusPip"></div>
  <span id="statusText">Checking server…</span>
</div>

<!-- Add item modal -->
<div class="add-overlay" id="addOverlay" onclick="if(event.target===this)closeAddModal()">
  <div class="add-box">
    <h3>Add item</h3>
    <input class="add-input" id="addName" placeholder="Item name (e.g. Sony ZV-E10 II)" autofocus>
    <input class="add-input" id="addId"   placeholder="ID (optional, auto-generated)">
    <div class="add-actions">
      <button class="btn btn-ghost" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmAddItem()">Add</button>
    </div>
  </div>
</div>

<script>
const SERVER  = 'http://localhost:8776';
const SOURCES = [
  { key:'bing',   icon:'🔷', label:'Bing Images'  },
  { key:'amazon', icon:'📦', label:'Amazon UK'    },
  { key:'argos',  icon:'🛍', label:'Argos'        },
  { key:'google', icon:'🔍', label:'Google Images' },
];

/* ── State ── */
let items     = [];   // [{ id, name, img?, group? }]
let images    = {};   // { id: url } — confirmed selections
let activeId  = null;
let selectedUrl = null;
let hunting   = false;

/* ── Server health ── */
async function checkHealth() {
  try {
    const r = await fetch(`${SERVER}/api/health`, { signal: AbortSignal.timeout(2500) });
    const d = await r.json();
    document.getElementById('statusPip').className  = 'status-pip online';
    document.getElementById('statusText').textContent = `Picture Finder online · ${d.sources?.join(' · ')}`;
  } catch {
    document.getElementById('statusPip').className  = 'status-pip';
    document.getElementById('statusText').textContent = 'Server offline — run: python server.py';
  }
}
checkHealth();

/* ── Receive items from host app via postMessage ── */
window.addEventListener('message', (e) => {
  if (e.data?.type === 'pf:load-items') {
    items = (e.data.items || []).map(i => ({
      id: i.id || ('pf-' + Math.random().toString(36).slice(2)),
      name: i.name || 'Unnamed',
      img: i.currentImg || i.img || null,
      group: i.group || null,
    }));
    renderItems();
    e.source.postMessage({ type: 'pf:ready' }, e.origin);
  }
});

/* Signal ready to host */
if (window.parent !== window) {
  window.parent.postMessage({ type: 'pf:ready' }, '*');
}

/* ── Render item list ── */
function renderItems() {
  const list  = document.getElementById('itemList');
  const empty = document.getElementById('listEmpty');
  document.getElementById('itemCount').textContent = items.length;

  // Remove old rows
  list.querySelectorAll('.item-row,.item-group-label,.add-item-row').forEach(el => el.remove());
  empty.style.display = items.length ? 'none' : '';

  let lastGroup = undefined;
  items.forEach(item => {
    if (item.group !== lastGroup) {
      if (item.group) {
        const g = document.createElement('div');
        g.className = 'item-group-label';
        g.textContent = item.group;
        list.appendChild(g);
      }
      lastGroup = item.group;
    }

    const row  = document.createElement('div');
    row.className = 'item-row' + (item.id === activeId ? ' active' : '');
    row.dataset.id = item.id;

    const imgUrl = images[item.id] || item.img;
    const thumb  = document.createElement(imgUrl ? 'img' : 'div');
    thumb.className = imgUrl ? 'item-thumb' : 'item-thumb empty';
    if (imgUrl) { thumb.src = imgUrl; thumb.onerror = () => { thumb.textContent='🖼'; thumb.className='item-thumb empty'; }; }
    else thumb.textContent = '🖼';

    const name  = document.createElement('div');
    name.className = 'item-name';
    name.textContent = item.name;

    const badge = document.createElement('div');
    badge.className = 'item-badge ' + (imgUrl ? 'ok' : 'no');

    row.appendChild(thumb);
    row.appendChild(name);
    row.appendChild(badge);
    row.addEventListener('click', () => selectItem(item.id));
    list.appendChild(row);
  });

  const addRow = document.createElement('div');
  addRow.className = 'add-item-row';
  addRow.innerHTML = '＋ Add item';
  addRow.onclick = addItemModal;
  list.appendChild(addRow);

  document.getElementById('btnApply').disabled = Object.keys(images).length === 0;
}

/* ── Select item → set up hunt area ── */
function selectItem(id) {
  activeId    = id;
  selectedUrl = null;
  const item  = items.find(i => i.id === id);
  if (!item) return;

  // Update active state
  document.querySelectorAll('.item-row').forEach(r =>
    r.classList.toggle('active', r.dataset.id === id)
  );

  // Update ext links
  const q = encodeURIComponent(item.name);
  document.getElementById('lkGoogle').href = `https://www.google.com/search?q=${q}&tbm=isch`;
  document.getElementById('lkBing').href   = `https://www.bing.com/images/search?q=${q}`;
  document.getElementById('lkArgos').href  = `https://www.argos.co.uk/search/${q}/`;
  document.getElementById('lkAmazon').href = `https://www.amazon.co.uk/s?k=${q}`;

  // Reset preview
  resetPreview();

  // Show current image if set
  const cur = images[id] || item.img;
  if (cur) setPreview(cur, null);

  document.getElementById('manualUrl').value = cur || '';

  // Show loading placeholders then hunt
  renderHuntLoading(item.name);
  huntItem(item);
}

function resetPreview() {
  document.getElementById('prevImg').style.display = 'none';
  document.getElementById('prevEmpty').style.display = 'flex';
  document.getElementById('confBadge').innerHTML = '';
  document.getElementById('descText').textContent = '';
  document.getElementById('btnSaveImg').disabled = true;
  selectedUrl = null;
}

/* ── Hunt for one item across all sources ── */
async function huntItem(item) {
  document.getElementById('huntEmpty').style.display = 'none';
  document.getElementById('statusText').textContent = `Hunting: ${item.name}…`;

  try {
    const res  = await fetch(`${SERVER}/api/hunt?q=${encodeURIComponent(item.name)}`);
    const data = await res.json();
    renderHuntResults(data.sources, item);
    document.getElementById('statusText').textContent = `Found results for: ${item.name}`;
  } catch (e) {
    document.getElementById('huntArea').innerHTML =
      `<div class="hunt-empty"><div class="hunt-empty-icon">⚠️</div>
       <div>Server error: ${e.message}</div></div>`;
    document.getElementById('statusText').textContent = 'Error — is server.py running?';
  }
}

function renderHuntLoading(name) {
  const area = document.getElementById('huntArea');
  area.innerHTML = SOURCES.map(s => `
    <div class="source-section">
      <div class="source-header">
        ${s.icon} ${s.label}
        <span class="src-badge loading">Searching…</span>
      </div>
      <div class="thumb-grid"><div class="src-empty">—</div></div>
    </div>`).join('');
}

function renderHuntResults(sources, item) {
  const area = document.getElementById('huntArea');
  area.innerHTML = '';

  SOURCES.forEach(({ key, icon, label }) => {
    const src   = sources[key] || { status: 'empty', urls: [] };
    const urls  = src.urls || [];
    const badge = src.status === 'ok' ? 'ok' : src.status === 'error' ? 'error' : 'empty';
    const btext = src.status === 'ok' ? `${urls.length} found` : src.status === 'error' ? 'Error' : 'None';

    const section = document.createElement('div');
    section.className = 'source-section';
    section.innerHTML = `
      <div class="source-header">
        ${icon} ${label}
        <span class="src-badge ${badge}">${btext}</span>
      </div>
      <div class="thumb-grid" id="thumbs-${key}"></div>`;
    area.appendChild(section);

    const grid = section.querySelector(`#thumbs-${key}`);
    if (!urls.length) {
      grid.innerHTML = '<div class="src-empty">No results from this source</div>';
    } else {
      urls.forEach(url => {
        const img = document.createElement('img');
        img.className = 'thumb';
        img.src = url;
        img.loading = 'lazy';
        img.onerror = () => img.style.display = 'none';
        img.onclick  = () => selectThumb(url, item.name, img);
        // Highlight if already selected
        if ((images[item.id] || item.img) === url) img.classList.add('selected');
        grid.appendChild(img);
      });
    }
  });
}

/* ── Thumbnail click → preview + AI verify ── */
async function selectThumb(url, itemName, thumbEl) {
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('selected'));
  thumbEl.classList.add('selected');
  selectedUrl = url;
  document.getElementById('manualUrl').value = url;
  setPreview(url, null);
  document.getElementById('btnSaveImg').disabled = false;

  // AI verify
  document.getElementById('confBadge').innerHTML =
    '<span class="conf-badge checking">🤖 Checking…</span>';
  document.getElementById('descText').textContent = '';

  try {
    const r = await fetch(
      `${SERVER}/api/verify?url=${encodeURIComponent(url)}&q=${encodeURIComponent(itemName)}`,
      { signal: AbortSignal.timeout(20000) }
    );
    const v   = await r.json();
    const pct = v.confidence || 0;
    const cls = pct >= 70 ? 'high' : pct >= 40 ? 'mid' : 'low';
    document.getElementById('confBadge').innerHTML =
      `<span class="conf-badge ${cls}">${v.match?'✓':'✕'} AI: ${pct}%</span>`;
    document.getElementById('descText').textContent = v.description || v.reason || '';
  } catch {
    document.getElementById('confBadge').innerHTML =
      '<span class="conf-badge low">AI check failed</span>';
  }
}

function setPreview(url, conf) {
  const img = document.getElementById('prevImg');
  document.getElementById('prevEmpty').style.display = 'none';
  img.src = url;
  img.style.display = 'block';
}

/* ── Manual URL input ── */
function onManualUrl(val) {
  if (val && val.startsWith('http')) {
    selectedUrl = val;
    document.querySelectorAll('.thumb').forEach(t => t.classList.remove('selected'));
    setPreview(val);
    document.getElementById('btnSaveImg').disabled = false;
    document.getElementById('confBadge').innerHTML = '';
  } else {
    selectedUrl = null;
    document.getElementById('btnSaveImg').disabled = true;
  }
}

/* ── Save image for active item ── */
function saveSelectedImage() {
  if (!activeId || !selectedUrl) return;
  images[activeId] = selectedUrl;

  const item = items.find(i => i.id === activeId);
  if (item) item.img = selectedUrl;

  renderItems();
  document.getElementById('btnSaveImg').textContent = '✓ Saved!';
  setTimeout(() => { document.getElementById('btnSaveImg').textContent = '💾 Save for this item'; }, 1500);
}

/* ── Hunt all items sequentially ── */
async function huntAll() {
  if (!items.length) return;
  document.getElementById('btnHuntAll').disabled = true;
  document.getElementById('btnHuntAll').textContent = '⏳ Hunting…';

  for (const item of items) {
    if (images[item.id]) continue; // skip already done
    try {
      const res  = await fetch(`${SERVER}/api/hunt?q=${encodeURIComponent(item.name)}`);
      const data = await res.json();
      // Pick first available URL from any source
      for (const { key } of SOURCES) {
        const urls = data.sources?.[key]?.urls || [];
        if (urls.length) { images[item.id] = urls[0]; item.img = urls[0]; break; }
      }
    } catch {}
    document.getElementById('statusText').textContent =
      `Hunted: ${item.name}`;
  }

  renderItems();
  document.getElementById('btnHuntAll').disabled = false;
  document.getElementById('btnHuntAll').textContent = '🔍 Hunt all';
  document.getElementById('statusText').textContent =
    `Done. ${Object.keys(images).length} images found.`;
}

/* ── Apply to project (send back to host app) ── */
function applyToProject() {
  const payload = { type: 'pf:images-saved', data: images };
  if (window.parent !== window) {
    window.parent.postMessage(payload, '*');
  } else {
    // Standalone: copy to clipboard as JSON
    navigator.clipboard.writeText(JSON.stringify(images, null, 2)).then(() => {
      alert('Image map copied to clipboard!\n\nApply it in your host app.');
    });
  }
}

/* ── Add item manually ── */
function addItemModal() {
  document.getElementById('addOverlay').classList.add('open');
  document.getElementById('addName').focus();
}
function closeAddModal() {
  document.getElementById('addOverlay').classList.remove('open');
  document.getElementById('addName').value = '';
  document.getElementById('addId').value = '';
}
function confirmAddItem() {
  const name = document.getElementById('addName').value.trim();
  if (!name) return;
  const id = document.getElementById('addId').value.trim() || ('pf-' + Date.now());
  items.push({ id, name });
  renderItems();
  closeAddModal();
  selectItem(id);
}
document.getElementById('addName').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmAddItem();
});

/* ── Init ── */
renderItems();
</script>
</body>
