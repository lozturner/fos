<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Forge</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f5f0;
  --text: #3a3a3a;
  --text-muted: #8a8a8a;
  --primary: #6b9080;
  --primary-hover: #5a7d6e;
  --accent: #cce3de;
  --warm: #dda77b;
  --gentle: #eae4e9;
  --escape-bg: transparent;
  --escape-text: #7a7a7a;
  --card-bg: #fff;
  --btn-text: #fff;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;

  --anno-vague: #f38ba8;
  --anno-hedge: #fab387;
  --anno-brief: #f9e2af;
  --anno-ambig: #cba6f7;
  --anno-clear: #a6e3a1;
  --anno-missing: #89b4fa;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1a2e;
    --text: #e0e0e0;
    --text-muted: #999;
    --primary: #7db39a;
    --primary-hover: #6a9f87;
    --accent: #2a3a35;
    --warm: #c4956e;
    --gentle: #2a2535;
    --card-bg: #252540;
    --btn-text: #1a1a2e;
    --shadow: 0 1px 3px rgba(0,0,0,0.3);

    --anno-vague: #e06080;
    --anno-hedge: #d89070;
    --anno-brief: #d4c080;
    --anno-ambig: #b090e0;
    --anno-clear: #80c080;
    --anno-missing: #7090d0;
  }
}

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; }
}

body {
  font-family: var(--font);
  font-size: 1.125rem;
  line-height: 1.6;
  color: var(--text);
  background: var(--bg);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

#app {
  max-width: 520px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
}

h1 { font-size: 1.6rem; font-weight: 600; line-height: 1.3; }
h2 { font-size: 1.3rem; font-weight: 500; line-height: 1.4; }
.hero-text { font-size: 1.5rem; font-weight: 400; line-height: 1.5; text-align: center; }
.sub-text { color: var(--text-muted); font-size: 0.95rem; }
.center { text-align: center; }

.btn {
  display: block;
  width: 100%;
  min-height: 56px;
  padding: 0.9rem 1.5rem;
  border: none;
  border-radius: 12px;
  font-family: var(--font);
  font-size: 1.05rem;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  line-height: 1.4;
}
.btn:active { transform: scale(0.98); }
.btn:focus-visible { outline: 3px solid var(--warm); outline-offset: 2px; }
.btn-primary { background: var(--primary); color: var(--btn-text); font-weight: 500; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-warm { background: var(--warm); color: #fff; font-weight: 500; }
.btn-escape { background: transparent; color: var(--text-muted); font-size: 0.95rem; min-height: 44px; }
.btn-escape:hover { color: var(--text); }
.btn-group { display: flex; flex-direction: column; gap: 0.75rem; }
.spacer { height: 1rem; }
.spacer-lg { height: 2rem; }
.micro-msg { color: var(--primary); font-size: 0.9rem; text-align: center; font-style: italic; min-height: 1.4em; }

.input-field {
  width: 100%;
  padding: 1rem;
  border: 2px solid var(--accent);
  border-radius: 12px;
  font-family: var(--font);
  font-size: 1.05rem;
  background: var(--card-bg);
  color: var(--text);
  resize: vertical;
  min-height: 80px;
  line-height: 1.6;
}
.input-field:focus { outline: none; border-color: var(--primary); }

.gentle-box {
  background: var(--gentle);
  border-radius: 12px;
  padding: 1.25rem;
  line-height: 1.6;
}

.section-card {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 1rem 1.25rem;
  box-shadow: var(--shadow);
  margin-bottom: 0.75rem;
}
.section-card h3 {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.5rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.section-card p { font-size: 0.95rem; line-height: 1.5; }
.section-card textarea {
  width: 100%;
  padding: 0.75rem;
  border: 1px solid var(--accent);
  border-radius: 8px;
  font-family: var(--font);
  font-size: 0.95rem;
  background: var(--bg);
  color: var(--text);
  resize: vertical;
  min-height: 60px;
  line-height: 1.5;
}
.section-card textarea:focus { outline: none; border-color: var(--primary); }

.source-badge {
  font-size: 0.7rem;
  padding: 0.15rem 0.5rem;
  border-radius: 6px;
  font-weight: 400;
  text-transform: none;
  letter-spacing: 0;
}
.source-user { background: var(--accent); color: var(--primary); }
.source-generated { background: var(--gentle); color: var(--text-muted); }

/* Score gauge */
.score-container { text-align: center; margin: 1rem 0; }
.score-ring {
  width: 120px; height: 120px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  border: 6px solid var(--accent);
  position: relative;
}
.score-number { font-size: 2rem; font-weight: 700; line-height: 1; }
.score-label { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; }
.score-msg { font-size: 0.95rem; margin-top: 0.75rem; font-weight: 500; }

/* Annotation highlights */
.anno { padding: 0.1rem 0.2rem; border-radius: 3px; cursor: help; }
.anno-vague { background: var(--anno-vague); color: #1a1a1a; }
.anno-hedge { background: var(--anno-hedge); color: #1a1a1a; }
.anno-brief { background: var(--anno-brief); color: #1a1a1a; }
.anno-ambig { background: var(--anno-ambig); color: #1a1a1a; }
.anno-clear { background: var(--anno-clear); color: #1a1a1a; }

/* Dimension bars */
.dim-bar-wrap { margin-bottom: 0.5rem; }
.dim-bar-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 0.2rem;
}
.dim-bar {
  height: 6px;
  background: var(--accent);
  border-radius: 3px;
  overflow: hidden;
}
.dim-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s ease;
}

/* Suggestion cards */
.suggestion-card {
  background: var(--card-bg);
  border-left: 3px solid var(--warm);
  border-radius: 0 8px 8px 0;
  padding: 0.75rem 1rem;
  margin-bottom: 0.5rem;
  font-size: 0.9rem;
}
.suggestion-card .sug-type {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  color: var(--warm);
  margin-bottom: 0.25rem;
}

/* Annotated text display */
.annotated-text {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 1.25rem;
  box-shadow: var(--shadow);
  font-size: 0.95rem;
  line-height: 1.8;
  white-space: pre-wrap;
  word-wrap: break-word;
}

/* Section chips */
.section-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  margin: 0.75rem 0;
}
.section-chip {
  font-size: 0.75rem;
  padding: 0.25rem 0.6rem;
  border-radius: 6px;
  font-weight: 500;
}
.chip-present { background: var(--accent); color: var(--primary); }
.chip-missing { background: var(--gentle); color: var(--text-muted); border: 1px dashed var(--text-muted); }

/* History list */
.history-item {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 1rem 1.25rem;
  box-shadow: var(--shadow);
  margin-bottom: 0.75rem;
  cursor: pointer;
  transition: transform 0.1s;
}
.history-item:active { transform: scale(0.99); }
.history-item .hi-date { font-size: 0.8rem; color: var(--text-muted); }
.history-item .hi-score { font-weight: 600; }
.history-item .hi-preview {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-top: 0.25rem;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Decision framework */
.decision-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
  margin: 0.75rem 0;
}
.decision-table th, .decision-table td {
  border: 1px solid var(--accent);
  padding: 0.5rem 0.6rem;
  text-align: left;
}
.decision-table th { background: var(--accent); font-weight: 600; }

.brand {
  font-size: 0.75rem;
  color: var(--text-muted);
  text-align: center;
  opacity: 0.5;
  margin-top: 2rem;
}

/* Legend */
.legend { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 0.5rem 0; }
.legend-item { display: flex; align-items: center; gap: 0.3rem; font-size: 0.75rem; color: var(--text-muted); }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }

/* Toast */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  background: var(--primary);
  color: var(--btn-text);
  padding: 0.6rem 1.2rem;
  border-radius: 8px;
  font-size: 0.9rem;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 100;
}
.toast.show { opacity: 1; }

@media (max-width: 380px) {
  #app { padding: 1.5rem 1rem; }
  .hero-text { font-size: 1.3rem; }
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
// ═══════════════════════════════════════════
// PROMPT FORGE — Turn raw text into master prompts
// ═══════════════════════════════════════════

// ─── STATE ───
const S = {
  view: 'WELCOME',
  rawInput: '',
  analysis: null,
  forgedSections: null,
  currentSessionId: null,
};

// ─── RESTORE ───
(function restore() {
  try {
    const raw = localStorage.getItem('forge_current');
    if (raw) {
      const saved = JSON.parse(raw);
      if (saved && saved.rawInput) {
        S.rawInput = saved.rawInput || '';
        S.analysis = saved.analysis || null;
        S.forgedSections = saved.forgedSections || null;
        S.currentSessionId = saved.currentSessionId || null;
        if (S.forgedSections) S.view = 'FORGE';
        else if (S.analysis) S.view = 'RESULTS';
        else if (S.rawInput) S.view = 'INPUT';
      }
    }
  } catch(e) {}
})();

// ─── PERSISTENCE ───
function saveCurrent() {
  try {
    localStorage.setItem('forge_current', JSON.stringify({
      rawInput: S.rawInput,
      analysis: S.analysis,
      forgedSections: S.forgedSections,
      currentSessionId: S.currentSessionId,
    }));
  } catch(e) {}
}

function loadSessions() {
  try {
    const raw = localStorage.getItem('forge_sessions');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return [];
}

function saveSessionToHistory(session) {
  const sessions = loadSessions();
  sessions.push(session);
  try { localStorage.setItem('forge_sessions', JSON.stringify(sessions)); } catch(e) {}
}

function clearCurrent() {
  S.rawInput = '';
  S.analysis = null;
  S.forgedSections = null;
  S.currentSessionId = null;
  try { localStorage.removeItem('forge_current'); } catch(e) {}
}

// ─── MESSAGES ───
const ENCOURAGEMENT = [
  "Raw material is all you need. That's what forging is for.",
  "Don't polish it first. Bring the mess.",
  "The rougher the input, the more the forge has to work with.",
  "You don't have to know what you want yet. Just get it in here.",
  "Every great prompt started as a half-formed thought.",
  "Dump it in. We'll shape it together.",
];

const FORGE_MSG = [
  "Structure found. Let's refine it.",
  "The shape is emerging. Looking good.",
  "Your prompt has bones now. Time to add muscle.",
  "From rough to structured. Nice work.",
];

const EXPORT_MSG = [
  "Forged. Go do something brilliant with it.",
  "Your prompt is ready. Ship it.",
  "From raw thought to master prompt. That's the forge.",
  "All done. This is going to work well.",
];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ─── GREETING ───
function greeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Morning';
  if (h < 17) return 'Afternoon';
  return 'Evening';
}

// ─── TOAST ───
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ═══════════════════════════════════════════
// ANALYSIS PIPELINE
// ═══════════════════════════════════════════

const CHUNK_TYPES = {
  CONTEXT:    { re: /\b(background|context|situation|currently|right now|we have|our system|the project|the codebase|working on|dealing with)\b/i, label: 'Context' },
  ROLE:       { re: /\b(you are|act as|you're a|pretend|role|persona|expert|specialist|senior|assistant|coach|advisor)\b/i, label: 'Role' },
  TASK:       { re: /\b(please|create|write|generate|build|make|produce|analyze|help me|I need you to|I want you to|design|implement|review|explain|summarize|list)\b/i, label: 'Task' },
  CONSTRAINT: { re: /\b(don't|do not|never|must not|avoid|limit|only|exactly|no more than|at most|at least|keep it|make sure|ensure|restrict|within)\b/i, label: 'Constraints' },
  OUTPUT_FMT: { re: /\b(format|structure|output|return|respond with|give me|as a|in the form of|markdown|json|bullet|table|list|columns|headers|sections)\b/i, label: 'Output Format' },
  EXAMPLE:    { re: /\b(for example|e\.g\.|like this|such as|here's an example|sample|instance|template|model|demo)\b/i, label: 'Examples' },
  TONE:       { re: /\b(tone|style|voice|friendly|formal|casual|professional|concise|verbose|warm|direct|empathetic|technical|simple|brief)\b/i, label: 'Tone & Style' },
  META:       { re: /\b(important|note|remember|key point|caveat|exception|unless|warning|critical|priority)\b/i, label: 'Additional Notes' },
};

const VAGUE_WORDS = [
  'good','nice','stuff','things','appropriate','relevant','etc','proper',
  'suitable','adequate','reasonable','various','certain','significant',
  'important','interesting','great','fine','okay','cool','awesome',
  'basically','essentially','just','really','very','quite','somewhat',
  'a lot','some','many','few','several','multiple','better','best',
  'right','correct','proper','well','properly','effectively',
];

const HEDGE_WORDS = [
  'maybe','perhaps','possibly','sort of','kind of','i think','i guess',
  'i suppose','might want','could possibly','not sure if','probably',
  'it seems','appears to','tend to','in a way','somewhat','likely',
];

const SECTION_TEMPLATES = {
  CONTEXT:    "Describe the situation: What is the background? What has happened? What does the AI need to know before starting?",
  ROLE:       "Define a role: Who should the AI be? (e.g., 'You are a senior technical writer with expertise in API documentation')",
  TASK:       "State the task clearly: What exactly should be produced? Be specific about the deliverable and scope.",
  CONSTRAINT: "Add constraints: What should be avoided? What are the boundaries? (length limits, format restrictions, topics to exclude)",
  OUTPUT_FMT: "Specify the output format: How should the response be structured? (markdown sections, bullet list, JSON, numbered steps, table)",
  EXAMPLE:    "Include an example: Show what a good response looks like, even partially. Examples dramatically improve output quality.",
  TONE:       "Set the tone: What voice should be used? (professional, casual, technical, empathetic, concise, detailed)",
  META:       "",
};

// Stage 1: PARSE
function parse(text) {
  // Split into chunks by double-newline or significant breaks
  const rawChunks = text.split(/\n\s*\n|\n(?=[A-Z#\-\*\d])/).filter(c => c.trim());
  // If no paragraph breaks, split by sentences
  const chunks = rawChunks.length <= 1 && text.length > 100
    ? text.match(/[^.!?]+[.!?]+|[^.!?]+$/g) || [text]
    : rawChunks;

  return chunks.map((chunk, i) => {
    const trimmed = chunk.trim();
    if (!trimmed) return null;

    // Classify by best matching type
    let bestType = 'UNCLASSIFIED';
    let bestConf = 0;

    for (const [type, { re }] of Object.entries(CHUNK_TYPES)) {
      const matches = trimmed.match(new RegExp(re.source, 'gi'));
      if (matches) {
        const conf = matches.length / Math.max(trimmed.split(/\s+/).length, 1);
        if (conf > bestConf) {
          bestConf = conf;
          bestType = type;
        }
      }
    }

    return {
      id: 'chunk_' + i,
      text: trimmed,
      type: bestType,
      confidence: Math.min(bestConf * 5, 1), // normalize
      wordCount: trimmed.split(/\s+/).length,
    };
  }).filter(Boolean);
}

// Stage 2: DIAGNOSE
function diagnose(chunks) {
  const allText = chunks.map(c => c.text).join(' ');
  const allWords = allText.toLowerCase().split(/\s+/);
  const totalWords = allWords.length;

  let vagueCount = 0;
  let hedgeCount = 0;
  let specificNounCount = 0;

  const diagnostics = chunks.map(chunk => {
    const words = chunk.text.toLowerCase().split(/\s+/);
    const diags = [];

    // Check vague words
    const vagueFound = [];
    for (const w of words) {
      const clean = w.replace(/[^a-z]/g, '');
      if (VAGUE_WORDS.includes(clean)) {
        vagueFound.push(clean);
        vagueCount++;
      }
    }
    if (vagueFound.length > 0) {
      diags.push({ type: 'VAGUE', words: vagueFound, message: 'Vague \u2014 could be more specific: ' + vagueFound.join(', ') });
    }

    // Check hedging
    const hedgeFound = [];
    const lower = chunk.text.toLowerCase();
    for (const h of HEDGE_WORDS) {
      if (lower.includes(h)) {
        hedgeFound.push(h);
        hedgeCount++;
      }
    }
    if (hedgeFound.length > 0) {
      diags.push({ type: 'HEDGE', words: hedgeFound, message: 'Hedging \u2014 state this as a clear instruction' });
    }

    // Check too brief
    if (chunk.wordCount < 8 && (chunk.type === 'TASK' || chunk.type === 'CONSTRAINT')) {
      diags.push({ type: 'BRIEF', message: 'Too brief \u2014 add more detail to this ' + (chunk.type === 'TASK' ? 'task' : 'constraint') });
    }

    // Check ambiguous pronouns at start
    if (/^(it|they|this|that|these|those)\s/i.test(chunk.text)) {
      diags.push({ type: 'AMBIG', message: 'Ambiguous reference \u2014 clarify what \u201c' + chunk.text.split(/\s/)[0] + '\u201d refers to' });
    }

    // Check for specifics (numbers, proper nouns, quoted strings)
    const hasNumbers = /\d+/.test(chunk.text);
    const hasQuotes = /["'].+?["']/.test(chunk.text);
    const hasProperNouns = /[A-Z][a-z]{2,}/.test(chunk.text.slice(1)); // skip sentence start
    if (hasNumbers) specificNounCount++;
    if (hasProperNouns) specificNounCount++;
    if (hasQuotes) specificNounCount++;

    // If no issues, mark as clear
    if (diags.length === 0 && chunk.wordCount >= 8) {
      diags.push({ type: 'CLEAR', message: 'Clear and actionable' });
    }

    return { ...chunk, diagnostics: diags };
  });

  // Determine present/missing sections
  const presentTypes = new Set(chunks.map(c => c.type).filter(t => t !== 'UNCLASSIFIED'));
  const allSectionTypes = ['CONTEXT', 'ROLE', 'TASK', 'CONSTRAINT', 'OUTPUT_FMT', 'EXAMPLE', 'TONE'];
  const missingTypes = allSectionTypes.filter(t => !presentTypes.has(t));

  // Structure detection
  const hasHeaders = /^#+\s/m.test(allText) || /^[A-Z][A-Z\s]+:/m.test(allText);
  const hasParagraphs = chunks.length > 2;

  return {
    chunks: diagnostics,
    totalWords,
    vagueCount,
    hedgeCount,
    specificNounCount,
    presentSections: Array.from(presentTypes),
    missingSections: missingTypes,
    hasHeaders,
    hasParagraphs,
    totalChunks: chunks.length,
  };
}

// Stage 3: GROW
function grow(analysis) {
  const suggestions = [];

  // Missing sections
  for (const type of analysis.missingSections) {
    if (SECTION_TEMPLATES[type]) {
      suggestions.push({
        type: 'MISSING',
        section: type,
        label: CHUNK_TYPES[type]?.label || type,
        message: SECTION_TEMPLATES[type],
      });
    }
  }

  // Chunk-specific suggestions
  for (const chunk of analysis.chunks) {
    for (const diag of chunk.diagnostics) {
      if (diag.type === 'VAGUE') {
        suggestions.push({
          type: 'VAGUE',
          chunkId: chunk.id,
          message: 'In "' + truncate(chunk.text, 40) + '" \u2014 replace vague words (' + diag.words.join(', ') + ') with specifics',
        });
      }
      if (diag.type === 'HEDGE') {
        suggestions.push({
          type: 'HEDGE',
          chunkId: chunk.id,
          message: 'In "' + truncate(chunk.text, 40) + '" \u2014 remove hedging and state as direct instruction',
        });
      }
    }
  }

  // Task without constraints
  const hasTask = analysis.presentSections.includes('TASK');
  const hasConstraint = analysis.presentSections.includes('CONSTRAINT');
  if (hasTask && !hasConstraint) {
    suggestions.push({
      type: 'STRUCTURE',
      message: 'Your task has no guardrails \u2014 add constraints to prevent unwanted output',
    });
  }

  return suggestions;
}

// Stage 4: ASSEMBLE
function assemble(analysis) {
  const sectionOrder = ['CONTEXT', 'ROLE', 'TASK', 'CONSTRAINT', 'OUTPUT_FMT', 'TONE', 'EXAMPLE', 'META'];
  const sections = [];

  for (const type of sectionOrder) {
    const chunks = analysis.chunks.filter(c => c.type === type);
    const label = CHUNK_TYPES[type]?.label || type;

    if (chunks.length > 0) {
      sections.push({
        type,
        label,
        content: chunks.map(c => c.text).join('\n\n'),
        source: 'user',
        position: null, // canvas-mode hook
      });
    } else if (SECTION_TEMPLATES[type] && type !== 'META') {
      sections.push({
        type,
        label,
        content: '',
        source: 'generated',
        placeholder: SECTION_TEMPLATES[type],
        position: null,
      });
    }
  }

  // Unclassified chunks go into Additional Notes
  const unclassified = analysis.chunks.filter(c => c.type === 'UNCLASSIFIED');
  if (unclassified.length > 0) {
    const existing = sections.find(s => s.type === 'META');
    if (existing) {
      existing.content += (existing.content ? '\n\n' : '') + unclassified.map(c => c.text).join('\n\n');
    } else {
      sections.push({
        type: 'META',
        label: 'Additional Notes',
        content: unclassified.map(c => c.text).join('\n\n'),
        source: 'user',
        position: null,
      });
    }
  }

  return sections;
}

// ─── SCORING ───
function scorePrompt(analysis) {
  const clamp = v => Math.max(0, Math.min(1, v));

  const clarityRatio = 1 - (analysis.vagueCount + analysis.hedgeCount) / Math.max(analysis.totalWords, 1);
  const clarity = clamp(clarityRatio) * 20;

  const specRatio = analysis.specificNounCount / Math.max(analysis.totalChunks, 1);
  const specificity = clamp(specRatio) * 20;

  const compRatio = analysis.presentSections.length / 7;
  const completeness = clamp(compRatio) * 25;

  const structScore = analysis.hasHeaders ? 1 : analysis.hasParagraphs ? 0.5 : 0;
  const structure = clamp(structScore) * 20;

  const constraintChunks = analysis.chunks.filter(c => c.type === 'CONSTRAINT').length;
  const constraints = clamp(constraintChunks / 3) * 15;

  return {
    total: Math.round(clarity + specificity + completeness + structure + constraints),
    clarity: Math.round(clarity),
    specificity: Math.round(specificity),
    completeness: Math.round(completeness),
    structure: Math.round(structure),
    constraints: Math.round(constraints),
  };
}

function scoreColor(total) {
  if (total <= 30) return '#c46a5e';
  if (total <= 60) return 'var(--warm)';
  if (total <= 80) return 'var(--primary)';
  return '#4a9e7a';
}

function scoreMsg(total) {
  if (total <= 30) return 'Raw material \u2014 needs shaping';
  if (total <= 60) return 'Taking shape \u2014 keep refining';
  if (total <= 80) return 'Solid foundation \u2014 polish the edges';
  return 'Forge-ready \u2014 this will work well';
}

// ─── HELPERS ───
function truncate(s, n) { return s.length > n ? s.slice(0, n) + '\u2026' : s; }

function buildMarkdownPrompt(sections) {
  return sections
    .filter(s => s.content.trim())
    .map(s => '## ' + s.label + '\n' + s.content)
    .join('\n\n');
}

function buildPromptJSON(sections, rawInput, score) {
  const now = new Date();
  return {
    version: 1,
    id: 'forge_' + Date.now(),
    created_at: now.toISOString(),
    source: { raw_input: rawInput, word_count: rawInput.split(/\s+/).length },
    analysis: { score: score.total, dimensions: score },
    forged_prompt: {
      sections: sections.map(s => ({
        type: s.type,
        label: s.label,
        content: s.content,
        source: s.source,
        position: s.position,
      })),
      assembled_markdown: buildMarkdownPrompt(sections),
    },
    meta: { forged_with: 'prompt-forge-v1', mode: 'console' },
  };
}

function downloadFile(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ─── RENDER ENGINE ───
const $ = id => document.getElementById(id);
const app = () => $('app');

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'className') e.className = v;
      else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
      else e.setAttribute(k, v);
    }
  }
  for (const c of children) {
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else if (c) e.appendChild(c);
  }
  return e;
}

function render() {
  const a = app();
  a.innerHTML = '';
  const views = {
    WELCOME: vWelcome, INPUT: vInput, RESULTS: vResults,
    FORGE: vForge, EXPORT: vExport, HISTORY: vHistory,
    DECISION: vDecision,
  };
  (views[S.view] || vWelcome)(a);
  saveCurrent();
}

function go(view, updates) {
  Object.assign(S, updates || {});
  S.view = view;
  render();
  window.scrollTo(0, 0);
}

const DECISION_FRAMEWORK_MD = `## The Decision Forge \u2014 From Fog to Framework

**The Progression:** Ignorance \u2192 Risk \u2192 Certainty

Every decision exists somewhere on this spectrum. The goal is not to reach certainty (often impossible) but to move from ignorance toward risk \u2014 where you know the options and can estimate the outcomes.

### The Formula (4 steps)

**Step 1: Name the acts.**
List every realistic option, including "do nothing." These are your rows.

**Step 2: Name the states.**
What could be true about the world? These are your columns. You do not control these. They are the "weather" of your decision.

**Step 3: Fill the cells with values.**
For each act\u2013state pair, estimate the outcome. Use a simple scale: \u22123 (devastating) to +3 (excellent), or use whatever units matter (money, time, emotional cost, opportunity). The act of assigning numbers forces your felt-quality intuition (\u201cthis feels bad\u201d) into explicit, comparable quantities.

**Step 4: Apply a decision rule.**

- **Under ignorance** (you cannot estimate probabilities): Use maximin (pick the act whose worst outcome is least bad) or minimax regret (pick the act you\u2019d least regret if wrong).
- **Under risk** (you can estimate rough probabilities): Multiply each cell value by its probability. Sum across the row. Pick the highest expected value.
- **Under near-certainty** (one state is overwhelmingly likely): Just pick the best act for that state.

### The Key Insight

Building the table IS the tool. Separating acts from states, forcing numbers onto feelings \u2014 that is what moves you from ignorance toward risk. You do not need a perfect table. You need a table at all.`;

      el('th', null, 'State C'),
    ),
  );
  const tbody = el('tbody', null,
    el('tr', null, el('td', null, 'Act 1'), el('td', null, '+2'), el('td', null, '-1'), el('td', null, '+1')),
    el('tr', null, el('td', null, 'Act 2'), el('td', null, '0'), el('td', null, '+1'), el('td', null, '+2')),
    el('tr', null, el('td', null, 'Do nothing'), el('td', null, '0'), el('td', null, '0'), el('td', null, '0')),
  );
  table.appendChild(thead);
  table.appendChild(tbody);
  a.appendChild(table);

  a.appendChild(el('div', { className: 'spacer' }));

  // Key insight
  const insightBox = el('div', { className: 'gentle-box' });
  insightBox.appendChild(el('p', { style: { fontWeight: '600' } }, 'The key insight'));
  insightBox.appendChild(el('p', null, 'Building the table IS the tool. Separating acts from states, forcing numbers onto feelings \u2014 that is what moves you from ignorance toward risk. You don\'t need a perfect table. You need a table at all.'));
  a.appendChild(insightBox);

  a.appendChild(el('div', { className: 'spacer' }));

  a.appendChild(el('div', { className: 'btn-group' },
    el('button', { className: 'btn btn-primary', onClick: () => {
      navigator.clipboard.writeText(DECISION_FRAMEWORK_MD).then(() => toast('Framework copied to clipboard'));
    }}, 'Copy as markdown'),
    el('button', { className: 'btn btn-escape', onClick: () => go('WELCOME') }, 'Back'),
  ));
}

// ─── UTILS ───
function timeAgo(date) {
  const diff = Date.now() - date.getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + ' min' + (mins === 1 ? '' : 's') + ' ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + ' hour' + (hrs === 1 ? '' : 's') + ' ago';
  const days = Math.floor(hrs / 24);
  return days + ' day' + (days === 1 ? '' : 's') + ' ago';
}
